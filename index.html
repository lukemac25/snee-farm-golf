function scoreName(s,p){
  if(!s||s<=0)return null;
  const d=s-p;
  if(s===1)return{l:'ACE! 🎉',c:'#ffd700',type:'ace'};
  if(d<=-3)return{l:'ALBATROSS 🦅🦅🦅',c:'#00e676',type:'eagle'};
  if(d===-2)return{l:'EAGLE 🦅🦅',c:'#00e676',type:'eagle'};
  if(d===-1)return{l:'BIRDIE 🐦',c:'#69f0ae',type:'birdie'};
  if(d===0)return{l:'PAR',c:'#666',type:'par'};
  if(d===1)return{l:'BOGEY',c:'#ff9100',type:'bogey'};
  if(d===2)return{l:'DOUBLE 😬',c:'#ff5252',type:'bogey'};
  if(d===3)return{l:'TRIPLE 😱',c:'#d32f2f',type:'bogey'};
  return{l:`+${d} 💀`,c:'#b71c1c',type:'bogey'};
}
function sfPts(s,p){if(!s||s<=0)return 0;const d=s-p;if(d>=2)return 0;if(d===1)return 1;if(d===0)return 2;if(d===-1)return 3;if(d===-2)return 4;return 5;}
function tpStr(tp){return tp===0?'E':tp>0?`+${tp}`:`${tp}`;}
function scColor(d){
  if(d<=-2)return{bg:'rgba(0,230,118,.2)',c:'#00e676'};
  if(d===-1)return{bg:'rgba(105,240,174,.12)',c:'#69f0ae'};
  if(d===0)return{bg:'transparent',c:'#555'};
  if(d===1)return{bg:'rgba(255,145,0,.12)',c:'#ff9100'};
  if(d===2)return{bg:'rgba(255,82,82,.12)',c:'#ff5252'};
  return{bg:'rgba(183,28,28,.2)',c:'#ef5350'};
}
// Net score with handicap strokes
function getNetScore(gross,par,hcp,playerHdcp,courseRating=72){
  const strokes=Math.floor(playerHdcp/18)+(hcp<=playerHdcp%18?1:0);
  return gross-strokes;
}

function WeatherWidget({lat,lon,courseName}){
  const[weather,setWeather]=useState(null);
  useEffect(()=>{
    if(!lat||!lon)return;
    fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,wind_speed_10m,weather_code&temperature_unit=fahrenheit&wind_speed_unit=mph`)
      .then(r=>r.json()).then(d=>{
        const c=d.current;
        const code=c.weather_code;
        let icon='☀️';
        if(code>=61&&code<=67)icon='🌧️';
        else if(code>=71&&code<=77)icon='❄️';
        else if(code>=80&&code<=82)icon='🌦️';
        else if(code>=95)icon='⛈️';
        else if(code>=51&&code<=57)icon='🌦️';
        else if(code>=1&&code<=3)icon=code===1?'🌤️':code===2?'⛅':'☁️';
        else if(code===45||code===48)icon='🌫️';
        setWeather({temp:Math.round(c.temperature_2m),wind:Math.round(c.wind_speed_10m),icon});
      }).catch(()=>{});
  },[lat,lon]);
  if(!weather)return null;
  return(
    <div style={{display:'flex',alignItems:'center',gap:8,background:'rgba(255,255,255,.04)',border:'1px solid rgba(255,255,255,.07)',borderRadius:12,padding:'8px 12px'}}>
      <span style={{fontSize:20}}>{weather.icon}</span>
      <div>
        <div style={{fontSize:13,fontWeight:700}}>{weather.temp}°F · {weather.wind} mph winds</div>
        <div style={{fontSize:10,color:'rgba(255,255,255,.3)'}}>{courseName}</div>
      </div>
    </div>
  );
}

function FormatVote({onClose}){
  const[votes,setVotes]=useState({ben:null,thomas:null,max:null,luke:null});

  const allVoted=Object.values(votes).every(v=>v!==null);
  const tally=()=>{
    const counts={};
    Object.values(votes).forEach(v=>{if(v)counts[v]=(counts[v]||0)+1;});
    return Object.entries(counts).sort((a,b)=>b[1]-a[1]);
  };
  const winner=phase==='result'?tally()[0]:null;
  return(
    <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,.92)',zIndex:400,display:'flex',alignItems:'center',justifyContent:'center',padding:16}} onClick={onClose}>
      <div style={{background:'#0d1a0d',border:'1px solid rgba(155,89,182,.4)',borderRadius:22,padding:'24px 20px',width:'100%',maxWidth:400,animation:'popIn .3s'}} onClick={e=>e.stopPropagation()}>

}

// ══════════════════════════════════════════════
// PLAYER PROFILE
// ══════════════════════════════════════════════
function PlayerProfile({player,rounds,scores,playerSettings,settings,onClose}){
  const completed=rounds.filter(r=>r.completed);
  const hdcp=playerSettings[player.id]??player.defaultHcp;
  const pName=settings?.playerNames?.[player.id]||player.name;
  const pColor=settings?.playerColors?.[player.id]||player.color;
  const st=useMemo(()=>{
    let b=0,e=0,p=0,bo=0,d=0,ac=0,best=null,worst=null,rp=0,tot=0,wins=0,streak=0,cur=0;
    [...completed].sort((a,x)=>a.date>x.date?1:-1).forEach(r=>{
      const s=scores[r.id]?.[player.id];if(!s)return;
      const course=COURSES[r.course_id]||COURSES.snee;let rt=0,pl=false;
      s.forEach((sc,i)=>{if(sc>0&&course.holes[i]){const dd=sc-course.holes[i].par;if(sc===1)ac++;else if(dd<=-2)e++;else if(dd===-1)b++;else if(dd===0)p++;else if(dd===1)bo++;else d++;rt+=sc;pl=true;}});
      if(pl&&rt>0){tot+=rt;rp++;if(best===null||rt<best)best=rt;if(worst===null||rt>worst)worst=rt;}
      const all=PLAYERS.map(pp=>({id:pp.id,t:(scores[r.id]?.[pp.id]||[]).reduce((a,x)=>a+(x||0),0)})).filter(x=>x.t>0).sort((a,x)=>a.t-x.t);
      if(all[0]&&all[0].id===player.id){wins++;cur++;}else{streak=Math.max(streak,cur);cur=0;}
    });
    streak=Math.max(streak,cur);
    const trend=completed.slice(0,6).reverse().map(r=>{const s=scores[r.id]?.[player.id];return s?s.reduce((a,x)=>a+(x||0),0):null;}).filter(Boolean);
    // Hole difficulty
    const holeTotals=Array(18).fill(0).map((_,i)=>{const ss=completed.map(r=>{const s=scores[r.id]?.[player.id];if(!s||!s[i])return null;const course=COURSES[r.course_id]||COURSES.snee;return s[i]-course.holes[i].par;}).filter(x=>x!==null);return ss.length?ss.reduce((a,b)=>a+b,0)/ss.length:0;});
    const hardestHole=holeTotals.reduce((bi,v,i)=>v>holeTotals[bi]?i:bi,0);
    const easiestHole=holeTotals.reduce((bi,v,i)=>v<holeTotals[bi]?i:bi,0);
    return{b,e,p,bo,d,ac,best,worst,rp,avg:rp?Math.round(tot/rp):null,wins,streak,trend,hardestHole:hardestHole+1,easiestHole:easiestHole+1};
  },[completed.length]);
  return(
    <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,.9)',zIndex:400,display:'flex',alignItems:'flex-end',justifyContent:'center'}} onClick={onClose}>
      <div style={{background:'#0a150a',border:'1px solid '+pColor+'33',borderRadius:'22px 22px 0 0',padding:'22px 18px',width:'100%',maxWidth:700,maxHeight:'85vh',overflowY:'auto',animation:'fadeUp .3s'}} onClick={e=>e.stopPropagation()}>
        <div style={{width:36,height:4,background:'rgba(255,255,255,.12)',borderRadius:2,margin:'0 auto 18px'}}/>
        <div style={{display:'flex',alignItems:'center',gap:14,marginBottom:20}}>
          <div style={{width:60,height:60,borderRadius:'50%',background:pColor,display:'flex',alignItems:'center',justifyContent:'center',fontSize:28,color:'#000',fontWeight:900}}>{player.emoji}</div>
          <div style={{flex:1}}><div style={{fontFamily:'Bebas Neue',fontSize:28,letterSpacing:2,color:pColor}}>{pName}</div><div style={{fontSize:11,color:'rgba(255,255,255,.25)'}}>HCP {hdcp} · {st.rp} rounds played</div></div>
          {st.best&&<div style={{textAlign:'right'}}><div style={{fontFamily:'Bebas Neue',fontSize:38,color:pColor,lineHeight:1}}>{st.best}</div><div style={{fontSize:8,color:'rgba(255,255,255,.2)',letterSpacing:2}}>BEST ROUND</div></div>}
        </div>
        <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:7,marginBottom:14}}>
          {[{n:st.wins,l:'WINS',c:'#ffd700'},{n:st.streak,l:'WIN STREAK',c:'#ff9100'},{n:st.avg||'--',l:'AVG SCORE',c:pColor}].map((s,i)=>(
            <div key={i} style={{background:'rgba(0,0,0,.4)',borderRadius:12,padding:'12px 6px',textAlign:'center'}}>
              <div style={{fontFamily:'Bebas Neue',fontSize:28,color:s.c,lineHeight:1}}>{s.n}</div>
              <div style={{fontSize:8,color:'rgba(255,255,255,.2)',letterSpacing:2,fontWeight:700,marginTop:3}}>{s.l}</div>
            </div>
          ))}
        </div>
        <div style={{display:'grid',gridTemplateColumns:'repeat(5,1fr)',gap:5,marginBottom:12}}>
          {[{n:st.ac,l:'ACE',c:'#ffd700'},{n:st.e,l:'EAGLE',c:'#00e676'},{n:st.b,l:'BIRDIE',c:'#69f0ae'},{n:st.p,l:'PAR',c:'#555'},{n:st.bo+st.d,l:'BOG+',c:'#ff5252'}].map((s,i)=>(
            <div key={i} style={{background:'rgba(0,0,0,.3)',borderRadius:10,padding:'8px 3px',textAlign:'center'}}>
              <div style={{fontFamily:'Bebas Neue',fontSize:22,color:s.n>0?s.c:'#222'}}>{s.n}</div>
              <div style={{fontSize:7,color:'rgba(255,255,255,.18)',fontWeight:700,letterSpacing:1}}>{s.l}</div>
            </div>
          ))}
        </div>
        {st.rp>0&&(()=>{const tot=Math.max(1,st.e+st.b+st.p+st.bo+st.d);return(<div style={{height:7,borderRadius:3,overflow:'hidden',display:'flex',gap:1,marginBottom:12}}>{[{v:st.e,c:'#00e676'},{v:st.b,c:'#69f0ae'},{v:st.p,c:'#444'},{v:st.bo,c:'#ff9100'},{v:st.d,c:'#ff5252'}].map((bb,i)=>bb.v>0&&<div key={i} style={{flex:bb.v/tot,background:bb.c,minWidth:2}}/>)}</div>);})()}
        {st.trend.length>1&&(<div style={{marginBottom:12}}><div style={{fontSize:8,color:'rgba(255,255,255,.2)',letterSpacing:3,fontWeight:700,marginBottom:6}}>SCORE TREND</div><div style={{display:'flex',gap:3,alignItems:'flex-end',height:46}}>{st.trend.map((t,i)=>{const mn=Math.min(...st.trend),mx=Math.max(...st.trend);const h=mx===mn?22:Math.round(((mx-t)/(mx-mn))*36)+10;return(<div key={i} style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',gap:2}}><div style={{width:'100%',background:i===st.trend.length-1?pColor:'rgba(255,255,255,.12)',borderRadius:'3px 3px 0 0',height:h}}/><div style={{fontSize:8,color:'rgba(255,255,255,.25)',fontWeight:700}}>{t}</div></div>);})}</div></div>)}
        {st.rp>2&&<div style={{display:'flex',gap:8,marginBottom:8}}>
          <div style={{flex:1,background:'rgba(255,82,82,.08)',borderRadius:12,padding:'10px',textAlign:'center'}}><div style={{fontSize:9,color:'#ff5252',letterSpacing:1,fontWeight:700,marginBottom:3}}>NEMESIS HOLE</div><div style={{fontFamily:'Bebas Neue',fontSize:24,color:'#ff5252'}}>#{st.hardestHole}</div></div>
          <div style={{flex:1,background:'rgba(0,230,118,.08)',borderRadius:12,padding:'10px',textAlign:'center'}}><div style={{fontSize:9,color:'#00e676',letterSpacing:1,fontWeight:700,marginBottom:3}}>BEST HOLE</div><div style={{fontFamily:'Bebas Neue',fontSize:24,color:'#00e676'}}>#{st.easiestHole}</div></div>
        </div>}
        {st.worst&&<div style={{fontSize:10,color:'rgba(255,255,255,.18)',textAlign:'center'}}>Worst round: {st.worst}</div>}
      </div>
    </div>
  );
}

                    <div style={{position:'absolute',top:3,left:settings?.[t.k]?'22px':'3px',width:18,height:18,borderRadius:'50%',background:'#fff',transition:'left .2s'}}/>
                  </div>

            <div style={{marginBottom:16}}>

              <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:8,background:'rgba(255,255,255,.03)',borderRadius:10,padding:'10px 12px'}}>
                <div style={{fontSize:12,fontWeight:700}}>Default Bet/Hole ($)</div>
                <input type="number" value={settings?.defaultBet||5} min={0} max={100} onChange={e=>updateSettings({defaultBet:parseInt(e.target.value)||0})} style={{background:'rgba(0,0,0,.4)',border:'1px solid rgba(0,230,118,.3)',color:'#00e676',padding:'5px 8px',borderRadius:8,width:60,textAlign:'center',fontSize:16,fontWeight:900}}/>

                <input type="number" value={settings?.defaultMulligans||0} min={0} max={6} onChange={e=>updateSettings({defaultMulligans:parseInt(e.target.value)||0})} style={{background:'rgba(0,0,0,.4)',border:'1px solid rgba(255,145,0,.3)',color:'#ff9100',padding:'5px 8px',borderRadius:8,width:60,textAlign:'center',fontSize:16,fontWeight:900}}/>

              <button onClick={()=>{if(confirm('Reset ALL app data? This cannot be undone.')){localStorage.clear();window.location.reload();}}} style={{width:'100%',background:'rgba(255,68,68,.07)',border:'1px solid rgba(255,68,68,.18)',color:'#ff5252',borderRadius:10,padding:'10px',cursor:'pointer',fontSize:11,fontWeight:700}}>🗑️ Reset All Data</button>

function App(){
  const[view,setView]=useState('home');
  const[activeRoundId,setActiveRoundId]=useState(null);
  const[rounds,setRounds]=useState([]);
  const[scores,setScores]=useState({});
  const[extras,setExtras]=useState({});// closestPin, longDrive, mulligans per round
  const[playerSettings,setPlayerSettings]=useState({});
  const[loading,setLoading]=useState(true);
  const[toast,setToast]=useState(null);
  const[menuOpen,setMenuOpen]=useState(false);
  const[profileModal,setProfileModal]=useState(null);
  const[trashPop,setTrashPop]=useState(null);
  const[nextRound,setNextRound]=useState({date:'',teeTime:'08:00',courseId:'snee'});
  const[teamScores,setTeamScores]=useState(()=>{try{return JSON.parse(localStorage.getItem('tcg_ts8')||'{}')}catch{return{}}});
  const[settings,setSettings]=useState(()=>({...DEFAULT_SETTINGS,...getSettings()}));
  const[voteOpen,setVoteOpen]=useState(false);
  useEffect(()=>{document.body.className=settings.theme==='light'?'light':settings.theme==='green'?'green':'';},[settings.theme]);
  useEffect(()=>{if(settings.keepAwake)requestWakeLock();else releaseWakeLock();},[settings.keepAwake]);
  const updateSettings=(u)=>{const ns={...settings,...u};setSettings(ns);saveSettings(ns);};
  const getPlayerName=(id)=>settings.playerNames?.[id]||PLAYERS.find(p=>p.id===id)?.name||id;
  const getPlayerColor=(id)=>settings.playerColors?.[id]||PLAYERS.find(p=>p.id===id)?.color||'#00e676';

  const showToast=(msg,type='success',duration=3000)=>{
    setToast({msg,type});
    setTimeout(()=>setToast(null),duration);
  };

  useEffect(()=>{loadAll();},[]);

  useEffect(()=>{
    const s1=sb.channel('sc-v2').on('postgres_changes',{event:'*',schema:'public',table:'scores'},p=>{
      if(p.eventType==='INSERT'||p.eventType==='UPDATE'){
        const s=p.new;
        setScores(prev=>({...prev,[s.round_id]:{...(prev[s.round_id]||{}),[s.player_id]:s.holes}}));
      }
    }).subscribe();
    const s2=sb.channel('rc-v2').on('postgres_changes',{event:'*',schema:'public',table:'rounds'},p=>{
      if(p.eventType==='INSERT')setRounds(prev=>[p.new,...prev]);
      else if(p.eventType==='UPDATE')setRounds(prev=>prev.map(r=>r.id===p.new.id?p.new:r));
      else if(p.eventType==='DELETE')setRounds(prev=>prev.filter(r=>r.id!==p.old.id));
    }).subscribe();
    return()=>{sb.removeChannel(s1);sb.removeChannel(s2);};
  },[]);

  const loadAll=async()=>{
    setLoading(true);
    try{
      const[{data:rd},{data:sd},{data:ps}]=await Promise.all([
        sb.from('rounds').select('*').order('created_at',{ascending:false}),
        sb.from('scores').select('*'),
        sb.from('player_settings').select('*'),
      ]);
      setRounds(rd||[]);
      const m={};
      for(const s of(sd||[])){if(!m[s.round_id])m[s.round_id]={};m[s.round_id][s.player_id]=s.holes;}
      setScores(m);
      const p={};
      for(const s of(ps||[]))p[s.player_id]=s.handicap;
      setPlayerSettings(p);
      const live=(rd||[]).find(r=>!r.completed);
      if(live)setActiveRoundId(live.id);
    }catch(e){console.error(e);}
    setLoading(false);
  };

  const startRound=async(setup)=>{
    try{
      const hdcp={};PLAYERS.forEach(p=>{hdcp[p.id]=playerSettings[p.id]??p.defaultHcp;});
      const{data:round,error}=await sb.from('rounds').insert({
        date:setup.date,format:setup.format,team_config:setup.teamConfig,
        tees:setup.tees,bet_amount:setup.betAmount,handicaps:hdcp,
        completed:false,course_id:setup.courseId,
        team_names:setup.teamNames||null,
        mulligans_allowed:setup.mulligansAllowed||0,
      }).select().single();
      if(error)throw error;
      await sb.from('scores').insert(PLAYERS.map(p=>({round_id:round.id,player_id:p.id,holes:Array(18).fill(0)})));
      // Init extras
      setExtras(prev=>({...prev,[round.id]:{mulligans:{ben:0,thomas:0,max:0,luke:0},closestPin:{},longDrive:{}}}));
      if(isTeamFmt(setup.format)&&setup.teamConfig!=='solo'){const tc=TEAM_CONFIGS.find(t=>t.id===setup.teamConfig);if(tc){const nts={...teamScores,[round.id]:tc.teams.map(()=>Array(18).fill(0))};setTeamScores(nts);localStorage.setItem('tcg_ts8',JSON.stringify(nts));}}
      setActiveRoundId(round.id);
      setView('scorecard');
      showToast('Round started! Good luck 🏌️');
      Haptic.medium();
    }catch(e){
      console.error(e);
      showToast('Error starting round. Try running the SQL update in Supabase.','error');
    }
  };

  const updateScore=async(roundId,playerId,holeIdx,value)=>{
    const cur=scores[roundId]?.[playerId]||Array(18).fill(0);
    const upd=[...cur];
    const newVal=value===null?0:Math.max(1,parseInt(value)||0);
    const oldVal=upd[holeIdx];
    upd[holeIdx]=newVal;
    setScores(prev=>({...prev,[roundId]:{...(prev[roundId]||{}),[playerId]:upd}}));
    await sb.from('scores').update({holes:upd,updated_at:new Date().toISOString()}).eq('round_id',roundId).eq('player_id',playerId);
    // Sound & haptic
    const round=rounds.find(r=>r.id===roundId);
    const course=COURSES[round?.course_id]||COURSES.snee;
    const hole=course.holes[holeIdx];
    if(hole&&newVal>0&&newVal!==oldVal){
      const d=newVal-hole.par;
      if(newVal===1){if(settings?.soundOn!==false)Sound.play('ace');if(settings?.hapticOn!==false)Haptic.celebrate();showToast('HOLE IN ONE!!! 🎉🎉🎉','success',5000);}
      else if(d<=-2){if(settings?.soundOn!==false)Sound.play('eagle');if(settings?.hapticOn!==false)Haptic.celebrate();showToast(`EAGLE! 🦅🦅`,'success');}
      else if(d===-1){if(settings?.soundOn!==false)Sound.play('birdie');if(settings?.hapticOn!==false)Haptic.medium();}
      else if(d>=2){if(settings?.soundOn!==false)Sound.play('bogey');if(settings?.hapticOn!==false)Haptic.light();const pl=PLAYERS.find(p=>p.id===playerId);if(pl){setTrashPop({line:TRASH_LINES[Math.floor(Math.random()*TRASH_LINES.length)](pl.name,newVal)});setTimeout(()=>setTrashPop(null),4000);}}
      else{if(settings?.soundOn!==false)Sound.play('click');if(settings?.hapticOn!==false)Haptic.light();}
    }
  };

  const updateTeamScore=(roundId,ti,hi,val)=>{const cur=JSON.parse(JSON.stringify(teamScores[roundId]||[]));if(!cur[ti])return;cur[ti][hi]=Math.max(1,parseInt(val)||0);const nts={...teamScores,[roundId]:cur};setTeamScores(nts);localStorage.setItem('tcg_ts8',JSON.stringify(nts));};
  const finishRound=async(roundId)=>{
    await sb.from('rounds').update({completed:true}).eq('id',roundId);
    setActiveRoundId(null);
    setView('leaderboard');
    showToast('Round complete! 🏆');
    Haptic.celebrate();
  };

  const deleteRound=async(roundId)=>{
    await sb.from('rounds').delete().eq('id',roundId);
    if(activeRoundId===roundId)setActiveRoundId(null);
    showToast('Round deleted');
  };

  const updateHandicap=async(pid,val)=>{
    const hcp=parseInt(val)||0;
    setPlayerSettings(prev=>({...prev,[pid]:hcp}));
    await sb.from('player_settings').upsert({player_id:pid,handicap:hcp,updated_at:new Date().toISOString()});
  };

  const updateExtras=(roundId,type,data)=>{
    setExtras(prev=>({...prev,[roundId]:{...(prev[roundId]||{}),  [type]:{...((prev[roundId]||{})[type]||{}),...data}}}));
  };

  const activeRound=rounds.find(r=>r.id===activeRoundId);
  const activeScores=activeRoundId?(scores[activeRoundId]||{}):{};
  const activeExtras=activeRoundId?(extras[activeRoundId]||{}):{};
  const latestCompleted=rounds.find(r=>r.completed);

  if(loading)return(
    <div style={{minHeight:'100vh',background:'#030806',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',gap:16}}>
      <div style={{fontSize:56,animation:'bounce 1s infinite'}}>⛳</div>
      <div style={{color:'#00e676',fontSize:12,letterSpacing:4,fontWeight:700}}>LOADING...</div>
    </div>
  );

  return(
    <div style={{minHeight:'100vh',background:settings.theme==='light'?'#f0f0eb':settings.theme==='green'?'#061a06':'#030806',paddingBottom:100}}>
      {profileModal&&<PlayerProfile player={profileModal} rounds={rounds} scores={scores} playerSettings={playerSettings} settings={settings} onClose={()=>setProfileModal(null)}/>}
      {menuOpen&&<HamburgerMenu onClose={()=>setMenuOpen(false)} rounds={rounds} scores={scores} nextRound={nextRound} setNextRound={setNextRound} settings={settings} updateSettings={updateSettings} deleteRound={deleteRound}/>}
      {voteOpen&&<FormatVote onClose={()=>setVoteOpen(false)}/>}
      {trashPop&&<div style={{position:'fixed',bottom:100,left:14,right:14,zIndex:990,background:'rgba(20,10,0,.96)',border:'1px solid rgba(255,145,0,.4)',borderRadius:18,padding:'14px 16px',animation:'fadeUp .4s'}}><div style={{fontSize:9,color:'rgba(255,145,0,.5)',letterSpacing:2,fontWeight:700,marginBottom:4}}>🎤 ROAST</div><div style={{fontSize:13,color:'rgba(255,255,255,.75)',lineHeight:1.6,fontStyle:'italic'}}>'{trashPop.line}'</div></div>}
      {toast&&(
        <div style={{position:'fixed',top:16,left:'50%',transform:'translateX(-50%)',zIndex:9999,background:toast.type==='error'?'#c62828':'#00e676',color:toast.type==='error'?'#fff':'#000',padding:'11px 22px',borderRadius:30,fontSize:13,fontWeight:800,boxShadow:'0 8px 32px rgba(0,0,0,.6)',whiteSpace:'nowrap',animation:'slideDown .3s ease',letterSpacing:.5}}>{toast.msg}</div>
      )}

      <header style={{position:'sticky',top:0,zIndex:100,background:'rgba(3,8,6,.97)',backdropFilter:'blur(20px)',borderBottom:'1px solid rgba(0,230,118,.08)',padding:'11px 15px',display:'flex',alignItems:'center',justifyContent:'space-between'}}>
        <button onClick={()=>setMenuOpen(true)} style={{background:'transparent',border:'1px solid rgba(255,255,255,.08)',color:'rgba(255,255,255,.4)',width:36,height:36,borderRadius:10,cursor:'pointer',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',gap:4,flexShrink:0}}><div style={{width:15,height:2,background:'currentColor',borderRadius:1}}/><div style={{width:15,height:2,background:'currentColor',borderRadius:1}}/><div style={{width:15,height:2,background:'currentColor',borderRadius:1}}/></button>
        <div style={{display:'flex',alignItems:'center',gap:10,cursor:'pointer',flex:1}} onClick={()=>setView('home')}>
          <span style={{fontSize:22}}>⛳</span>
          <div>
            <div style={{fontFamily:'Bebas Neue',fontSize:19,letterSpacing:3,color:'#00e676',lineHeight:1}}>THURSDAY CREW</div>
            <div style={{fontSize:8,color:'#1a4a1a',letterSpacing:3,fontWeight:700}}>SOUTH CAROLINA GOLF</div>
          </div>
        </div>
        <div style={{display:'flex',gap:4}}>
          {[{id:'home',i:'🏠'},{id:'setup',i:'🎯'},{id:'stats',i:'📊'},{id:'history',i:'📋'}].map(n=>(
            <button key={n.id} onClick={()=>setView(n.id)} style={{background:view===n.id?'rgba(0,230,118,.12)':'transparent',border:`1px solid ${view===n.id?'rgba(0,230,118,.4)':'rgba(255,255,255,.04)'}`,color:view===n.id?'#00e676':'#444',padding:'7px 10px',borderRadius:8,cursor:'pointer',fontSize:14,transition:'all .2s'}}>{n.i}</button>
          ))}
          {activeRound&&<button onClick={()=>setView('scorecard')} style={{background:'rgba(255,68,68,.15)',border:'1px solid rgba(255,68,68,.5)',color:'#ff4444',padding:'7px 10px',borderRadius:8,cursor:'pointer',fontSize:13,fontWeight:700,animation:'pulse 2s infinite',letterSpacing:.5}}>🔴 LIVE</button>}
        </div>
      </header>

      <div style={{maxWidth:700,margin:'0 auto',padding:'16px 13px'}}>
        {view==='home'&&<HomeView rounds={rounds} scores={scores} playerSettings={playerSettings} activeRound={activeRound} updateHandicap={updateHandicap} setView={setView} setActiveRoundId={setActiveRoundId} nextRound={nextRound} onPlayerClick={p=>setProfileModal(p)} settings={settings} onVote={()=>setVoteOpen(true)}/>}
        {view==='setup'&&<SetupView startRound={startRound} playerSettings={playerSettings}/>}
        {view==='scorecard'&&activeRound&&<ScorecardView round={activeRound} scores={activeScores} teamScores={teamScores[activeRoundId]||[]} extras={activeExtras} updateScore={updateScore} updateTeamScore={updateTeamScore} finishRound={finishRound} updateExtras={updateExtras} playerSettings={playerSettings} rounds={rounds} settings={settings}/>}
        {view==='history'&&<HistoryView rounds={rounds} scores={scores} deleteRound={deleteRound} setActiveRoundId={setActiveRoundId} setView={setView}/>}
        {view==='stats'&&<StatsView rounds={rounds} scores={scores} playerSettings={playerSettings} settings={settings}/>}
        {view==='leaderboard'&&latestCompleted&&<LeaderboardView round={latestCompleted} scores={scores[latestCompleted.id]||{}} teamScores={teamScores[latestCompleted?.id]||[]} playerSettings={playerSettings} settings={settings} setView={setView}/>}
      </div>
    </div>
  );
}

// ══════════════════════════════════════════════
// HOME VIEW
// ══════════════════════════════════════════════
function HomeView({rounds,scores,playerSettings,activeRound,updateHandicap,setView,setActiveRoundId,nextRound,onPlayerClick,settings,onVote}){
  const[editHdcp,setEditHdcp]=useState(false);
  const completed=rounds.filter(r=>r.completed);
  const thisMonth=completed.filter(r=>r.date?.startsWith(new Date().toISOString().slice(0,7))).length;

  // Season standings
  const seasonStandings=PLAYERS.map(p=>{
    let wins=0,totalStrokes=0,rounds_played=0,best=null,streak=0,currentStreak=0;
    const sorted=[...completed].sort((a,b)=>a.date>b.date?1:-1);
    sorted.forEach(r=>{
      const s=scores[r.id]?.[p.id];if(!s)return;
      const tot=s.reduce((a,b)=>a+(b||0),0);if(!tot)return;
      totalStrokes+=tot;rounds_played++;
      if(best===null||tot<best)best=tot;
      const allTots=PLAYERS.map(pp=>({id:pp.id,t:(scores[r.id]?.[pp.id]||[]).reduce((a,b)=>a+(b||0),0)})).filter(x=>x.t>0).sort((a,b)=>a.t-b.t);
      if(allTots[0]?.id===p.id){wins++;currentStreak++;}else{streak=Math.max(streak,currentStreak);currentStreak=0;}
    });
    streak=Math.max(streak,currentStreak);
    return{...p,wins,rounds_played,best,streak,avg:rounds_played?Math.round(totalStrokes/rounds_played):null};
  }).sort((a,b)=>b.wins-a.wins);

  const getBest=pid=>seasonStandings.find(p=>p.id===pid)?.best;

  return(
    <div style={{display:'flex',flexDirection:'column',gap:16,animation:'fadeUp .4s ease'}}>
      {isThursday()&&<div style={{background:'linear-gradient(135deg,rgba(255,215,0,.15),rgba(255,145,0,.08))',border:'2px solid rgba(255,215,0,.35)',borderRadius:20,padding:'18px 20px',textAlign:'center',marginBottom:4}}><div style={{fontFamily:'Bebas Neue',fontSize:36,letterSpacing:3,color:'#ffd700',lineHeight:1}}>🏌️ GAME DAY!</div><div style={{fontSize:13,color:'rgba(255,255,255,.5)',marginTop:6}}>It's Thursday — tee it up!</div>{nextRound&&nextRound.teeTime&&<div style={{fontSize:13,color:'#ffd700',fontWeight:700,marginTop:4}}>Tee time: {nextRound.teeTime}</div>}</div>}
      {!isThursday()&&<div style={{background:'rgba(0,230,118,.04)',border:'1px solid rgba(0,230,118,.1)',borderRadius:14,padding:'12px 15px',display:'flex',alignItems:'center',gap:14,marginBottom:4}}><div style={{fontFamily:'Bebas Neue',fontSize:38,color:'#00e676',lineHeight:1,minWidth:36,textAlign:'center'}}>{daysUntilThurs()}</div><div><div style={{fontWeight:800,fontSize:13}}>DAYS UNTIL THURSDAY</div>{nextRound&&nextRound.teeTime&&<div style={{fontSize:10,color:'rgba(255,255,255,.3)',marginTop:1}}>{COURSES[nextRound.courseId]?.name||'Snee Farm'} · {nextRound.teeTime}</div>}</div></div>}
      {/* Hero */}
      <div style={{background:'linear-gradient(160deg,#071407,#0d2a0d,#071407)',border:'1px solid rgba(0,230,118,.15)',borderRadius:22,padding:'24px 20px',overflow:'hidden',position:'relative'}}>
        <div style={{position:'absolute',top:-30,right:-30,fontSize:160,opacity:.04,transform:'rotate(-15deg)'}}>⛳</div>
        <div style={{fontSize:10,color:'#00e676',letterSpacing:4,fontWeight:800,marginBottom:6}}>MOUNT PLEASANT · SC</div>

const isTeamFmt=id=>TEAM_FMTS.includes(id);
const isThursday=()=>new Date().getDay()===4;
const daysUntilThurs=()=>{const d=new Date().getDay();return d===4?0:(4-d+7)%7;};

const FMT_TIPS={
  stroke:'Lowest total strokes wins. Every stroke counts.',
  scramble:'All tee off — pick the BEST shot, everyone plays from there. One team score per hole.',
  bestball:'Everyone plays their own ball. Your BEST score on the team counts each hole.',
  stableford:'Points per hole: Eagle=4, Birdie=3, Par=2, Bogey=1, Double+=0. Most points wins.',
  nassau:'THREE separate bets — Front 9, Back 9, and Total 18. $'+5+' each = $15 total at stake.',
  skins:'Lowest score on a hole wins that skin. Ties CARRY to next hole. Most skins wins.',

  wolf:'Rotating Wolf picks a partner after seeing drives — or goes SOLO for double points.',

function ScorecardView({round,scores,teamScores,extras,updateScore,updateTeamScore,finishRound,updateExtras,playerSettings,rounds}){
  const[holeIdx,setHoleIdx]=useState(0);
  const[showAll,setShowAll]=useState(false);
  const[wolfPick,setWolfPick]=useState({});
  const[bingo,setBingo]=useState(()=>{try{return JSON.parse(localStorage.getItem('bg_'+round.id)||'{}')}catch{return{}}});
  const[chairman,setChairman]=useState(null);
  const[chairWins,setChairWins]=useState({});
  const[holeNotes,setHoleNotes]=useState(()=>{try{return JSON.parse(localStorage.getItem('hn_'+round.id)||'{}')}catch{return{}}});
  const[showNote,setShowNote]=useState(false);
  const[noteText,setNoteText]=useState('');
  const[startTime]=useState(()=>Date.now());
  const[elapsed,setElapsed]=useState(0);
  const[mulligans,setMulligans]=useState({ben:0,thomas:0,max:0,luke:0});
  const[chatOpen,setChatOpen]=useState(false);
  const[chatMsgs,setChatMsgs]=useState(()=>{try{return JSON.parse(localStorage.getItem('chat_'+round.id)||'[]')}catch{return[]}});
  const[chatInput,setChatInput]=useState('');
  const[chatPlayer,setChatPlayer]=useState('ben');

  const course=COURSES[round.course_id]||COURSES.snee;
  const holes=course.holes;
  const fmt=round.format;
  const hole=holes[holeIdx];
  const teamCfg=TEAM_CONFIGS.find(t=>t.id===round.team_config);
  const teamMode=isTeamFmt(fmt)&&round.team_config!=='solo';
  const teamNames=round.team_names||['Team 1','Team 2'];
  const mulligansAllowed=round.mulligans_allowed||0;
  const betAmt=round.bet_amount||5;

  useEffect(()=>{
    const t=setInterval(()=>setElapsed(Math.floor((Date.now()-startTime)/1000)),10000);
    return()=>clearInterval(t);
  },[]);

  const fmtTime=s=>{const h=Math.floor(s/3600),m=Math.floor((s%3600)/60);return h>0?h+'h '+m+'m':m+'m';};
  const getScore=(pid,hi)=>(scores[pid]||[])[hi]||0;
  const getTScore=(ti,hi)=>(teamScores||[])[ti]?.[hi]||0;
  const holesPlayed=teamMode
    ?(teamScores||[]).reduce((mx,t)=>Math.max(mx,t.filter(s=>s>0).length),0)
    :PLAYERS.reduce((mx,p)=>Math.max(mx,(scores[p.id]||[]).filter(s=>s>0).length),0);

  // Handicap strokes on this hole
  const getStrokes=(pid)=>{
    const hdcp=playerSettings[pid]??PLAYERS.find(p=>p.id===pid)?.defaultHcp??20;
    return Math.floor(hdcp/18)+(hole.hcp<=(hdcp%18)?1:0);
  };

  // Skins list
  const skinsList=useMemo(()=>holes.map((_,i)=>{
    const all=PLAYERS.map(p=>({id:p.id,s:getScore(p.id,i)})).filter(x=>x.s>0);
    if(all.length<4)return null;
    const min=Math.min(...all.map(x=>x.s));
    const w=all.filter(x=>x.s===min);
    return w.length===1?w[0].id:null;
  }),[scores]);

  // Running standings per format
  const getStandings=()=>{
    if(teamMode&&teamCfg&&fmt!=='vegas'&&fmt!=='nassau'){
      return teamCfg.teams.map((team,ti)=>{
        const tClr=PLAYERS.find(p=>p.id===team[0])?.color||'#00e676';
        const tS=(teamScores||[])[ti]||[];
        if(fmt==='match'){
          const other=(teamScores||[])[ti===0?1:0]||[];
          let up=0;
          tS.forEach((s,i)=>{const o=other[i]||0;if(s>0&&o>0){if(s<o)up++;else if(o<s)up--;}});
          return{id:'t'+ti,name:teamNames[ti],color:tClr,emoji:(ti+1)+'',main:up>0?up+' UP':up<0?Math.abs(up)+' DN':'AS',sub:fmt==='match'?'holes':'',mainColor:up>0?'#00e676':up<0?'#ff5252':'#888'};
        }
        const tp=tS.reduce((a,s,i)=>s>0&&holes[i]?a+(s-holes[i].par):a,0);
        return{id:'t'+ti,name:teamNames[ti],color:tClr,emoji:(ti+1)+'',main:tpStr(tp),sub:'to par',mainColor:tp<0?'#00e676':tp>0?'#ff5252':'#888'};
      });
    }
    switch(fmt){
      case 'stableford':return PLAYERS.map(p=>({...p,main:holes.reduce((a,h,i)=>{const s=getScore(p.id,i);return s>0?a+sfPts(s,h.par):a;},0)+'pts',sub:'stableford',mainColor:'#ffd700'})).sort((a,b)=>parseInt(b.main)-parseInt(a.main));
      case 'skins':return PLAYERS.map(p=>{const sk=skinsList.filter(x=>x===p.id).length;return{...p,main:sk+'🩳',sub:'$'+(sk*betAmt),mainColor:sk>0?'#9b59b6':'#555'};}).sort((a,b)=>parseInt(b.main)-parseInt(a.main));
      case 'wolf':{
        const wolfOrder=['ben','thomas','max','luke'];
        const wolfId=wolfOrder[holeIdx%4];
        return PLAYERS.map(p=>{const tp=holes.reduce((a,h,i)=>{const s=getScore(p.id,i);return s>0?a+(s-h.par):a;},0);return{...p,main:tpStr(tp),sub:p.id===wolfId?'🐺 WOLF':'',mainColor:p.id===wolfId?'#ffd700':tp<0?'#00e676':tp>0?'#ff5252':'#888'};});
      }
      case 'bingo':{
        const pts={};PLAYERS.forEach(p=>{pts[p.id]=0;});
        Object.values(bingo).forEach(h=>{if(h.on)pts[h.on]++;if(h.closest)pts[h.closest]++;if(h.in)pts[h.in]++;});
        return PLAYERS.map(p=>({...p,main:(pts[p.id]||0)+'pts',sub:'bingo pts',mainColor:'#ffd700'})).sort((a,b)=>parseInt(b.main)-parseInt(a.main));
      }
      case 'chairman':return PLAYERS.map(p=>({...p,main:(chairWins[p.id]||0)+'',sub:chairman===p.id?'👑 CHAIRMAN':'holes as champ',mainColor:chairman===p.id?'#ffd700':'#888'})).sort((a,b)=>parseInt(b.main)-parseInt(a.main));
      case 'quota':return PLAYERS.map(p=>{const hdcp=playerSettings[p.id]??p.defaultHcp;const quota=36-Math.min(hdcp,36);const pts=holes.reduce((a,h,i)=>{const s=getScore(p.id,i);return s>0?a+sfPts(s,h.par):a;},0);const diff=pts-quota;return{...p,main:pts+'pts',sub:'quota '+quota+' ('+( diff>=0?'+':'')+diff+')',mainColor:diff>=0?'#00e676':'#ff5252'};});
      case 'nassau':{
        if(!teamCfg||teamCfg.teams.length<2)return[];
        const f0=(teamScores||[])[0]?.slice(0,9).reduce((a,x)=>a+(x||0),0)||0;
        const f1=(teamScores||[])[1]?.slice(0,9).reduce((a,x)=>a+(x||0),0)||0;
        const b0=(teamScores||[])[0]?.slice(9).reduce((a,x)=>a+(x||0),0)||0;
        const b1=(teamScores||[])[1]?.slice(9).reduce((a,x)=>a+(x||0),0)||0;
        const t0=f0+b0,t1=f1+b1;
        const c0=PLAYERS.find(p=>p.id===teamCfg.teams[0][0])?.color||'#00e676';
        const c1=PLAYERS.find(p=>p.id===teamCfg.teams[1][0])?.color||'#ff9100';
        const fW=f0>0&&f1>0?(f0<f1?0:f0>f1?1:-1):-1;
        const bW=b0>0&&b1>0?(b0<b1?0:b0>b1?1:-1):-1;
        const tW=t0>0&&t1>0?(t0<t1?0:t0>t1?1:-1):-1;
        const won0=[fW===0,bW===0,tW===0].filter(Boolean).length;
        const won1=[fW===1,bW===1,tW===1].filter(Boolean).length;
        return[
          {id:'t0',name:teamNames[0],color:c0,emoji:'1',main:'$'+(won0*betAmt),sub:'F:'+(fW===0?'W':fW===1?'L':'—')+' B:'+(bW===0?'W':bW===1?'L':'—')+' T:'+(tW===0?'W':tW===1?'L':'—'),mainColor:won0>won1?'#00e676':won0<won1?'#ff5252':'#888'},
          {id:'t1',name:teamNames[1],color:c1,emoji:'2',main:'$'+(won1*betAmt),sub:'F:'+(fW===1?'W':fW===0?'L':'—')+' B:'+(bW===1?'W':bW===0?'L':'—')+' T:'+(tW===1?'W':tW===0?'L':'—'),mainColor:won1>won0?'#00e676':won1<won0?'#ff5252':'#888'},
        ];
      }
      case 'vegas':{
        if(!teamCfg||teamCfg.teams.length<2)return[];
        const getV=(team,i)=>{const ss=team.map(id=>getScore(id,i)).filter(x=>x>0).sort((a,b)=>a-b);return ss.length>=2?parseInt(''+ss[0]+ss[1]):0;};
        let p0=0,p1=0;
        holes.forEach((_,i)=>{const v0=getV(teamCfg.teams[0],i),v1=getV(teamCfg.teams[1],i);if(v0>0&&v1>0){if(v0<v1)p0+=v1-v0;else if(v1<v0)p1+=v0-v1;}});
        const c0=PLAYERS.find(p=>p.id===teamCfg.teams[0][0])?.color||'#00e676';
        const c1=PLAYERS.find(p=>p.id===teamCfg.teams[1][0])?.color||'#ff9100';
        return[
          {id:'t0',name:teamNames[0],color:c0,emoji:'1',main:'$'+p0,sub:'vegas pts',mainColor:p0>p1?'#00e676':'#888'},
          {id:'t1',name:teamNames[1],color:c1,emoji:'2',main:'$'+p1,sub:'vegas pts',mainColor:p1>p0?'#00e676':'#888'},
        ];
      }
      default:{
        return PLAYERS.map(p=>{const tp=holes.reduce((a,h,i)=>{const s=getScore(p.id,i);return s>0?a+(s-h.par):a;},0);return{...p,main:tpStr(tp),sub:'to par',mainColor:tp<0?'#00e676':tp>0?'#ff5252':'#888'};});
      }
    }
  };

  const standings=getStandings();
  const wolfOrder=['ben','thomas','max','luke'];
  const currentWolfId=fmt==='wolf'?wolfOrder[holeIdx%4]:null;
  const currentWolf=currentWolfId?PLAYERS.find(p=>p.id===currentWolfId):null;

  const saveBingo=(hi,key,pid)=>{
    const n={...bingo,[hi]:{...(bingo[hi]||{}),[key]:bingo[hi]?.[key]===pid?null:pid}};
    setBingo(n);localStorage.setItem('bg_'+round.id,JSON.stringify(n));
  };

  const handleChairmanWin=(pid)=>{
    if(!chairman){setChairman(pid);setChairWins(w=>({...w,[pid]:(w[pid]||0)+1}));return;}
    if(pid!==chairman){setChairWins(w=>({...w,[chairman]:(w[chairman]||0)+1}));setChairman(pid);}
    else setChairWins(w=>({...w,[chairman]:(w[chairman]||0)+1}));
  };

  const sendChat=(pid,msg)=>{
    if(!msg.trim())return;
    const p=PLAYERS.find(x=>x.id===pid);
    const m={pid,name:p?.name,color:p?.color,msg,time:Date.now(),hole:hole.hole};
    const n=[...chatMsgs,m];setChatMsgs(n);localStorage.setItem('chat_'+round.id,JSON.stringify(n));setChatInput('');
    Haptic.light();
  };

  const fmtIcon=FORMATS.find(f=>f.id===fmt)?.icon||'⛳';
  const fmtLabel=FORMATS.find(f=>f.id===fmt)?.label||fmt;

  return(
    <div style={{display:'flex',flexDirection:'column',gap:10,animation:'fadeUp .3s'}}>

      {/* ── FORMAT HEADER ── */}
      <div style={{background:'linear-gradient(135deg,rgba(0,230,118,.1),rgba(0,200,83,.04))',border:'1px solid rgba(0,230,118,.18)',borderRadius:18,padding:'14px 16px'}}>
        <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:8}}>
          <span style={{fontSize:26}}>{fmtIcon}</span>
          <div style={{flex:1}}>
            <div style={{fontFamily:'Bebas Neue',fontSize:20,letterSpacing:2}}>{fmtLabel}</div>
            <div style={{fontSize:9,color:'rgba(255,255,255,.2)',marginTop:1}}>{round.date} · {course.name} · {round.tees?.toUpperCase()} · {fmtTime(elapsed)}</div>
          </div>
          <div style={{display:'flex',flexDirection:'column',alignItems:'flex-end',gap:3}}>
            <div style={{background:'#00e676',color:'#000',borderRadius:20,padding:'3px 11px',fontSize:12,fontWeight:900}}>{holesPlayed}/18</div>
            <div style={{fontSize:9,color:'rgba(0,230,118,.5)',fontWeight:700}}>⏱ {fmtTime(elapsed)}</div>
          </div>
        </div>
        <div style={{background:'rgba(0,230,118,.07)',borderRadius:10,padding:'8px 10px',fontSize:10,color:'rgba(0,230,118,.7)',lineHeight:1.5}}>
          {FMT_TIPS[fmt]||''}
        </div>
      </div>

      {/* ── WEATHER ── */}
      <WeatherWidget lat={course.lat} lon={course.lon} courseName={course.name}/>

      {/* ── LIVE STANDINGS STRIP ── */}
      <div style={{display:'flex',gap:6,overflowX:'auto',paddingBottom:2}}>
        {standings.map((p,i)=>(
          <div key={p.id||i} style={{flex:'0 0 auto',display:'flex',flexDirection:'column',alignItems:'center',gap:3,background:i===0?'rgba(255,215,0,.08)':'rgba(255,255,255,.04)',border:`1px solid ${i===0?'rgba(255,215,0,.3)':'rgba(255,255,255,.07)'}`,borderRadius:12,padding:'9px 12px',minWidth:74,position:'relative'}}>
            {i===0&&<div style={{position:'absolute',top:-6,fontSize:12}}>🏆</div>}
            <div style={{width:30,height:30,borderRadius:'50%',background:p.color,display:'flex',alignItems:'center',justifyContent:'center',fontWeight:900,fontSize:13,color:'#000'}}>{p.emoji||p.name?.[0]}</div>
            <div style={{fontSize:11,fontWeight:800,color:'rgba(255,255,255,.6)'}}>{p.name?.split(' ')[0]||p.name}</div>
            <div style={{fontWeight:900,fontSize:15,color:p.mainColor||p.color}}>{p.main}</div>
            {p.sub&&<div style={{fontSize:8,color:'rgba(255,255,255,.25)',textAlign:'center'}}>{p.sub}</div>}
          </div>
        ))}
      </div>

      {/* ── HOLE NAVIGATION ── */}
      <div style={{background:'rgba(255,255,255,.04)',border:'1px solid rgba(255,255,255,.07)',borderRadius:16,padding:'12px 14px',display:'flex',alignItems:'center',justifyContent:'space-between'}}>
        <button onClick={()=>{setHoleIdx(Math.max(0,holeIdx-1));Haptic.light();}} disabled={holeIdx===0} style={{background:'rgba(255,255,255,.07)',border:'none',color:'#fff',width:42,height:42,borderRadius:11,cursor:'pointer',fontSize:22,opacity:holeIdx===0?.3:1}}>‹</button>
        <div style={{textAlign:'center'}}>
          <div style={{display:'flex',gap:8,alignItems:'baseline',justifyContent:'center'}}>
            <span style={{fontFamily:'Bebas Neue',fontSize:36,color:'#ffd700',lineHeight:1}}>#{hole.hole}</span>
            <span style={{fontSize:20,color:'#00e676',fontWeight:800}}>Par {hole.par}</span>
          </div>
          <div style={{fontSize:10,color:'rgba(255,255,255,.25)',marginTop:1}}>{hole.yards} yds · HCP Stroke {hole.hcp}</div>
          <div style={{display:'flex',gap:8,justifyContent:'center',marginTop:4}}>
            <span style={{fontSize:9,color:'rgba(255,255,255,.2)',background:'rgba(255,255,255,.06)',padding:'2px 7px',borderRadius:20}}>Front {Math.round(hole.yards*.9)}y</span>
            <span style={{fontSize:9,color:'rgba(255,255,255,.3)',background:'rgba(255,255,255,.08)',padding:'2px 7px',borderRadius:20,fontWeight:700}}>{hole.yards}y Mid</span>
            <span style={{fontSize:9,color:'rgba(255,255,255,.2)',background:'rgba(255,255,255,.06)',padding:'2px 7px',borderRadius:20}}>Back {Math.round(hole.yards*1.05)}y</span>
          </div>
          {holeNotes[holeIdx]&&<div style={{fontSize:9,color:'#ffd700',marginTop:3,fontStyle:'italic'}}>📝 {holeNotes[holeIdx]}</div>}
        </div>
        <button onClick={()=>{setHoleIdx(Math.min(holes.length-1,holeIdx+1));Haptic.light();}} disabled={holeIdx===holes.length-1} style={{background:'rgba(255,255,255,.07)',border:'none',color:'#fff',width:42,height:42,borderRadius:11,cursor:'pointer',fontSize:22,opacity:holeIdx===holes.length-1?.3:1}}>›</button>
      </div>

      {/* ══ WOLF ══ */}
      {fmt==='wolf'&&currentWolf&&(
        <div style={{background:'rgba(255,215,0,.08)',border:'1px solid rgba(255,215,0,.25)',borderRadius:16,padding:'14px 15px'}}>
          <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:10}}>
            <span style={{fontSize:24}}>🐺</span>
            <div>
              <div style={{fontFamily:'Bebas Neue',fontSize:18,letterSpacing:2,color:'#ffd700'}}>{currentWolf.name} IS THE WOLF</div>
              <div style={{fontSize:10,color:'rgba(255,255,255,.3)'}}>Pick a partner after seeing all drives, or go solo for 2x points</div>
            </div>
          </div>
          {!wolfPick[holeIdx]?(
            <div>
              <div style={{fontSize:9,color:'rgba(255,215,0,.5)',letterSpacing:2,fontWeight:700,marginBottom:8}}>WOLF — CHOOSE:</div>
              <div style={{display:'flex',gap:6}}>
                {PLAYERS.filter(p=>p.id!==currentWolfId).map(p=>(
                  <button key={p.id} onClick={()=>setWolfPick(w=>({...w,[holeIdx]:p.id}))} style={{flex:1,background:p.color+'22',border:'1px solid '+p.color+'55',color:p.color,padding:'10px 4px',borderRadius:12,cursor:'pointer',fontSize:12,fontWeight:700}}>{p.name}</button>
                ))}
                <button onClick={()=>setWolfPick(w=>({...w,[holeIdx]:'solo'}))} style={{flex:1,background:'rgba(255,215,0,.12)',border:'1px solid rgba(255,215,0,.3)',color:'#ffd700',padding:'10px 4px',borderRadius:12,cursor:'pointer',fontSize:11,fontWeight:700}}>🐺 SOLO<br/>2x pts</button>
              </div>
            </div>
          ):<div style={{fontSize:13,color:'#ffd700',fontWeight:700,textAlign:'center'}}>{wolfPick[holeIdx]==='solo'?'🐺 Wolf going SOLO — double points!':'🤝 Wolf partnered with '+PLAYERS.find(p=>p.id===wolfPick[holeIdx])?.name}</div>}
        </div>
      )}

      {/* ══ BINGO BANGO BONGO ══ */}
      {fmt==='bingo'&&(
        <div style={{background:'rgba(255,215,0,.06)',border:'1px solid rgba(255,215,0,.2)',borderRadius:16,padding:'14px 15px'}}>
          <div style={{fontFamily:'Bebas Neue',fontSize:18,letterSpacing:2,color:'#ffd700',marginBottom:12}}>🎯 HOLE {hole.hole} — CLAIM YOUR POINTS</div>
          {[{key:'on',icon:'🟢',label:'BINGO — First ball on green'},{key:'closest',icon:'📍',label:'BANGO — Closest to pin (once all on)'},{key:'in',icon:'🏁',label:'BONGO — First to hole out'}].map(({key,icon,label})=>(
            <div key={key} style={{marginBottom:12}}>
              <div style={{fontSize:10,color:'rgba(255,255,255,.4)',letterSpacing:1,fontWeight:700,marginBottom:7}}>{icon} {label}</div>
              <div style={{display:'flex',gap:6}}>
                {PLAYERS.map(p=>{const sel=bingo[holeIdx]?.[key]===p.id;return(
                  <button key={p.id} onClick={()=>saveBingo(holeIdx,key,p.id)} style={{flex:1,background:sel?p.color+'33':'rgba(255,255,255,.04)',border:'1px solid '+(sel?p.color:'rgba(255,255,255,.08)'),color:sel?p.color:'#555',borderRadius:10,padding:'10px 4px',cursor:'pointer',fontSize:12,fontWeight:700,transition:'all .15s'}}>
                    {sel?'✓ ':''}{p.name}
                  </button>
                );})}
              </div>
            </div>
          ))}
          <div style={{borderTop:'1px solid rgba(255,255,255,.06)',paddingTop:10,marginTop:4}}>
            <div style={{fontSize:9,color:'rgba(255,255,255,.25)',letterSpacing:2,fontWeight:700,marginBottom:6}}>RUNNING TOTALS</div>
            <div style={{display:'flex',gap:6}}>
              {PLAYERS.map(p=>{
                const pts=Object.values(bingo).reduce((a,h)=>a+(h.on===p.id?1:0)+(h.closest===p.id?1:0)+(h.in===p.id?1:0),0);
                return<div key={p.id} style={{flex:1,textAlign:'center',background:'rgba(0,0,0,.3)',borderRadius:8,padding:'6px 4px'}}><div style={{fontFamily:'Bebas Neue',fontSize:20,color:pts>0?p.color:'#333'}}>{pts}</div><div style={{fontSize:8,color:'rgba(255,255,255,.2)',fontWeight:700}}>{p.name}</div></div>;
              })}
            </div>
          </div>
        </div>
      )}

      {/* ══ CHAIRMAN ══ */}
      {fmt==='chairman'&&(
        <div style={{background:'rgba(255,215,0,.06)',border:'1px solid rgba(255,215,0,.2)',borderRadius:16,padding:'14px 15px'}}>
          <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:10}}>
            <span style={{fontSize:26}}>👑</span>
            <div style={{flex:1}}>
              <div style={{fontFamily:'Bebas Neue',fontSize:18,letterSpacing:2,color:'#ffd700'}}>{chairman?'CHAIRMAN: '+PLAYERS.find(p=>p.id===chairman)?.name:'NO CHAIRMAN YET'}</div>
              <div style={{fontSize:10,color:'rgba(255,255,255,.3)'}}>Lowest score takes / defends the throne each hole</div>
            </div>
          </div>
          <div style={{fontSize:9,color:'rgba(255,215,0,.5)',letterSpacing:2,fontWeight:700,marginBottom:8}}>TAP WINNER OF HOLE {hole.hole}:</div>
          <div style={{display:'flex',gap:6}}>
            {PLAYERS.map(p=>{const isChair=chairman===p.id;return(
              <button key={p.id} onClick={()=>handleChairmanWin(p.id)} style={{flex:1,background:isChair?p.color+'33':'rgba(255,255,255,.04)',border:'1px solid '+(isChair?p.color:'rgba(255,255,255,.08)'),color:isChair?p.color:'#888',borderRadius:12,padding:'10px 4px',cursor:'pointer',fontSize:11,fontWeight:700}}>
                {isChair?'👑 ':''}{p.name}
                {chairWins[p.id]?<div style={{fontSize:9,opacity:.6}}>{chairWins[p.id]}W</div>:null}
              </button>
            );})}
          </div>
        </div>
      )}

      {/* ══ NASSAU RUNNING BREAKDOWN ══ */}
      {fmt==='nassau'&&isTeam&&teamCfg&&teamCfg.teams.length>=2&&(
        <div style={{background:'rgba(255,215,0,.05)',border:'1px solid rgba(255,215,0,.15)',borderRadius:16,padding:'13px 15px'}}>
          <div style={{fontFamily:'Bebas Neue',fontSize:17,letterSpacing:2,color:'#ffd700',marginBottom:10}}>💰 NASSAU · ${betAmt} PER BET</div>
          {[{l:'FRONT 9',s:0,e:9},{l:'BACK 9',s:9,e:18},{l:'TOTAL 18',s:0,e:18}].map(({l,s,e})=>{
            const s0=(teamScores||[])[0]?.slice(s,e).reduce((a,x)=>a+(x||0),0)||0;
            const s1=(teamScores||[])[1]?.slice(s,e).reduce((a,x)=>a+(x||0),0)||0;
            const lead=s0>0&&s1>0?(s0<s1?teamNames[0]:s0>s1?teamNames[1]:'TIE'):'—';
            const clr=lead===teamNames[0]?(PLAYERS.find(p=>p.id===teamCfg.teams[0][0])?.color||'#00e676'):lead===teamNames[1]?(PLAYERS.find(p=>p.id===teamCfg.teams[1][0])?.color||'#ff9100'):'#666';
            return<div key={l} style={{display:'flex',alignItems:'center',marginBottom:7,background:'rgba(0,0,0,.3)',borderRadius:10,padding:'8px 12px'}}>
              <div style={{fontSize:9,color:'rgba(255,255,255,.35)',fontWeight:700,letterSpacing:1,width:60}}>{l}</div>
              <div style={{flex:1,fontSize:13,fontWeight:800,color:clr,textAlign:'center'}}>{lead}</div>
              <div style={{fontSize:10,color:'rgba(255,255,255,.25)'}}>{s0||'—'} v {s1||'—'}</div>
            </div>;
          })}
        </div>
      )}

      {/* ══ SKINS TRACKER ══ */}
      {fmt==='skins'&&(
        <div style={{background:'rgba(155,89,182,.06)',border:'1px solid rgba(155,89,182,.2)',borderRadius:16,padding:'13px 15px'}}>
          <div style={{fontFamily:'Bebas Neue',fontSize:17,letterSpacing:2,color:'#9b59b6',marginBottom:10}}>💀 SKINS · ${betAmt}/SKIN · POT: ${PLAYERS.length*betAmt*holesPlayed}</div>
          <div style={{display:'flex',gap:7}}>
            {PLAYERS.map(p=>{const sk=skinsList.filter(x=>x===p.id).length;return(

            <button onClick={()=>sendChat(chatPlayer,chatInput)} style={{background:'rgba(64,196,255,.15)',border:'1px solid rgba(64,196,255,.3)',color:'#40c4ff',padding:'9px 16px',borderRadius:9,cursor:'pointer',fontSize:13,fontWeight:700}}>Send</button>
          </div>
        </div>
      )}

      {/* Hole progress dots */}
      <div style={{display:'flex',gap:4,justifyContent:'center',flexWrap:'wrap',padding:'4px 0'}}>
        {holes.map((_,i)=>{
          const done=PLAYERS.every(p=>getScore(p.id,i)>0)||(teamMode&&(teamScores||[]).some(t=>(t[i]||0)>0));
          const hasSkin=skinsList[i]!==null;
          return<div key={i} onClick={()=>{setHoleIdx(i);Haptic.light();}} style={{width:14,height:14,borderRadius:'50%',background:i===holeIdx?'#ffd700':done?(hasSkin&&fmt==='skins'?'#9b59b6':'#00e676'):holeNotes[i]?'rgba(255,215,0,.4)':'rgba(255,255,255,.08)',cursor:'pointer',transform:i===holeIdx?'scale(1.5)':'scale(1)',boxShadow:i===holeIdx?'0 0 8px #ffd700':'none',transition:'all .2s'}}/>;

      <button onClick={()=>setShowAll(!showAll)} style={{background:'transparent',border:'1px solid rgba(255,255,255,.06)',color:'rgba(255,255,255,.22)',padding:'10px',borderRadius:11,cursor:'pointer',fontSize:11,fontWeight:700,letterSpacing:1}}>

      <button onClick={()=>{if(confirm('Finish and save this round?'))finishRound(round.id);}} style={{background:'linear-gradient(135deg,#7a1010,#c0392b)',color:'#fff',border:'none',borderRadius:16,padding:'18px 24px',fontSize:20,fontWeight:900,cursor:'pointer',letterSpacing:3,fontFamily:'Bebas Neue',marginTop:4}}>

  );

function FullScorecard({scores,holes}){
  return(
    <div style={{background:'rgba(0,0,0,.5)',border:'1px solid rgba(255,255,255,.05)',borderRadius:16,padding:12,overflowX:'auto'}}>
      {[0,1].map(half=>{
        const hs=holes.slice(half*9,half*9+9);const pt=hs.reduce((a,h)=>a+h.par,0);
        return(
          <div key={half} style={{marginBottom:half===0?14:0}}>
            <div style={{fontSize:9,fontWeight:800,letterSpacing:3,color:'#00e676',marginBottom:8}}>{half===0?'FRONT 9':'BACK 9'}</div>
            <table style={{width:'100%',borderCollapse:'collapse',fontSize:11}}>
              <thead>
                <tr>
                  <th style={{padding:'4px 5px',textAlign:'left',color:'rgba(255,255,255,.25)',borderBottom:'1px solid rgba(255,255,255,.05)'}}>PLR</th>
                  {hs.map(h=><th key={h.hole} style={{padding:'4px 4px',textAlign:'center',color:'rgba(255,255,255,.25)',borderBottom:'1px solid rgba(255,255,255,.05)',fontSize:10}}>{h.hole}</th>)}
                  <th style={{padding:'4px 4px',textAlign:'center',color:'rgba(255,255,255,.25)',borderBottom:'1px solid rgba(255,255,255,.05)'}}>T</th>
                </tr>
                <tr>
                  <th style={{padding:'2px 5px',textAlign:'left',color:'#00e67655',fontSize:10}}>PAR</th>
                  {hs.map(h=><th key={h.hole} style={{padding:'2px 4px',textAlign:'center',color:'#00e67655',fontSize:10}}>{h.par}</th>)}
                  <th style={{padding:'2px 4px',textAlign:'center',color:'#00e67655',fontSize:10}}>{pt}</th>
                </tr>
              </thead>
              <tbody>{PLAYERS.map(p=>{
                const ps=(scores[p.id]||[]).slice(half*9,half*9+9);const tot=ps.reduce((a,b)=>a+(b||0),0);
                return(<tr key={p.id}>
                  <td style={{padding:'4px 5px',color:p.color,fontWeight:800,fontSize:11}}>{p.name}</td>
                  {hs.map((h,i)=>{const sc=ps[i];const d=sc>0?sc-h.par:null;const col=d!==null?scColor(d):{bg:'transparent',c:'rgba(255,255,255,.15)'};
                    return<td key={h.hole} style={{padding:'3px 3px',textAlign:'center',background:col.bg,color:col.c,fontWeight:d!==null?800:400,borderRadius:4,fontSize:11}}>{sc||'—'}</td>;})}
                  <td style={{padding:'4px 4px',textAlign:'center',fontWeight:900,color:'#fff',fontSize:12}}>{tot||'—'}</td>
                </tr>);})}
              </tbody>
            </table>
          </div>
        );
      })}
    </div>
  );
}

// STATS VIEW
// ══════════════════════════════════════════════
function StatsView({rounds,scores,playerSettings,settings}){
  const completed=rounds.filter(r=>r.completed);
  const[selectedPlayer,setSelectedPlayer]=useState('all');

  const getStats=pid=>{
    let birdies=0,eagles=0,pars=0,bogeys=0,doubles=0,aces=0,best=null,worst=null,rp=0,totalStrokes=0,holesPlayed=0;
    for(const r of completed){
      const s=scores[r.id]?.[pid];if(!s)continue;
      const course=COURSES[r.course_id]||COURSES.snee;
      let roundTotal=0,played=0;
      s.forEach((sc,i)=>{if(sc>0&&course.holes[i]){const d=sc-course.holes[i].par;if(sc===1)aces++;else if(d<=-2)eagles++;else if(d===-1)birdies++;else if(d===0)pars++;else if(d===1)bogeys++;else doubles++;roundTotal+=sc;played++;}});
      if(roundTotal>0){totalStrokes+=roundTotal;rp++;holesPlayed+=played;if(best===null||roundTotal<best)best=roundTotal;if(worst===null||roundTotal>worst)worst=roundTotal;}
    }
    const courseRecords={};
    completed.forEach(r=>{const s=scores[r.id]?.[pid];if(!s)return;const t=s.reduce((a,b)=>a+(b||0),0);if(t>0){if(!courseRecords[r.course_id]||t<courseRecords[r.course_id])courseRecords[r.course_id]=t;}});
    return{birdies,eagles,pars,bogeys,doubles,aces,best,worst,rp,avg:rp?Math.round(totalStrokes/rp):null,courseRecords};
  };

  // Head to head matrix
  const h2h=(p1,p2)=>{let w1=0,w2=0,ties=0;
    completed.forEach(r=>{const s1=scores[r.id]?.[p1];const s2=scores[r.id]?.[p2];if(!s1||!s2)return;const t1=s1.reduce((a,b)=>a+(b||0),0);const t2=s2.reduce((a,b)=>a+(b||0),0);if(!t1||!t2)return;if(t1<t2)w1++;else if(t2<t1)w2++;else ties++;});
    return{w1,w2,ties};
  };

  // Score trend (last 6 rounds)
  const getTrend=pid=>completed.slice(0,6).reverse().map(r=>{const s=scores[r.id]?.[pid];return s?s.reduce((a,b)=>a+(b||0),0):null;});

  // Most improved
  const getMostImproved=()=>{
    return PLAYERS.map(p=>{
      const rs=completed.map(r=>{const s=scores[r.id]?.[p.id];return s?s.reduce((a,b)=>a+(b||0),0):null;}).filter(Boolean);
      if(rs.length<2)return{...p,improvement:0};
      const improvement=rs[0]-rs[rs.length-1];
      return{...p,improvement};
    }).sort((a,b)=>b.improvement-a.improvement)[0];
  };

  const improved=getMostImproved();

  // Trash talk for worst round
  const getTrashTalk=()=>{
    let worst=null,worstPlayer=null;
    completed.slice(0,3).forEach(r=>{
      PLAYERS.forEach(p=>{const s=scores[r.id]?.[p.id];if(!s)return;const t=s.reduce((a,b)=>a+(b||0),0);if(t>0&&(worst===null||t>worst)){worst=t;worstPlayer={...p,score:t};}});
    });
    if(!worstPlayer)return null;
    const line=TRASH_TALK[Math.floor(Math.random()*TRASH_TALK.length)](worstPlayer.name,worstPlayer.score);
    return{player:worstPlayer,line};
  };
  const [trash]=useState(()=>getTrashTalk());

  if(completed.length===0)return(
    <div style={{display:'flex',flexDirection:'column',gap:16,animation:'fadeUp .4s ease'}}>
      <div style={{fontFamily:'Bebas Neue',fontSize:30,letterSpacing:3,color:'#00e676'}}>STATS & RECORDS</div>
      <div style={{textAlign:'center',color:'rgba(255,255,255,.2)',padding:60,fontSize:16}}>No completed rounds yet 🏌️<br/><span style={{fontSize:13,color:'rgba(255,255,255,.1)'}}>Finish a round to see your stats</span></div>
    </div>
  );

  return(
    <div style={{display:'flex',flexDirection:'column',gap:14,animation:'fadeUp .4s ease'}}>
      <div style={{fontFamily:'Bebas Neue',fontSize:30,letterSpacing:3,color:'#00e676'}}>STATS & RECORDS</div>

      {/* Player selector */}
      <div style={{display:'flex',gap:6,overflowX:'auto'}}>
        <button onClick={()=>setSelectedPlayer('all')} style={{background:selectedPlayer==='all'?'rgba(0,230,118,.12)':'transparent',border:`1px solid ${selectedPlayer==='all'?'rgba(0,230,118,.35)':'rgba(255,255,255,.06)'}`,color:selectedPlayer==='all'?'#00e676':'#444',padding:'7px 14px',borderRadius:20,cursor:'pointer',fontSize:11,fontWeight:700,whiteSpace:'nowrap',flexShrink:0}}>ALL PLAYERS</button>
        {PLAYERS.map(p=><button key={p.id} onClick={()=>setSelectedPlayer(p.id)} style={{background:selectedPlayer===p.id?`${p.color}20`:'transparent',border:`1px solid ${selectedPlayer===p.id?p.color+'55':'rgba(255,255,255,.06)'}`,color:selectedPlayer===p.id?p.color:'#444',padding:'7px 14px',borderRadius:20,cursor:'pointer',fontSize:11,fontWeight:700,whiteSpace:'nowrap',flexShrink:0}}>{p.name}</button>)}
      </div>

      {/* Player stat cards */}
      {PLAYERS.filter(p=>selectedPlayer==='all'||p.id===selectedPlayer).map(p=>{
        const st=getStats(p.id);const trend=getTrend(p.id);
        return(
          <div key={p.id} style={{background:'rgba(255,255,255,.03)',border:`1px solid ${p.color}18`,borderRadius:20,padding:'18px 16px',overflow:'hidden',position:'relative'}}>
            <div style={{position:'absolute',top:-10,right:-8,fontSize:70,opacity:.06}}>{p.avatar}</div>
            {/* Header */}
            <div style={{display:'flex',alignItems:'center',gap:12,marginBottom:16}}>
              <div style={{width:46,height:46,borderRadius:'50%',background:p.color,display:'flex',alignItems:'center',justifyContent:'center',fontWeight:900,fontSize:22,color:'#000'}}>{p.emoji}</div>
              <div style={{flex:1}}>
                <div style={{fontFamily:'Bebas Neue',fontSize:24,letterSpacing:1,color:p.color}}>{p.name}</div>
                <div style={{fontSize:11,color:'rgba(255,255,255,.25)'}}>HCP {playerSettings[p.id]??p.defaultHcp} · {st.rp} rounds</div>
              </div>
              {st.best&&<div style={{textAlign:'right'}}>
                <div style={{fontFamily:'Bebas Neue',fontSize:34,color:p.color,lineHeight:1}}>{st.best}</div>
                <div style={{fontSize:9,color:'rgba(255,255,255,.25)',letterSpacing:2}}>BEST ROUND</div>
              </div>}
            </div>
            {/* Score breakdown */}
            <div style={{display:'grid',gridTemplateColumns:'repeat(5,1fr)',gap:6,marginBottom:12}}>
              {[{n:st.aces,l:'ACE',c:'#ffd700'},{n:st.eagles,l:'EAGLE',c:'#00e676'},{n:st.birdies,l:'BIRDIE',c:'#69f0ae'},{n:st.pars,l:'PAR',c:'#555'},{n:st.bogeys,l:'BOG+',c:'#ff5252'}].map((s,i)=>(
                <div key={i} style={{background:'rgba(0,0,0,.3)',borderRadius:10,padding:'8px 4px',textAlign:'center'}}>
                  <div style={{fontFamily:'Bebas Neue',fontSize:22,color:s.n>0?s.c:'#222'}}>{s.n}</div>
                  <div style={{fontSize:8,color:'rgba(255,255,255,.25)',fontWeight:700,letterSpacing:1}}>{s.l}</div>
                </div>
              ))}
            </div>
            {/* Scoring bar */}
            {st.rp>0&&(()=>{const total=Math.max(1,st.eagles+st.birdies+st.pars+st.bogeys+st.doubles);return(
              <div style={{height:8,borderRadius:4,overflow:'hidden',display:'flex',gap:2,marginBottom:12}}>
                {[{v:st.eagles,c:'#00e676'},{v:st.birdies,c:'#69f0ae'},{v:st.pars,c:'#444'},{v:st.bogeys,c:'#ff9100'},{v:st.doubles,c:'#ff5252'}].map((b,i)=>b.v>0&&<div key={i} style={{flex:b.v/total,background:b.c,minWidth:3}}/>)}
              </div>
            );})()}
            {/* Trend sparkline */}
            {trend.filter(Boolean).length>1&&(
              <div style={{marginBottom:10}}>
                <div style={{fontSize:9,color:'rgba(255,255,255,.25)',letterSpacing:2,fontWeight:700,marginBottom:6}}>SCORE TREND (LAST {trend.filter(Boolean).length} ROUNDS)</div>
                <div style={{display:'flex',gap:4,alignItems:'flex-end',height:40}}>
                  {trend.filter(Boolean).map((t,i)=>{const min=Math.min(...trend.filter(Boolean));const max=Math.max(...trend.filter(Boolean));const h=max===min?20:Math.round(((max-t)/(max-min))*32)+8;return(
                    <div key={i} style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',gap:2}}>
                      <div style={{width:'100%',background:i===trend.filter(Boolean).length-1?p.color:'rgba(255,255,255,.15)',borderRadius:'3px 3px 0 0',height:h,minHeight:4,transition:'height .5s ease'}}/>
                      <div style={{fontSize:9,color:'rgba(255,255,255,.3)',fontWeight:700}}>{t}</div>
                    </div>
                  );})}
                </div>
              </div>
            )}
            {/* Course records */}
            {Object.keys(st.courseRecords).length>0&&(
              <div>
                <div style={{fontSize:9,color:'rgba(255,255,255,.25)',letterSpacing:2,fontWeight:700,marginBottom:6}}>COURSE RECORDS</div>
                <div style={{display:'flex',gap:6,flexWrap:'wrap'}}>
                  {Object.entries(st.courseRecords).map(([cid,score])=>(
                    <div key={cid} style={{background:'rgba(0,0,0,.3)',borderRadius:20,padding:'3px 10px',fontSize:10,fontWeight:700}}>
                      <span style={{color:'rgba(255,255,255,.4)'}}>{COURSES[cid]?.name?.split(' ')[0]}</span>
                      <span style={{color:p.color,marginLeft:4}}>{score}</span>
                    </div>
                  ))}
                </div>
              </div>
            )}
            {st.avg&&<div style={{marginTop:8,fontSize:11,color:'rgba(255,255,255,.25)'}}>Average: <span style={{color:p.color,fontWeight:700}}>{st.avg}</span>{st.worst&&<> · Worst: <span style={{color:'#ff5252',fontWeight:700}}>{st.worst}</span></>}</div>}
          </div>
        );
      })}

      {/* Head to head */}
      {selectedPlayer==='all'&&(
        <div style={{background:'rgba(255,255,255,.02)',border:'1px solid rgba(255,255,255,.05)',borderRadius:20,padding:'18px 16px'}}>
          <div style={{fontFamily:'Bebas Neue',fontSize:20,letterSpacing:2,color:'#ffd700',marginBottom:14}}>HEAD TO HEAD RECORD</div>
          {[['ben','luke'],['ben','max'],['ben','thomas'],['thomas','luke'],['thomas','max'],['max','luke']].map(([p1id,p2id])=>{
            const p1=PLAYERS.find(p=>p.id===p1id);const p2=PLAYERS.find(p=>p.id===p2id);
            const{w1,w2,ties}=h2h(p1id,p2id);const total=w1+w2+ties;if(total===0)return null;
            return(
              <div key={p1id+p2id} style={{marginBottom:12}}>
                <div style={{display:'flex',justifyContent:'space-between',marginBottom:4,fontSize:13}}>
                  <span style={{color:p1.color,fontWeight:800}}>{p1.name} ({w1})</span>
                  {ties>0&&<span style={{color:'#555',fontSize:11}}>{ties} tie{ties>1?'s':''}</span>}
                  <span style={{color:p2.color,fontWeight:800}}>({w2}) {p2.name}</span>
                </div>
                <div style={{display:'flex',height:10,borderRadius:5,overflow:'hidden',background:'rgba(255,255,255,.04)'}}>
                  <div style={{flex:Math.max(w1,.1),background:p1.color,transition:'flex .5s ease'}}/>
                  <div style={{flex:Math.max(ties,.1),background:'rgba(255,255,255,.1)'}}/>
                  <div style={{flex:Math.max(w2,.1),background:p2.color,transition:'flex .5s ease'}}/>
                </div>
              </div>
            );
          })}
        </div>
      )}

      {/* Most improved */}
      {improved&&improved.improvement>0&&(
        <div style={{background:'rgba(0,230,118,.04)',border:'1px solid rgba(0,230,118,.12)',borderRadius:16,padding:'14px 16px',display:'flex',gap:12,alignItems:'center'}}>
          <span style={{fontSize:30}}>📈</span>
          <div>
            <div style={{fontSize:10,color:'rgba(0,230,118,.5)',letterSpacing:2,fontWeight:700}}>MOST IMPROVED</div>
            <div style={{fontSize:16,fontWeight:900,color:'#00e676'}}>{improved.name}</div>
            <div style={{fontSize:11,color:'rgba(255,255,255,.3)'}}>Improved by {improved.improvement} strokes</div>
          </div>
        </div>
      )}

      {/* Trash talk */}
      {trash&&(
        <div style={{background:'rgba(255,145,0,.04)',border:'1px solid rgba(255,145,0,.15)',borderRadius:16,padding:'14px 16px'}}>
          <div style={{fontSize:10,color:'rgba(255,145,0,.5)',letterSpacing:2,fontWeight:700,marginBottom:6}}>🎤 ROAST OF THE WEEK</div>
          <div style={{fontSize:13,color:'rgba(255,255,255,.7)',lineHeight:1.6,fontStyle:'italic'}}>"{trash.line}"</div>
        </div>
      )}
    </div>
  );
}

        const fmt=FORMATS.find(f=>f.id===r.format);const course=COURSES[r.course_id]||COURSES.snee;

          <div key={r.id} style={{background:'rgba(255,255,255,.02)',border:'1px solid rgba(255,255,255,.05)',borderRadius:18,padding:'16px'}}>

              <div style={{color:r.completed?'#00e676':'#ff4444',fontSize:10,fontWeight:800,letterSpacing:1}}>{r.completed?'✓ DONE':'● LIVE'}</div>
            </div>
            <div style={{display:'flex',flexDirection:'column',gap:5,marginBottom:12}}>

  );
}
