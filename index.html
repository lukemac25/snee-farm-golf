// LEADERBOARD VIEW
// ══════════════════════════════════════════════

function LeaderboardView({round,scores,teamScores,playerSettings,settings,setView}){
  const fmt=round.format;
  const fmtObj=FORMATS.find(f=>f.id===fmt);
  const course=COURSES[round.course_id]||COURSES.snee;
  const holes=course.holes;
  const teamCfg=TEAM_CONFIGS.find(t=>t.id===round.team_config);
  const isTeam=['scramble','bestball','nassau','match','bloodsome','vegas','shamble'].includes(fmt)&&round.team_config!=='solo';
  const teamNames=round.team_names||['Team 1','Team 2'];
  const betAmt=round.bet_amount||5;
  const[showShare,setShowShare]=useState(false);
  const getScore=(pid,hi)=>(scores[pid]||[])[hi]||0;
  const getTScore=(ti,hi)=>(teamScores||[])[ti]?.[hi]||0;
  const pName=(id)=>settings?.playerNames?.[id]||PLAYERS.find(p=>p.id===id)?.name||id;
  const pColor=(id)=>settings?.playerColors?.[id]||PLAYERS.find(p=>p.id===id)?.color||'#00e676';

  const buildResults=()=>{
    if(isTeam&&teamCfg){
      if(fmt==='match'){
        return teamCfg.teams.map((team,ti)=>{
          let w=0,l=0,h=0;
          holes.forEach((_,i)=>{const ms=getTScore(ti,i);const os=getTScore(ti===0?1:0,i);if(ms>0&&os>0){if(ms<os)w++;else if(os<ms)l++;else h++;}});
          const tClr=pColor(team[0]);
          return{id:'t'+ti,name:teamNames[ti],color:tClr,emoji:(ti+1)+'',val:w,display:w+'W '+l+'L '+h+'H',sub:'match play',higher:true,tp:null};
        }).sort((a,b)=>b.val-a.val);
      }
      if(fmt==='nassau'){
        return teamCfg.teams.map((team,ti)=>{
          const f=(teamScores||[])[ti]?.slice(0,9).reduce((a,x)=>a+(x||0),0)||0;
          const b=(teamScores||[])[ti]?.slice(9).reduce((a,x)=>a+(x||0),0)||0;
          const of=((teamScores||[])[ti===0?1:0]?.slice(0,9).reduce((a,x)=>a+(x||0),0))||0;
          const ob=((teamScores||[])[ti===0?1:0]?.slice(9).reduce((a,x)=>a+(x||0),0))||0;
          const bw=[f<of&&f>0,b<ob&&b>0,(f+b)<(of+ob)&&(f+b)>0].filter(Boolean).length;
          return{id:'t'+ti,name:teamNames[ti],color:pColor(team[0]),emoji:(ti+1)+'',val:bw,display:'$'+(bw*betAmt),sub:bw+' bets won',higher:true,tp:null};
        }).sort((a,b)=>b.val-a.val);
      }
      if(fmt==='vegas'){
        const gv=(team,i)=>{const ss=team.map(id=>getScore(id,i)).filter(x=>x>0).sort((a,b)=>a-b);return ss.length>=2?parseInt(''+ss[0]+ss[1]):0;};
        let p0=0,p1=0;holes.forEach((_,i)=>{const v0=gv(teamCfg.teams[0],i),v1=gv(teamCfg.teams[1],i);if(v0>0&&v1>0){if(v0<v1)p0+=v1-v0;else if(v1<v0)p1+=v0-v1;}});
        return teamCfg.teams.map((team,ti)=>({id:'t'+ti,name:teamNames[ti],color:pColor(team[0]),emoji:(ti+1)+'',val:ti===0?p0:p1,display:'$'+(ti===0?p0:p1),sub:'vegas pts',higher:true,tp:null})).sort((a,b)=>b.val-a.val);
      }
      // scramble/bestball/bloodsome/shamble
      return teamCfg.teams.map((team,ti)=>{
        let total=0,tp=0;
        if(fmt==='bestball'||fmt==='shamble'){
          holes.forEach((h,i)=>{const best=Math.min(...team.map(id=>getScore(id,i)).filter(x=>x>0));if(best<99&&best>0){total+=best;tp+=best-h.par;}});
        } else {
          const tS=(teamScores||[])[ti]||[];
          total=tS.reduce((a,x)=>a+(x||0),0);
          tp=tS.reduce((a,x,i)=>x>0&&holes[i]?a+(x-holes[i].par):a,0);
        }
        return{id:'t'+ti,name:teamNames[ti],color:pColor(team[0]),emoji:(ti+1)+'',val:total,display:total>0?total+'':'—',sub:total>0?tpStr(tp)+' to par':'',higher:false,tp:total>0?tp:null};
      }).sort((a,b)=>a.val-b.val);
    }
    // Individual
    switch(fmt){
      case 'stableford':return PLAYERS.map(p=>({...p,name:pName(p.id),color:pColor(p.id),val:holes.reduce((a,h,i)=>{const s=getScore(p.id,i);return s>0?a+sfPts(s,h.par):a;},0),higher:true,tp:null})).map(p=>({...p,display:p.val+'pts',sub:'stableford pts'})).sort((a,b)=>b.val-a.val);
      case 'skins':{
        const sl=holes.map((_,i)=>{const all=PLAYERS.map(p=>({id:p.id,s:getScore(p.id,i)})).filter(x=>x.s>0);if(all.length<4)return null;const min=Math.min(...all.map(x=>x.s));const w=all.filter(x=>x.s===min);return w.length===1?w[0].id:null;});
        return PLAYERS.map(p=>{const sk=sl.filter(x=>x===p.id).length;return{...p,name:pName(p.id),color:pColor(p.id),val:sk,display:sk+' skins',sub:'$'+(sk*betAmt),higher:true,tp:null};}).sort((a,b)=>b.val-a.val);
      }
      case 'quota':return PLAYERS.map(p=>{const hdcp=playerSettings[p.id]??p.defaultHcp;const quota=36-Math.min(hdcp,36);const pts=holes.reduce((a,h,i)=>{const s=getScore(p.id,i);return s>0?a+sfPts(s,h.par):a;},0);const diff=pts-quota;return{...p,name:pName(p.id),color:pColor(p.id),val:diff,display:pts+'pts',sub:(diff>=0?'+':'')+diff+' vs quota '+quota,higher:true,tp:null};}).sort((a,b)=>b.val-a.val);
      case 'bingo':{
        const bg=JSON.parse(localStorage.getItem('bg_'+round.id)||'{}');
        return PLAYERS.map(p=>{const pts=Object.values(bg).reduce((a,h)=>a+(h.on===p.id?1:0)+(h.closest===p.id?1:0)+(h.in===p.id?1:0),0);return{...p,name:pName(p.id),color:pColor(p.id),val:pts,display:pts+'pts',sub:'bingo pts',higher:true,tp:null};}).sort((a,b)=>b.val-a.val);
      }
      default:{
        return PLAYERS.map(p=>{
          const total=holes.reduce((a,h,i)=>{const s=getScore(p.id,i);return s>0?a+s:a;},0);
          const tp=holes.reduce((a,h,i)=>{const s=getScore(p.id,i);return s>0?a+(s-h.par):a;},0);
          return{...p,name:pName(p.id),color:pColor(p.id),val:total,display:total>0?total+'':'—',sub:total>0?tpStr(tp)+' to par':'',higher:false,tp:total>0?tp:null};
        }).sort((a,b)=>a.val-b.val);
      }
    }
  };

  const results=buildResults();
  const winner=results[0];
  const medals=['🥇','🥈','🥉','💀'];

  // Awards
  const awards=[];
  if(!isTeam){
    const mb=PLAYERS.map(p=>({...p,n:holes.filter((h,i)=>getScore(p.id,i)===h.par-1).length})).sort((a,b)=>b.n-a.n)[0];
    if(mb?.n>0)awards.push({icon:'🐦',label:'Most Birdies',name:pName(mb.id),color:pColor(mb.id),detail:mb.n+' birdies'});
    const me=PLAYERS.map(p=>({...p,n:holes.filter((h,i)=>{const s=getScore(p.id,i);return s>0&&s<=h.par-2;}).length})).sort((a,b)=>b.n-a.n)[0];
    if(me?.n>0)awards.push({icon:'🦅',label:'Eagle Club',name:pName(me.id),color:pColor(me.id),detail:me.n+' eagle'+(me.n>1?'s':'')});
    const par3s=holes.filter(h=>h.par===3);
    if(par3s.length>0){const mc=PLAYERS.map(p=>({...p,avg:par3s.reduce((a,h)=>{const s=getScore(p.id,h.hole-1);return s>0?a+(s-h.par):a;},0)/par3s.length})).sort((a,b)=>a.avg-b.avg)[0];if(mc)awards.push({icon:'📍',label:'Par 3 King',name:pName(mc.id),color:pColor(mc.id),detail:(mc.avg>=0?'+':'')+mc.avg.toFixed(1)+' avg'});}
    // Most bogeys/above
    const mbo=PLAYERS.map(p=>({...p,n:holes.filter((h,i)=>{const s=getScore(p.id,i);return s>0&&s-h.par>=2;}).length})).sort((a,b)=>b.n-a.n)[0];
    if(mbo?.n>0)awards.push({icon:'💩',label:'Double Trouble',name:pName(mbo.id),color:pColor(mbo.id),detail:mbo.n+' double+'});
  }

  // Auto update season money
  useEffect(()=>{
    if(!winner||!betAmt)return;
    const money=getMoney();
    if(!isTeam&&fmt!=='skins'&&fmt!=='nassau'&&fmt!=='bingo'){
      results.forEach((r,i)=>{if(i===0)money[r.id]=(money[r.id]||0)+(results.length-1)*betAmt;else money[r.id]=(money[r.id]||0)-betAmt;});
      saveMoney(money);
    }
  },[]);

  const shareText=(fmtObj?.icon||'⛳')+' '+fmtObj?.label+' — '+round.date+'
'+course.name+'

'+results.map((r,i)=>(medals[i]||'#'+(i+1))+' '+r.name+': '+r.display).join('
')+'

🏆 '+(winner?.name)+' wins!';

  return(
    <div style={{display:'flex',flexDirection:'column',gap:13,animation:'fadeUp .4s'}}>
      {/* Trophy header */}
      <div style={{background:'linear-gradient(160deg,rgba(255,215,0,.1),rgba(255,215,0,.02))',border:'1px solid rgba(255,215,0,.2)',borderRadius:22,padding:'22px 18px',textAlign:'center',position:'relative',overflow:'hidden'}}>
        <div style={{position:'absolute',top:-20,left:-20,fontSize:110,opacity:.04}}>🏆</div>
        <div style={{position:'absolute',top:-20,right:-20,fontSize:110,opacity:.04}}>🏆</div>
        <div style={{fontSize:9,color:'rgba(255,215,0,.4)',letterSpacing:4,fontWeight:800,marginBottom:6}}>ROUND COMPLETE</div>
        <div style={{fontFamily:'Bebas Neue',fontSize:38,color:'#ffd700',lineHeight:1,marginBottom:3}}>{fmtObj?.icon} {fmtObj?.label}</div>
        <div style={{fontSize:11,color:'rgba(255,255,255,.2)'}}>{round.date} · {course.name}{round.conditions?' · '+round.conditions:''}</div>
        {winner&&<div style={{marginTop:14,display:'inline-flex',gap:10,background:'rgba(0,0,0,.4)',borderRadius:20,padding:'10px 20px',alignItems:'center'}}>
          <div style={{width:36,height:36,borderRadius:'50%',background:winner.color,display:'flex',alignItems:'center',justifyContent:'center',fontSize:18,color:'#000',fontWeight:900}}>{winner.emoji}</div>
          <div style={{textAlign:'left'}}>
            <div style={{fontFamily:'Bebas Neue',fontSize:20,color:winner.color,letterSpacing:1}}>{winner.name} WINS</div>
            <div style={{fontSize:11,color:'rgba(255,255,255,.3)'}}>{winner.display}</div>
          </div>
        </div>}
      </div>

      {/* Results */}
      {results.map((r,i)=>(
        <div key={r.id||r.name} style={{background:i===0?`linear-gradient(135deg,${r.color}18,${r.color}05)`:'rgba(255,255,255,.02)',border:(i===0?2:1)+'px solid '+(i===0?r.color+'55':'rgba(255,255,255,.05)'),borderRadius:18,padding:'16px 18px',display:'flex',alignItems:'center',gap:14,transform:i===0?'scale(1.02)':'scale(1)'}}>
          <span style={{fontSize:24,width:30,flexShrink:0}}>{medals[i]||'#'+(i+1)}</span>
          <div style={{width:44,height:44,borderRadius:'50%',background:r.color,display:'flex',alignItems:'center',justifyContent:'center',fontWeight:900,fontSize:20,color:'#000',flexShrink:0}}>{r.emoji}</div>
          <div style={{flex:1}}>
            <div style={{fontFamily:'Bebas Neue',fontSize:22,letterSpacing:1,color:i===0?r.color:'#fff'}}>{r.name}</div>
            {r.sub&&<div style={{fontSize:11,color:'rgba(255,255,255,.3)'}}>{r.sub}</div>}
          </div>
          <div style={{fontFamily:'Bebas Neue',fontSize:32,color:i===0?r.color:'rgba(255,255,255,.5)',lineHeight:1}}>{r.display}</div>
        </div>
      ))}

      {/* Settle up */}
      {betAmt>0&&!isTeam&&fmt==='stroke'&&results.length>1&&(
        <div style={{background:'rgba(0,230,118,.04)',border:'1px solid rgba(0,230,118,.1)',borderRadius:18,padding:'15px 16px'}}>
          <div style={{fontFamily:'Bebas Neue',fontSize:18,letterSpacing:2,color:'#00e676',marginBottom:10}}>💰 SETTLE UP · ${betAmt}/HOLE</div>
          {results.slice(1).map((r,i)=>(
            <div key={i} style={{display:'flex',alignItems:'center',gap:10,marginBottom:8,background:'rgba(0,0,0,.3)',borderRadius:12,padding:'11px 14px'}}>
              <div style={{width:30,height:30,borderRadius:'50%',background:r.color,display:'flex',alignItems:'center',justifyContent:'center',fontSize:14,color:'#000',fontWeight:900}}>{r.emoji}</div>
              <div style={{flex:1,fontSize:13}}><span style={{color:r.color,fontWeight:800}}>{r.name}</span><span style={{color:'rgba(255,255,255,.3)'}}> pays </span><span style={{color:winner.color,fontWeight:800}}>{winner.name}</span></div>
              <div style={{fontFamily:'Bebas Neue',fontSize:24,color:'#00e676'}}>${betAmt}</div>
            </div>
          ))}
        </div>
      )}

      {/* Awards */}
      {awards.length>0&&(
        <div style={{background:'rgba(255,215,0,.03)',border:'1px solid rgba(255,215,0,.1)',borderRadius:18,padding:'15px'}}>
          <div style={{fontFamily:'Bebas Neue',fontSize:18,letterSpacing:2,color:'#ffd700',marginBottom:10}}>🏅 ROUND AWARDS</div>
          {awards.map((a,i)=>(
            <div key={i} style={{display:'flex',alignItems:'center',gap:10,marginBottom:8,background:'rgba(0,0,0,.3)',borderRadius:12,padding:'10px 14px'}}>
              <span style={{fontSize:22}}>{a.icon}</span>
              <div style={{flex:1}}><div style={{fontSize:9,color:'rgba(255,215,0,.4)',letterSpacing:2,fontWeight:700}}>{a.label.toUpperCase()}</div><div style={{fontSize:15,fontWeight:800,color:a.color}}>{a.name}</div></div>
              <div style={{fontSize:10,color:'rgba(255,255,255,.25)',fontWeight:700}}>{a.detail}</div>
            </div>
          ))}
        </div>
      )}

      {/* Share */}
      <button onClick={()=>navigator.share?navigator.share({title:'Thursday Crew Golf',text:shareText}):setShowShare(!showShare)} style={{background:'rgba(64,196,255,.07)',border:'1px solid rgba(64,196,255,.2)',color:'#40c4ff',borderRadius:14,padding:'13px',fontSize:13,fontWeight:800,cursor:'pointer',letterSpacing:1}}>📤 SHARE RESULTS</button>
      {showShare&&<div style={{background:'rgba(0,0,0,.8)',border:'1px solid rgba(64,196,255,.25)',borderRadius:14,padding:14}}><textarea readOnly value={shareText} style={{width:'100%',background:'transparent',border:'none',color:'#f0f0f0',fontSize:12,lineHeight:1.8,resize:'none',outline:'none',fontFamily:'monospace'}} rows={8}/><button onClick={()=>{navigator.clipboard?.writeText(shareText);setShowShare(false);}} style={{background:'#40c4ff',color:'#000',border:'none',borderRadius:10,padding:'10px 20px',fontSize:12,fontWeight:800,cursor:'pointer',marginTop:6,width:'100%'}}>📋 COPY</button></div>}

      <div style={{fontFamily:'Bebas Neue',fontSize:17,letterSpacing:2,color:'#00e676'}}>FULL SCORECARD</div>
      <FullScorecard scores={scores} holes={holes}/>

      <button onClick={()=>setView('setup')} style={{background:'linear-gradient(135deg,#00c853,#00e676)',color:'#000',border:'none',borderRadius:16,padding:'18px 24px',fontSize:22,fontWeight:900,cursor:'pointer',letterSpacing:3,fontFamily:'Bebas Neue',boxShadow:'0 8px 40px rgba(0,230,118,.25)'}}>
        ⛳ PLAY AGAIN
      </button>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
