function scoreName(s,p){
  if(!s||s<=0)return null;
  const d=s-p;
  if(s===1)return{l:'ACE! 🎉',c:'#ffd700',type:'ace'};
  if(d<=-3)return{l:'ALBATROSS 🦅🦅🦅',c:'#00e676',type:'eagle'};
  if(d===-2)return{l:'EAGLE 🦅🦅',c:'#00e676',type:'eagle'};
  if(d===-1)return{l:'BIRDIE 🐦',c:'#69f0ae',type:'birdie'};
  if(d===0)return{l:'PAR',c:'#666',type:'par'};
  if(d===1)return{l:'BOGEY',c:'#ff9100',type:'bogey'};
  if(d===2)return{l:'DOUBLE 😬',c:'#ff5252',type:'bogey'};
  if(d===3)return{l:'TRIPLE 😱',c:'#d32f2f',type:'bogey'};
  return{l:`+${d} 💀`,c:'#b71c1c',type:'bogey'};
}
function sfPts(s,p){if(!s||s<=0)return 0;const d=s-p;if(d>=2)return 0;if(d===1)return 1;if(d===0)return 2;if(d===-1)return 3;if(d===-2)return 4;return 5;}
function tpStr(tp){return tp===0?'E':tp>0?`+${tp}`:`${tp}`;}
function scColor(d){
  if(d<=-2)return{bg:'rgba(0,230,118,.2)',c:'#00e676'};
  if(d===-1)return{bg:'rgba(105,240,174,.12)',c:'#69f0ae'};
  if(d===0)return{bg:'transparent',c:'#555'};
  if(d===1)return{bg:'rgba(255,145,0,.12)',c:'#ff9100'};
  if(d===2)return{bg:'rgba(255,82,82,.12)',c:'#ff5252'};
  return{bg:'rgba(183,28,28,.2)',c:'#ef5350'};
}
// Net score with handicap strokes
function getNetScore(gross,par,hcp,playerHdcp,courseRating=72){
  const strokes=Math.floor(playerHdcp/18)+(hcp<=playerHdcp%18?1:0);
  return gross-strokes;
}

// WEATHER WIDGET
// ══════════════════════════════════════════════
function WeatherWidget({lat,lon,courseName}){
  const[weather,setWeather]=useState(null);
  useEffect(()=>{
    if(!lat||!lon)return;
    fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,wind_speed_10m,weather_code&temperature_unit=fahrenheit&wind_speed_unit=mph`)
      .then(r=>r.json()).then(d=>{
        const c=d.current;
        const code=c.weather_code;
        let icon='☀️';
        if(code>=61&&code<=67)icon='🌧️';
        else if(code>=71&&code<=77)icon='❄️';
        else if(code>=80&&code<=82)icon='🌦️';
        else if(code>=95)icon='⛈️';
        else if(code>=51&&code<=57)icon='🌦️';
        else if(code>=1&&code<=3)icon=code===1?'🌤️':code===2?'⛅':'☁️';
        else if(code===45||code===48)icon='🌫️';
        setWeather({temp:Math.round(c.temperature_2m),wind:Math.round(c.wind_speed_10m),icon});
      }).catch(()=>{});
  },[lat,lon]);
  if(!weather)return null;
  return(
    <div style={{display:'flex',alignItems:'center',gap:8,background:'rgba(255,255,255,.04)',border:'1px solid rgba(255,255,255,.07)',borderRadius:12,padding:'8px 12px'}}>
      <span style={{fontSize:20}}>{weather.icon}</span>
      <div>
        <div style={{fontSize:13,fontWeight:700}}>{weather.temp}°F · {weather.wind} mph winds</div>
        <div style={{fontSize:10,color:'rgba(255,255,255,.3)'}}>{courseName}</div>
      </div>
    </div>
  );
}

function PinModal({player,onSuccess,onClose,isSetup}){
  const[pin,setPin]=useState('');
  const[err,setErr]=useState(false);
  const[shk,setShk]=useState(false);
  const pins=getPins();
  const handleDigit=d=>{
    if(pin.length>=4)return;
    const np=pin+d;setPin(np);
    if(np.length===4){
      setTimeout(()=>{
        if(isSetup){savePins({...pins,[player.id]:np});onSuccess();}
        else if(pins[player.id]===np){onSuccess();}
        else{setShk(true);setErr(true);setPin('');setTimeout(()=>{setShk(false);setErr(false);},600);}
      },150);
    }
  };
  return(
    <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,.9)',zIndex:500,display:'flex',alignItems:'center',justifyContent:'center',animation:'fadeIn .2s'}} onClick={onClose}>
      <div style={{background:'#0d1a0d',border:`2px solid ${player.color}44`,borderRadius:24,padding:'28px 22px',width:290,animation:'popIn .3s'}} onClick={e=>e.stopPropagation()}>
        <div style={{textAlign:'center',marginBottom:20}}>
          <div style={{width:54,height:54,borderRadius:'50%',background:player.color,display:'flex',alignItems:'center',justifyContent:'center',fontSize:24,color:'#000',fontWeight:900,margin:'0 auto 10px'}}>{player.emoji}</div>
          <div style={{fontFamily:'Bebas Neue',fontSize:22,letterSpacing:2,color:player.color}}>{player.name}</div>
          <div style={{fontSize:11,color:'rgba(255,255,255,.3)',marginTop:3}}>{isSetup?'Create your 4-digit PIN':!getPins()[player.id]?'No PIN yet — tap Skip':'Enter your PIN'}</div>
        </div>
        <div style={{display:'flex',gap:12,justifyContent:'center',marginBottom:20,animation:shk?'shake .4s':'none'}}>
          {[0,1,2,3].map(i=><div key={i} style={{width:14,height:14,borderRadius:'50%',background:pin.length>i?player.color:'rgba(255,255,255,.1)',border:`2px solid ${pin.length>i?player.color:'rgba(255,255,255,.12)'}`,transition:'all .2s'}}/>)}
        </div>
        {err&&<div style={{textAlign:'center',color:'#ff5252',fontSize:12,marginBottom:10,fontWeight:700}}>Wrong PIN — try again</div>}
        <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:7}}>
          {[1,2,3,4,5,6,7,8,9,'',0,'⌫'].map((d,i)=>(
            <button key={i} onClick={()=>d===''?null:d==='⌫'?setPin(p=>p.slice(0,-1)):handleDigit(String(d))}
              style={{background:d===''?'transparent':'rgba(255,255,255,.06)',border:`1px solid ${d===''?'transparent':'rgba(255,255,255,.08)'}`,color:'#fff',borderRadius:12,padding:'15px',fontSize:19,fontWeight:700,cursor:d===''?'default':'pointer'}}>{d}</button>
          ))}
        </div>
        {!isSetup&&!getPins()[player.id]&&<button onClick={onSuccess} style={{width:'100%',background:'transparent',border:'1px solid rgba(255,255,255,.08)',color:'rgba(255,255,255,.25)',borderRadius:10,padding:'10px',marginTop:10,cursor:'pointer',fontSize:11}}>Skip (honor system)</button>}
        <button onClick={onClose} style={{width:'100%',background:'transparent',border:'none',color:'rgba(255,255,255,.15)',padding:'8px',marginTop:6,cursor:'pointer',fontSize:11}}>Cancel</button>
      </div>
    </div>
  );
}
 
function PlayerProfile({player,rounds,scores,playerSettings,onClose}){
  const completed=rounds.filter(r=>r.completed);
  const hdcp=playerSettings[player.id]??player.defaultHcp;
  const st=useMemo(()=>{
    let b=0,e=0,p=0,bo=0,d=0,ac=0,best=null,worst=null,rp=0,tot=0,wins=0,streak=0,cur=0;
    [...completed].sort((a,bb)=>a.date>bb.date?1:-1).forEach(r=>{
      const s=scores[r.id]?.[player.id];if(!s)return;
      const course=COURSES[r.course_id]||COURSES.snee;
      let rt=0,played=false;
      s.forEach((sc,i)=>{if(sc>0&&course.holes[i]){const dd=sc-course.holes[i].par;if(sc===1)ac++;else if(dd<=-2)e++;else if(dd===-1)b++;else if(dd===0)p++;else if(dd===1)bo++;else d++;rt+=sc;played=true;}});
      if(played&&rt>0){tot+=rt;rp++;if(best===null||rt<best)best=rt;if(worst===null||rt>worst)worst=rt;}
      const all=PLAYERS.map(pp=>({id:pp.id,t:(scores[r.id]?.[pp.id]||[]).reduce((a,bb)=>a+(bb||0),0)})).filter(x=>x.t>0).sort((a,bb)=>a.t-bb.t);
      if(all[0]?.id===player.id){wins++;cur++;}else{streak=Math.max(streak,cur);cur=0;}
    });
    streak=Math.max(streak,cur);
    const trend=completed.slice(0,6).reverse().map(r=>{const s=scores[r.id]?.[player.id];return s?s.reduce((a,bb)=>a+(bb||0),0):null;}).filter(Boolean);
    return{b,e,p,bo,d,ac,best,worst,rp,avg:rp?Math.round(tot/rp):null,wins,streak,trend};
  },[completed.length]);
  return(
    <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,.9)',zIndex:400,display:'flex',alignItems:'flex-end',justifyContent:'center',animation:'fadeIn .2s'}} onClick={onClose}>
      <div style={{background:'#0a150a',border:`1px solid ${player.color}33`,borderRadius:'22px 22px 0 0',padding:'22px 18px',width:'100%',maxWidth:700,maxHeight:'85vh',overflowY:'auto',animation:'fadeUp .3s'}} onClick={e=>e.stopPropagation()}>
        <div style={{width:36,height:4,background:'rgba(255,255,255,.12)',borderRadius:2,margin:'0 auto 18px'}}/>
        <div style={{display:'flex',alignItems:'center',gap:14,marginBottom:20}}>
          <div style={{width:60,height:60,borderRadius:'50%',background:player.color,display:'flex',alignItems:'center',justifyContent:'center',fontSize:28,color:'#000',fontWeight:900}}>{player.emoji}</div>
          <div style={{flex:1}}><div style={{fontFamily:'Bebas Neue',fontSize:28,letterSpacing:2,color:player.color}}>{player.name}</div><div style={{fontSize:11,color:'rgba(255,255,255,.25)'}}>HCP {hdcp} · {st.rp} rounds</div></div>
          {st.best&&<div style={{textAlign:'right'}}><div style={{fontFamily:'Bebas Neue',fontSize:38,color:player.color,lineHeight:1}}>{st.best}</div><div style={{fontSize:8,color:'rgba(255,255,255,.2)',letterSpacing:2}}>BEST</div></div>}
        </div>
        <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:7,marginBottom:14}}>
          {[{n:st.wins,l:'WINS',c:'#ffd700'},{n:st.streak,l:'STREAK',c:'#ff9100'},{n:st.avg||'—',l:'AVG',c:player.color}].map((s,i)=>(
            <div key={i} style={{background:'rgba(0,0,0,.4)',borderRadius:12,padding:'12px 6px',textAlign:'center'}}>
              <div style={{fontFamily:'Bebas Neue',fontSize:28,color:s.c,lineHeight:1}}>{s.n}</div>
              <div style={{fontSize:8,color:'rgba(255,255,255,.2)',letterSpacing:2,fontWeight:700,marginTop:3}}>{s.l}</div>
            </div>
          ))}
        </div>
        <div style={{display:'grid',gridTemplateColumns:'repeat(5,1fr)',gap:5,marginBottom:12}}>
          {[{n:st.ac,l:'ACE',c:'#ffd700'},{n:st.e,l:'EAGLE',c:'#00e676'},{n:st.b,l:'BIRDIE',c:'#69f0ae'},{n:st.p,l:'PAR',c:'#555'},{n:st.bo+st.d,l:'BOG+',c:'#ff5252'}].map((s,i)=>(
            <div key={i} style={{background:'rgba(0,0,0,.3)',borderRadius:10,padding:'8px 3px',textAlign:'center'}}>
              <div style={{fontFamily:'Bebas Neue',fontSize:22,color:s.n>0?s.c:'#222'}}>{s.n}</div>
              <div style={{fontSize:7,color:'rgba(255,255,255,.18)',fontWeight:700,letterSpacing:1}}>{s.l}</div>
            </div>
          ))}
        </div>
        {st.rp>0&&(()=>{const tot=Math.max(1,st.e+st.b+st.p+st.bo+st.d);return(<div style={{height:7,borderRadius:3,overflow:'hidden',display:'flex',gap:1,marginBottom:10}}>{[{v:st.e,c:'#00e676'},{v:st.b,c:'#69f0ae'},{v:st.p,c:'#444'},{v:st.bo,c:'#ff9100'},{v:st.d,c:'#ff5252'}].map((bb,i)=>bb.v>0&&<div key={i} style={{flex:bb.v/tot,background:bb.c,minWidth:2}}/>)}</div>);})()}
        {st.trend.length>1&&(<div style={{marginBottom:10}}><div style={{fontSize:8,color:'rgba(255,255,255,.2)',letterSpacing:3,fontWeight:700,marginBottom:6}}>SCORE TREND</div><div style={{display:'flex',gap:3,alignItems:'flex-end',height:46}}>{st.trend.map((t,i)=>{const min=Math.min(...st.trend),max=Math.max(...st.trend);const h=max===min?22:Math.round(((max-t)/(max-min))*36)+10;return(<div key={i} style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',gap:2}}><div style={{width:'100%',background:i===st.trend.length-1?player.color:'rgba(255,255,255,.12)',borderRadius:'3px 3px 0 0',height:h,transition:'height .5s'}}/><div style={{fontSize:8,color:'rgba(255,255,255,.25)',fontWeight:700}}>{t}</div></div>);})}</div></div>)}
        {st.worst&&<div style={{fontSize:10,color:'rgba(255,255,255,.18)',textAlign:'center'}}>Worst round: {st.worst}</div>}
      </div>
    </div>
  );
}
 
function HamburgerMenu({onClose,rounds,scores,nextRound,setNextRound}){
  const[sec,setSec]=useState('main');
  const[fmtD,setFmtD]=useState(null);
  const completed=rounds.filter(r=>r.completed);
  const records=useMemo(()=>{
    let best={score:999,player:null,date:null},birds={count:0,player:null,date:null},strk={n:0,player:null};
    PLAYERS.forEach(p=>{
      let cur=0,mx=0;
      completed.forEach(r=>{
        const s=scores[r.id]?.[p.id];if(!s)return;
        const course=COURSES[r.course_id]||COURSES.snee;
        const tot=s.reduce((a,b)=>a+(b||0),0);
        if(tot>0&&tot<best.score)best={score:tot,player:p,date:r.date};
        const bd=s.filter((sc,i)=>sc>0&&course.holes[i]&&sc-course.holes[i].par===-1).length;
        if(bd>birds.count)birds={count:bd,player:p,date:r.date};
        const all=PLAYERS.map(pp=>({id:pp.id,t:(scores[r.id]?.[pp.id]||[]).reduce((a,b)=>a+(b||0),0)})).filter(x=>x.t>0).sort((a,b)=>a.t-b.t);
        if(all[0]?.id===p.id)cur++;else{mx=Math.max(mx,cur);cur=0;}
        mx=Math.max(mx,cur);if(mx>strk.n)strk={n:mx,player:p};
      });
    });
    return{best,birds,strk};
  },[completed.length]);
  const menu=[{id:'records',icon:'🏆',l:'All-Time Records'},{id:'formats',icon:'📖',l:'Format Rules'},{id:'schedule',icon:'📅',l:'Schedule Next Round'},{id:'settings',icon:'⚙️',l:'Settings'}];
  return(
    <div style={{position:'fixed',inset:0,zIndex:300,display:'flex'}} onClick={onClose}>
      <div style={{background:'#091409',width:280,height:'100%',borderRight:'1px solid rgba(0,230,118,.08)',padding:'55px 0 20px',overflowY:'auto',animation:'slideLeft .3s',flexShrink:0}} onClick={e=>e.stopPropagation()}>
        <div style={{padding:'0 18px 16px',borderBottom:'1px solid rgba(255,255,255,.04)',marginBottom:6}}><div style={{fontFamily:'Bebas Neue',fontSize:22,letterSpacing:3,color:'#00e676'}}>THURSDAY CREW</div><div style={{fontSize:9,color:'rgba(255,255,255,.18)',letterSpacing:2}}>GOLF TRACKER v3</div></div>
        {sec==='main'&&menu.map(m=><button key={m.id} onClick={()=>setSec(m.id)} style={{width:'100%',background:'transparent',border:'none',color:'#e8e8e8',padding:'15px 18px',cursor:'pointer',fontSize:14,fontWeight:600,display:'flex',alignItems:'center',gap:12,textAlign:'left',borderBottom:'1px solid rgba(255,255,255,.03)'}}><span style={{fontSize:18}}>{m.icon}</span>{m.l}<span style={{marginLeft:'auto',color:'rgba(255,255,255,.15)',fontSize:16}}>›</span></button>)}
        {sec==='records'&&<div style={{padding:'0 18px'}}>
          <button onClick={()=>setSec('main')} style={{background:'transparent',border:'none',color:'rgba(255,255,255,.25)',fontSize:12,cursor:'pointer',marginBottom:14,display:'flex',alignItems:'center',gap:5}}>‹ Back</button>
          <div style={{fontFamily:'Bebas Neue',fontSize:20,letterSpacing:2,color:'#ffd700',marginBottom:14}}>ALL-TIME RECORDS</div>
          {completed.length===0?<div style={{color:'rgba(255,255,255,.2)',fontSize:12}}>No completed rounds yet!</div>:<>
            {[{icon:'🏌️',l:'BEST ROUND EVER',v:records.best.score!==999?`${records.best.score} — ${records.best.player?.name}`:null,s:records.best.date},
              {icon:'🐦',l:'MOST BIRDIES',v:records.birds.count>0?`${records.birds.count} — ${records.birds.player?.name}`:null,s:records.birds.date},
              {icon:'🔥',l:'LONGEST WIN STREAK',v:records.strk.n>0?`${records.strk.n} — ${records.strk.player?.name}`:null,s:null}
            ].map((r,i)=><div key={i} style={{background:'rgba(0,0,0,.3)',borderRadius:14,padding:'13px',marginBottom:9}}><div style={{fontSize:20,marginBottom:5}}>{r.icon}</div><div style={{fontSize:9,color:'rgba(255,255,255,.25)',letterSpacing:2,fontWeight:700,marginBottom:3}}>{r.l}</div><div style={{fontSize:17,fontWeight:900,color:'#ffd700'}}>{r.v||'—'}</div>{r.s&&<div style={{fontSize:9,color:'rgba(255,255,255,.18)',marginTop:2}}>{r.s}</div>}</div>)}
          </>}
        </div>}
        {sec==='formats'&&<div style={{padding:'0 18px'}}>
          <button onClick={()=>{setSec('main');setFmtD(null);}} style={{background:'transparent',border:'none',color:'rgba(255,255,255,.25)',fontSize:12,cursor:'pointer',marginBottom:14,display:'flex',alignItems:'center',gap:5}}>‹ Back</button>
          <div style={{fontFamily:'Bebas Neue',fontSize:20,letterSpacing:2,color:'#00e676',marginBottom:14}}>FORMAT RULES</div>
          {fmtD?<div><button onClick={()=>setFmtD(null)} style={{background:'transparent',border:'none',color:'rgba(255,255,255,.25)',fontSize:11,cursor:'pointer',marginBottom:10,display:'flex',alignItems:'center',gap:5}}>‹ All</button><div style={{fontSize:26,marginBottom:6}}>{fmtD.icon}</div><div style={{fontFamily:'Bebas Neue',fontSize:20,letterSpacing:1,color:'#00e676',marginBottom:10}}>{fmtD.label}</div><div style={{fontSize:13,color:'rgba(255,255,255,.65)',lineHeight:1.8}}>{fmtD.rules}</div></div>:
          FORMATS.map(f=><button key={f.id} onClick={()=>setFmtD(f)} style={{width:'100%',background:'rgba(255,255,255,.02)',border:'1px solid rgba(255,255,255,.04)',borderRadius:11,padding:'11px 12px',cursor:'pointer',marginBottom:5,display:'flex',alignItems:'center',gap:9,textAlign:'left'}}><span style={{fontSize:18,flexShrink:0}}>{f.icon}</span><div style={{flex:1}}><div style={{fontSize:12,fontWeight:700,color:'#fff'}}>{f.label}</div><div style={{fontSize:9,color:'rgba(255,255,255,.22)',marginTop:1}}>{f.desc}</div></div><span style={{color:'rgba(255,255,255,.15)',fontSize:14}}>›</span></button>)}
        </div>}
        {sec==='schedule'&&<div style={{padding:'0 18px'}}>
          <button onClick={()=>setSec('main')} style={{background:'transparent',border:'none',color:'rgba(255,255,255,.25)',fontSize:12,cursor:'pointer',marginBottom:14,display:'flex',alignItems:'center',gap:5}}>‹ Back</button>
          <div style={{fontFamily:'Bebas Neue',fontSize:20,letterSpacing:2,color:'#00e676',marginBottom:14}}>NEXT ROUND</div>
          {[{l:'DATE',type:'date',k:'date'},{l:'TEE TIME',type:'time',k:'teeTime'}].map(o=><div key={o.k} style={{marginBottom:12}}><div style={{fontSize:9,color:'rgba(255,255,255,.25)',letterSpacing:2,fontWeight:700,marginBottom:5}}>{o.l}</div><input type={o.type} value={nextRound[o.k]||''} onChange={e=>setNextRound(n=>({...n,[o.k]:e.target.value}))} style={{width:'100%',background:'rgba(0,0,0,.4)',border:'1px solid rgba(255,255,255,.09)',color:'#fff',padding:'10px 12px',borderRadius:10,fontSize:14}}/></div>)}
          <div style={{marginBottom:14}}><div style={{fontSize:9,color:'rgba(255,255,255,.25)',letterSpacing:2,fontWeight:700,marginBottom:5}}>COURSE</div><select value={nextRound.courseId||'snee'} onChange={e=>setNextRound(n=>({...n,courseId:e.target.value}))} style={{width:'100%',background:'rgba(0,0,0,.4)',border:'1px solid rgba(255,255,255,.09)',color:'#fff',padding:'10px 12px',borderRadius:10,fontSize:13}}>{Object.entries(COURSES).map(([id,c])=><option key={id} value={id}>{c.name}</option>)}</select></div>
          <button onClick={()=>{setSec('main');onClose();}} style={{background:'linear-gradient(135deg,#00c853,#00e676)',color:'#000',border:'none',borderRadius:12,padding:'13px',fontSize:14,fontWeight:900,cursor:'pointer',letterSpacing:2,fontFamily:'Bebas Neue',width:'100%'}}>SAVE</button>
        </div>}
        {sec==='settings'&&<div style={{padding:'0 18px'}}>
          <button onClick={()=>setSec('main')} style={{background:'transparent',border:'none',color:'rgba(255,255,255,.25)',fontSize:12,cursor:'pointer',marginBottom:14,display:'flex',alignItems:'center',gap:5}}>‹ Back</button>
          <div style={{fontFamily:'Bebas Neue',fontSize:20,letterSpacing:2,color:'#00e676',marginBottom:14}}>SETTINGS</div>
          <div style={{background:'rgba(255,255,255,.02)',borderRadius:12,padding:'14px',marginBottom:12}}><div style={{fontSize:10,fontWeight:700,color:'rgba(255,255,255,.4)',marginBottom:10}}>RESET PLAYER PINS</div>{PLAYERS.map(p=><button key={p.id} onClick={()=>{const pins=getPins();delete pins[p.id];savePins(pins);alert(`${p.name}'s PIN reset`);}} style={{width:'100%',background:'rgba(255,68,68,.07)',border:'1px solid rgba(255,68,68,.13)',color:'#ff5252',borderRadius:9,padding:'9px',marginBottom:5,cursor:'pointer',fontSize:11,fontWeight:700,display:'flex',alignItems:'center',gap:7}}><span style={{width:22,height:22,borderRadius:'50%',background:p.color,display:'flex',alignItems:'center',justifyContent:'center',fontSize:10,color:'#000',fontWeight:900}}>{p.emoji}</span>Reset {p.name}'s PIN</button>)}</div>

        </div>}
      </div>
      <div style={{flex:1,background:'rgba(0,0,0,.5)'}}/>
    </div>
  );
}
 
function App(){
  const[view,setView]=useState('home');
  const[activeRoundId,setActiveRoundId]=useState(null);
  const[rounds,setRounds]=useState([]);
  const[scores,setScores]=useState({});
  const[extras,setExtras]=useState({});// closestPin, longDrive, mulligans per round
  const[playerSettings,setPlayerSettings]=useState({});
  const[loading,setLoading]=useState(true);
  const[toast,setToast]=useState(null);
 
  const showToast=(msg,type='success',duration=3000)=>{
    setToast({msg,type});
    setTimeout(()=>setToast(null),duration);
  };
 
  useEffect(()=>{loadAll();},[]);
 
  useEffect(()=>{
    const s1=sb.channel('sc-v2').on('postgres_changes',{event:'*',schema:'public',table:'scores'},p=>{
      if(p.eventType==='INSERT'||p.eventType==='UPDATE'){
        const s=p.new;
        setScores(prev=>({...prev,[s.round_id]:{...(prev[s.round_id]||{}),[s.player_id]:s.holes}}));
      }
    }).subscribe();
    const s2=sb.channel('rc-v2').on('postgres_changes',{event:'*',schema:'public',table:'rounds'},p=>{
      if(p.eventType==='INSERT')setRounds(prev=>[p.new,...prev]);
      else if(p.eventType==='UPDATE')setRounds(prev=>prev.map(r=>r.id===p.new.id?p.new:r));
      else if(p.eventType==='DELETE')setRounds(prev=>prev.filter(r=>r.id!==p.old.id));
    }).subscribe();
    return()=>{sb.removeChannel(s1);sb.removeChannel(s2);};
  },[]);
 
  const loadAll=async()=>{
    setLoading(true);
    try{
      const[{data:rd},{data:sd},{data:ps}]=await Promise.all([
        sb.from('rounds').select('*').order('created_at',{ascending:false}),
        sb.from('scores').select('*'),
        sb.from('player_settings').select('*'),
      ]);
      setRounds(rd||[]);
      const m={};
      for(const s of(sd||[])){if(!m[s.round_id])m[s.round_id]={};m[s.round_id][s.player_id]=s.holes;}
      setScores(m);
      const p={};
      for(const s of(ps||[]))p[s.player_id]=s.handicap;
      setPlayerSettings(p);
      const live=(rd||[]).find(r=>!r.completed);
      if(live)setActiveRoundId(live.id);
    }catch(e){console.error(e);}
    setLoading(false);
  };
 
  const startRound=async(setup)=>{
    try{
      const hdcp={};PLAYERS.forEach(p=>{hdcp[p.id]=playerSettings[p.id]??p.defaultHcp;});
      const{data:round,error}=await sb.from('rounds').insert({
        date:setup.date,format:setup.format,team_config:setup.teamConfig,
        tees:setup.tees,bet_amount:setup.betAmount,handicaps:hdcp,
        completed:false,course_id:setup.courseId,
        team_names:setup.teamNames||null,
        mulligans_allowed:setup.mulligansAllowed||0,
      }).select().single();
      if(error)throw error;
      await sb.from('scores').insert(PLAYERS.map(p=>({round_id:round.id,player_id:p.id,holes:Array(18).fill(0)})));
      // Init extras
      setExtras(prev=>({...prev,[round.id]:{mulligans:{ben:0,thomas:0,max:0,luke:0},closestPin:{},longDrive:{}}}));
      setActiveRoundId(round.id);
      setView('scorecard');
      showToast('Round started! Good luck 🏌️');
      Haptic.medium();
    }catch(e){
      console.error(e);
      showToast('Error starting round. Try running the SQL update in Supabase.','error');
    }
  };
 
  const updateScore=async(roundId,playerId,holeIdx,value)=>{
    const cur=scores[roundId]?.[playerId]||Array(18).fill(0);
    const upd=[...cur];
    const newVal=value===null?0:Math.max(1,parseInt(value)||0);
    const oldVal=upd[holeIdx];
    upd[holeIdx]=newVal;
    setScores(prev=>({...prev,[roundId]:{...(prev[roundId]||{}),[playerId]:upd}}));
    await sb.from('scores').update({holes:upd,updated_at:new Date().toISOString()}).eq('round_id',roundId).eq('player_id',playerId);
    // Sound & haptic
    const round=rounds.find(r=>r.id===roundId);
    const course=COURSES[round?.course_id]||COURSES.snee;
    const hole=course.holes[holeIdx];
    if(hole&&newVal>0&&newVal!==oldVal){
      const d=newVal-hole.par;
      if(newVal===1){Sound.play('ace');Haptic.celebrate();showToast('HOLE IN ONE!!! 🎉🎉🎉','success',5000);}
      else if(d<=-2){Sound.play('eagle');Haptic.celebrate();showToast(`EAGLE! 🦅🦅`,'success');}
      else if(d===-1){Sound.play('birdie');Haptic.medium();}
      else if(d>=2){Sound.play('bogey');Haptic.light();}
      else if(d>=3){Sound.play('bogey');Haptic.light();const pl=PLAYERS.find(p=>p.id===playerId);if(pl){const TRASH=[(p,s)=>`${p} shot ${s}? My grandma plays better.`,(p,s)=>`${p} with a ${s}. Bold strategy. Terrible, but bold.`,(p,s)=>`${s} for ${p}. The course wants its dignity back.`,(p,s)=>`${p} put up a ${s}. That's not a score, that's a zip code.`,(p,s)=>`${p} carded a ${s}. Tiger is shaking his head.`];setTrashPop({line:TRASH[Math.floor(Math.random()*TRASH.length)](pl.name,nv),player:pl});setTimeout(()=>setTrashPop(null),4000);}}
      else{Sound.play('click');Haptic.light();}
    }
  };
 
  const updateTeamScore=(roundId,teamIdx,holeIdx,value)=>{
    const cur=teamScores[roundId]||[];
    const upd=cur.map((t,ti)=>ti===teamIdx?t.map((s,hi)=>hi===holeIdx?Math.max(1,parseInt(value)||0):s):t);
    const nts={...teamScores,[roundId]:upd};setTeamScores(nts);localStorage.setItem('tcg_ts',JSON.stringify(nts));
  };
  const requestUnlock=player=>{
    const pins=getPins();
    if(!pins[player.id]){setPinModal({player,isSetup:true,onSuccess:()=>{setPinModal(null);setUnlockedPlayer(player.id);}});}
    else{setPinModal({player,isSetup:false,onSuccess:()=>{setPinModal(null);setUnlockedPlayer(player.id);}});}
  };
  const finishRound=async(roundId)=>{
    await sb.from('rounds').update({completed:true}).eq('id',roundId);
    setActiveRoundId(null);
    setView('leaderboard');
    showToast('Round complete! 🏆');
    Haptic.celebrate();
  };
 
  const deleteRound=async(roundId)=>{
    await sb.from('rounds').delete().eq('id',roundId);
    if(activeRoundId===roundId)setActiveRoundId(null);
    showToast('Round deleted');
  };
 
  const updateHandicap=async(pid,val)=>{
    const hcp=parseInt(val)||0;
    setPlayerSettings(prev=>({...prev,[pid]:hcp}));
    await sb.from('player_settings').upsert({player_id:pid,handicap:hcp,updated_at:new Date().toISOString()});
  };
 
  const updateExtras=(roundId,type,data)=>{
    setExtras(prev=>({...prev,[roundId]:{...(prev[roundId]||{}),  [type]:{...((prev[roundId]||{})[type]||{}),...data}}}));
  };
 
  const activeRound=rounds.find(r=>r.id===activeRoundId);
  const activeScores=activeRoundId?(scores[activeRoundId]||{}):{};
  const activeExtras=activeRoundId?(extras[activeRoundId]||{}):{};
  const latestCompleted=rounds.find(r=>r.completed);
 
  if(loading)return(
    <div style={{minHeight:'100vh',background:'#030806',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',gap:16}}>
      <div style={{fontSize:56,animation:'bounce 1s infinite'}}>⛳</div>
      <div style={{color:'#00e676',fontSize:12,letterSpacing:4,fontWeight:700}}>LOADING...</div>
    </div>
  );
 
  return(
    <div style={{minHeight:'100vh',background:'#030806',paddingBottom:100}}>
      {toast&&(
        <div style={{position:'fixed',top:16,left:'50%',transform:'translateX(-50%)',zIndex:9999,background:toast.type==='error'?'#c62828':'#00e676',color:toast.type==='error'?'#fff':'#000',padding:'11px 22px',borderRadius:30,fontSize:13,fontWeight:800,boxShadow:'0 8px 32px rgba(0,0,0,.6)',whiteSpace:'nowrap',animation:'slideDown .3s ease',letterSpacing:.5}}>{toast.msg}</div>
      )}
 
      <header style={{position:'sticky',top:0,zIndex:100,background:'rgba(3,8,6,.97)',backdropFilter:'blur(20px)',borderBottom:'1px solid rgba(0,230,118,.08)',padding:'11px 15px',display:'flex',alignItems:'center',justifyContent:'space-between'}}>
        <div style={{display:'flex',alignItems:'center',gap:10,cursor:'pointer'}} onClick={()=>setView('home')}>
          <span style={{fontSize:22}}>⛳</span>
          <div>
            <div style={{fontFamily:'Bebas Neue',fontSize:19,letterSpacing:3,color:'#00e676',lineHeight:1}}>THURSDAY CREW</div>
            <div style={{fontSize:8,color:'#1a4a1a',letterSpacing:3,fontWeight:700}}>SOUTH CAROLINA GOLF</div>
          </div>
        </div>
        <div style={{display:'flex',gap:4}}>
          {[{id:'home',i:'🏠'},{id:'setup',i:'🎯'},{id:'stats',i:'📊'},{id:'history',i:'📋'}].map(n=>(
            <button key={n.id} onClick={()=>setView(n.id)} style={{background:view===n.id?'rgba(0,230,118,.12)':'transparent',border:`1px solid ${view===n.id?'rgba(0,230,118,.4)':'rgba(255,255,255,.04)'}`,color:view===n.id?'#00e676':'#444',padding:'7px 10px',borderRadius:8,cursor:'pointer',fontSize:14,transition:'all .2s'}}>{n.i}</button>
          ))}
          {activeRound&&<button onClick={()=>setView('scorecard')} style={{background:'rgba(255,68,68,.15)',border:'1px solid rgba(255,68,68,.5)',color:'#ff4444',padding:'7px 10px',borderRadius:8,cursor:'pointer',fontSize:13,fontWeight:700,animation:'pulse 2s infinite',letterSpacing:.5}}>🔴 LIVE</button>}
        </div>
      </header>
 
      <div style={{maxWidth:700,margin:'0 auto',padding:'16px 13px'}}>
        {view==='home'&&<HomeView rounds={rounds} scores={scores} playerSettings={playerSettings} activeRound={activeRound} updateHandicap={updateHandicap} setView={setView} setActiveRoundId={setActiveRoundId} nextRound={nextRound} onPlayerClick={p=>{setProfileModal(p);}}/>}
        {view==='setup'&&<SetupView startRound={startRound} playerSettings={playerSettings}/>}
        {view==='scorecard'&&activeRound&&<ScorecardView round={activeRound} scores={activeScores} extras={activeExtras} updateScore={updateScore} finishRound={finishRound} updateExtras={updateExtras} playerSettings={playerSettings} rounds={rounds}/>}
        {view==='history'&&<HistoryView rounds={rounds} scores={scores} teamScores={teamScores} deleteRound={deleteRound} setActiveRoundId={setActiveRoundId} setView={setView}/>}
        {view==='stats'&&<StatsView rounds={rounds} scores={scores} playerSettings={playerSettings}/>}
        {view==='leaderboard'&&latestCompleted&&<LeaderboardView round={latestCompleted} scores={scores[latestCompleted.id]||{}} teamScores={teamScores[latestCompleted?.id]||[]} playerSettings={playerSettings} setView={setView}/>}
      </div>
    </div>
  );
}

// HOME VIEW

function HomeView({rounds,scores,playerSettings,activeRound,updateHandicap,setView,setActiveRoundId}){
  const[editHdcp,setEditHdcp]=useState(false);
  const completed=rounds.filter(r=>r.completed);
  const thisMonth=completed.filter(r=>r.date?.startsWith(new Date().toISOString().slice(0,7))).length;
 
  // Season standings
  const seasonStandings=PLAYERS.map(p=>{
    let wins=0,totalStrokes=0,rounds_played=0,best=null,streak=0,currentStreak=0;
    const sorted=[...completed].sort((a,b)=>a.date>b.date?1:-1);
    sorted.forEach(r=>{
      const s=scores[r.id]?.[p.id];if(!s)return;
      const tot=s.reduce((a,b)=>a+(b||0),0);if(!tot)return;
      totalStrokes+=tot;rounds_played++;
      if(best===null||tot<best)best=tot;
      const allTots=PLAYERS.map(pp=>({id:pp.id,t:(scores[r.id]?.[pp.id]||[]).reduce((a,b)=>a+(b||0),0)})).filter(x=>x.t>0).sort((a,b)=>a.t-b.t);
      if(allTots[0]?.id===p.id){wins++;currentStreak++;}else{streak=Math.max(streak,currentStreak);currentStreak=0;}
    });
    streak=Math.max(streak,currentStreak);
    return{...p,wins,rounds_played,best,streak,avg:rounds_played?Math.round(totalStrokes/rounds_played):null};
  }).sort((a,b)=>b.wins-a.wins);
 
  const getBest=pid=>seasonStandings.find(p=>p.id===pid)?.best;
 
  return(
    <div style={{display:'flex',flexDirection:'column',gap:16,animation:'fadeUp .4s ease'}}>

        <div style={{display:'flex',gap:10}}>
          {[{n:completed.length,l:'ROUNDS'},{n:thisMonth,l:'THIS MONTH'},{n:seasonStandings[0]?.wins||0,l:`${seasonStandings[0]?.name||''} LEADS`}].map((s,i)=>(

        </div>
      </div>
 
      {/* Live alert */}
      {activeRound&&(

          <div style={{width:10,height:10,borderRadius:'50%',background:'#ff4444',animation:'pulse 1s infinite',flexShrink:0}}/>
          <div style={{flex:1}}>
            <div style={{fontWeight:800,fontSize:14}}>{FORMATS.find(f=>f.id===activeRound.format)?.label} — IN PROGRESS</div>

            return(

        </div>
      )}
 
      {tab==='teams'&&(
        <div style={{display:'flex',flexDirection:'column',gap:8}}>
          {TEAM_CONFIGS.map(t=>(
            <div key={t.id} onClick={()=>setSetup(s=>({...s,teamConfig:t.id}))} style={{background:setup.teamConfig===t.id?'rgba(0,230,118,.08)':'rgba(255,255,255,.02)',border:`1px solid ${setup.teamConfig===t.id?'rgba(0,230,118,.35)':'rgba(255,255,255,.05)'}`,borderRadius:14,padding:'14px 16px',cursor:'pointer'}}>
              <div style={{fontWeight:800,fontSize:13,color:setup.teamConfig===t.id?'#00e676':'#fff',marginBottom:8}}>{t.label}</div>
              <div style={{display:'flex',gap:6,flexWrap:'wrap'}}>
                {t.teams.map((team,i)=>(
                  <div key={i} style={{background:'rgba(0,230,118,.08)',border:'1px solid rgba(0,230,118,.2)',borderRadius:20,padding:'3px 10px',fontSize:11,color:'#00e676',fontWeight:700}}>
                    {team.map(id=>PLAYERS.find(p=>p.id===id)?.name).join(' & ')}
                  </div>
                ))}
              </div>
            </div>
          ))}
          {setup.teamConfig!=='solo'&&(
            <div style={{background:'rgba(255,255,255,.02)',border:'1px solid rgba(255,255,255,.06)',borderRadius:14,padding:'14px 16px',marginTop:4}}>
              <div style={{fontSize:10,color:'#00e676',letterSpacing:2,fontWeight:800,marginBottom:10}}>CUSTOM TEAM NAMES</div>
              {['Team 1','Team 2'].map((_,i)=>(
                <div key={i} style={{display:'flex',alignItems:'center',gap:8,marginBottom:8}}>
                  <div style={{fontSize:11,color:'rgba(255,255,255,.25)',width:56}}>TEAM {i+1}</div>
                  <input value={setup.teamNames[i]} onChange={e=>{const n=[...setup.teamNames];n[i]=e.target.value;setSetup(s=>({...s,teamNames:n}));}}
                    style={{flex:1,background:'rgba(0,0,0,.4)',border:'1px solid rgba(255,255,255,.1)',color:'#fff',padding:'9px 12px',borderRadius:10,fontSize:14,fontWeight:600}}/>
                </div>
              ))}
            </div>
          )}
        </div>
      )}
 
      {tab==='options'&&(
        <div style={{background:'rgba(255,255,255,.02)',border:'1px solid rgba(255,255,255,.05)',borderRadius:14,padding:16,display:'flex',flexDirection:'column',gap:14}}>
          <div style={{display:'flex',alignItems:'center',justifyContent:'space-between'}}>
            <div style={{fontSize:11,color:'rgba(255,255,255,.35)',letterSpacing:2,fontWeight:700}}>DATE</div>
            <input type="date" value={setup.date} onChange={e=>setSetup(s=>({...s,date:e.target.value}))} style={{background:'rgba(0,0,0,.5)',border:'1px solid rgba(255,255,255,.1)',color:'#fff',padding:'8px 12px',borderRadius:10,fontSize:13}}/>
          </div>
          <div style={{display:'flex',alignItems:'center',justifyContent:'space-between'}}>
            <div style={{fontSize:11,color:'rgba(255,255,255,.35)',letterSpacing:2,fontWeight:700}}>TEES</div>
            <select value={setup.tees} onChange={e=>setSetup(s=>({...s,tees:e.target.value}))} style={{background:'rgba(0,0,0,.5)',border:'1px solid rgba(255,255,255,.1)',color:'#fff',padding:'8px 12px',borderRadius:10,fontSize:13}}>
              {[{v:'black',l:'Black — Championship'},{v:'blue',l:'Blue'},{v:'white',l:'White'},{v:'gold',l:'Gold — Senior'},{v:'red',l:'Red — Forward'}].map(o=><option key={o.v} value={o.v}>{o.l}</option>)}
            </select>
          </div>
          <div style={{display:'flex',alignItems:'center',justifyContent:'space-between'}}>
            <div style={{fontSize:11,color:'rgba(255,255,255,.35)',letterSpacing:2,fontWeight:700}}>BET / HOLE ($)</div>
            <input type="number" value={setup.betAmount} min={0} max={500} onChange={e=>setSetup(s=>({...s,betAmount:parseInt(e.target.value)||0}))} style={{background:'rgba(0,0,0,.5)',border:'1px solid rgba(0,230,118,.3)',color:'#00e676',padding:'8px 12px',borderRadius:10,fontSize:20,fontWeight:900,width:80,textAlign:'center'}}/>
          </div>
          <div style={{display:'flex',alignItems:'center',justifyContent:'space-between'}}>
            <div>
              <div style={{fontSize:11,color:'rgba(255,255,255,.35)',letterSpacing:2,fontWeight:700}}>MULLIGANS / PLAYER</div>
              <div style={{fontSize:10,color:'rgba(255,255,255,.2)',marginTop:2}}>0 = no mulligans</div>
            </div>
            <input type="number" value={setup.mulligansAllowed} min={0} max={6} onChange={e=>setSetup(s=>({...s,mulligansAllowed:parseInt(e.target.value)||0}))} style={{background:'rgba(0,0,0,.5)',border:'1px solid rgba(255,145,0,.3)',color:'#ff9100',padding:'8px 12px',borderRadius:10,fontSize:20,fontWeight:900,width:60,textAlign:'center'}}/>
          </div>
        </div>
      )}
 
      <button onClick={()=>startRound(setup)} style={{background:'linear-gradient(135deg,#00c853,#00e676)',color:'#000',border:'none',borderRadius:18,padding:'20px 24px',fontSize:22,fontWeight:900,cursor:'pointer',letterSpacing:3,fontFamily:'Bebas Neue',boxShadow:'0 8px 40px rgba(0,230,118,.3)'}}>
        🏌️ START ROUND
      </button>
    </div>
  );
}
 
// ══════════════════════════════════════════════
// SCORECARD VIEW
// ══════════════════════════════════════════════
function ScorecardView({round,scores,extras,updateScore,finishRound,updateExtras,playerSettings,rounds}){
  const[holeIdx,setHoleIdx]=useState(0);
  const[showAll,setShowAll]=useState(false);
  const[showSkins,setShowSkins]=useState(false);
  const[showBets,setShowBets]=useState(false);
  const[wolfOrder,setWolfOrder]=useState(['ben','thomas','max','luke']);
  const[lastScored,setLastScored]=useState(null);
 
  const course=COURSES[round.course_id]||COURSES.snee;
  const holes=course.holes;
  const fmt=FORMATS.find(f=>f.id===round.format);
  const hole=holes[holeIdx];
  const mulligansAllowed=round.mulligans_allowed||0;
  const mulligans=extras.mulligans||{ben:0,thomas:0,max:0,luke:0};
  const closestPin=extras.closestPin||{};
  const longDrive=extras.longDrive||{};
 
  const holesPlayed=PLAYERS.reduce((max,p)=>{const pl=(scores[p.id]||[]).filter(s=>s>0).length;return Math.max(max,pl);},0);
 
  const getTP=pid=>{let tp=0;(scores[pid]||[]).forEach((s,i)=>{if(s>0&&holes[i])tp+=s-holes[i].par;});return tp;};
  const getSF=pid=>(scores[pid]||[]).reduce((a,s,i)=>a+(s>0&&holes[i]?sfPts(s,holes[i].par):0),0);
 
  const skinsList=useMemo(()=>{
    const sk=Array(18).fill(null);
    holes.forEach((_,i)=>{const all=PLAYERS.map(p=>(scores[p.id]||[])[i]).filter(x=>x>0);if(all.length===4){const min=Math.min(...all);const w=PLAYERS.filter(p=>((scores[p.id]||[])[i])===min);if(w.length===1)sk[i]=w[0].id;}});
    return sk;
  },[scores,holes]);
 
  const skinsCount=pid=>skinsList.filter(s=>s===pid).length;
  const skinsVal=round.bet_amount||5;
 
  const getDS=pid=>{
    if(round.format==='stableford')return{d:getSF(pid)+'pts',c:'#ffd700'};
    if(round.format==='skins')return{d:skinsCount(pid)+'🩳',c:'#9b59b6'};
    const tp=getTP(pid);return{d:tpStr(tp),c:tp<0?'#00e676':tp>0?'#ff5252':'#555'};
  };
 
  // Wolf logic
  const wolfPlayer=round.format==='wolf'?PLAYERS.find(p=>p.id===wolfOrder[holeIdx%4]):null;
 
  const handleScore=(pid,delta)=>{
    const cur=(scores[pid]||[])[holeIdx]||hole.par;
    updateScore(round.id,pid,holeIdx,cur+delta);
    setLastScored(pid);
  };
 
  const handleInput=(pid,val)=>{
    updateScore(round.id,pid,holeIdx,val===''?null:val);
    setLastScored(pid);
  };
 
  const useMulligan=(pid)=>{
    if(mulligans[pid]>=mulligansAllowed)return;
    updateExtras(round.id,'mulligans',{[pid]:(mulligans[pid]||0)+1});
    Haptic.medium();
    Sound.play('click');
  };
 
  // Par 3 closest pin
  const isPar3=hole.par===3;
 
  // Running bet
  const getBetResults=()=>{
    const ranked=[...PLAYERS].map(p=>({...p,tp:getTP(p.id),total:(scores[p.id]||[]).reduce((a,b)=>a+(b||0),0)})).sort((a,b)=>a.tp-b.tp);
    return ranked.map((p,i)=>({...p,net:i===0?(PLAYERS.length-1)*round.bet_amount:-round.bet_amount}));
  };
 
  return(
    <div style={{display:'flex',flexDirection:'column',gap:11,animation:'fadeUp .3s ease'}}>
      {/* Header */}
      <div style={{background:'linear-gradient(135deg,rgba(0,230,118,.08),rgba(0,200,83,.03))',border:'1px solid rgba(0,230,118,.15)',borderRadius:18,padding:'13px 15px',display:'flex',alignItems:'center',gap:12}}>
        <span style={{fontSize:26}}>{fmt?.icon}</span>
        <div style={{flex:1}}>
          <div style={{fontFamily:'Bebas Neue',fontSize:20,letterSpacing:2}}>{fmt?.label}</div>
          <div style={{fontSize:10,color:'rgba(255,255,255,.25)',marginTop:1,letterSpacing:1}}>{round.date} · {course.name} · {round.tees?.toUpperCase()}</div>
        </div>
        <div style={{display:'flex',flexDirection:'column',alignItems:'flex-end',gap:3}}>
          <div style={{background:'#00e676',color:'#000',borderRadius:20,padding:'3px 12px',fontSize:13,fontWeight:900}}>{holesPlayed}/18</div>
          <div style={{display:'flex',gap:4,alignItems:'center'}}><div style={{width:5,height:5,borderRadius:'50%',background:'#00e676',animation:'pulse 2s infinite'}}/><span style={{fontSize:9,color:'#00e676',letterSpacing:1,fontWeight:700}}>LIVE SYNC</span></div>
        </div>
      </div>
 
      {/* Weather */}
      <WeatherWidget lat={course.lat} lon={course.lon} courseName={course.name}/>
 
      {/* Wolf indicator */}
      {wolfPlayer&&<div style={{background:'rgba(155,89,182,.1)',border:'1px solid rgba(155,89,182,.3)',borderRadius:12,padding:'10px 14px',display:'flex',gap:10,alignItems:'center'}}>
        <span style={{fontSize:20}}>🐺</span>
        <div><span style={{fontWeight:800,color:wolfPlayer.color}}>{wolfPlayer.name}</span><span style={{color:'rgba(255,255,255,.4)',fontSize:13}}> is the Wolf this hole</span></div>
      </div>}
 
      {/* Standings */}
      <div style={{display:'flex',gap:6,overflowX:'auto',paddingBottom:2}}>
        {PLAYERS.map(p=>{const ds=getDS(p.id);return(
          <div key={p.id} style={{flex:'0 0 auto',display:'flex',flexDirection:'column',alignItems:'center',gap:4,background:'rgba(255,255,255,.04)',border:'1px solid rgba(255,255,255,.06)',borderRadius:12,padding:'9px 12px',minWidth:72}}>
            <div style={{width:30,height:30,borderRadius:'50%',background:p.color,display:'flex',alignItems:'center',justifyContent:'center',fontWeight:900,fontSize:13,color:'#000'}}>{p.emoji}</div>
            <div style={{fontWeight:900,fontSize:15,color:ds.c}}>{ds.d}</div>
            {mulligansAllowed>0&&<div style={{fontSize:9,color:'rgba(255,255,255,.25)'}}>🍀{mulligansAllowed-(mulligans[p.id]||0)}</div>}
          </div>
        );})}
      </div>
 
      {/* Hole nav */}
      <div style={{background:'rgba(255,255,255,.04)',border:'1px solid rgba(255,255,255,.06)',borderRadius:15,padding:'13px 15px',display:'flex',alignItems:'center',justifyContent:'space-between'}}>
        <button onClick={()=>{setHoleIdx(Math.max(0,holeIdx-1));Haptic.light();}} disabled={holeIdx===0} style={{background:'rgba(255,255,255,.06)',border:'none',color:'#fff',width:42,height:42,borderRadius:12,cursor:'pointer',fontSize:24,opacity:holeIdx===0?.3:1}}>‹</button>
        <div style={{textAlign:'center'}}>
          <div style={{display:'flex',gap:10,alignItems:'baseline',justifyContent:'center'}}>
            <span style={{fontFamily:'Bebas Neue',fontSize:36,color:'#ffd700',lineHeight:1}}>#{hole.hole}</span>
            <span style={{fontSize:19,color:'#00e676',fontWeight:800}}>Par {hole.par}</span>
          </div>
          <div style={{fontSize:11,color:'rgba(255,255,255,.25)',marginTop:2}}>{hole.yards} yds · HCP Stroke {hole.hcp}</div>
          {isPar3&&<div style={{fontSize:10,color:'#ffd700',fontWeight:700,marginTop:2}}>📍 PAR 3 — TRACK CLOSEST PIN</div>}
        </div>
        <button onClick={()=>{setHoleIdx(Math.min(holes.length-1,holeIdx+1));Haptic.light();}} disabled={holeIdx===holes.length-1} style={{background:'rgba(255,255,255,.06)',border:'none',color:'#fff',width:42,height:42,borderRadius:12,cursor:'pointer',fontSize:24,opacity:holeIdx===holes.length-1?.3:1}}>›</button>
      </div>
 
      {/* Score inputs */}
      <div style={{display:'flex',flexDirection:'column',gap:8}}>
        {PLAYERS.map(p=>{
          const sc=(scores[p.id]||[])[holeIdx]||null;
          const sn=sc?scoreName(sc,hole.par):null;
          const isSkin=skinsList[holeIdx]===p.id;
          const isCP=closestPin[holeIdx]===p.id;
          const isLD=longDrive[holeIdx]===p.id;
          const hdcp=playerSettings[p.id]??p.defaultHcp;
          const strokesOnHole=Math.floor(hdcp/18)+(hole.hcp<=hdcp%18?1:0);
          const netSc=sc?sc-strokesOnHole:null;
          const animated=lastScored===p.id&&sn&&(sn.type==='birdie'||sn.type==='eagle');
          return(
            <div key={p.id} style={{background:'rgba(255,255,255,.04)',borderRadius:15,padding:'12px 14px',borderLeft:`3px solid ${p.color}`,position:'relative',overflow:'hidden',transition:'all .2s',boxShadow:animated?`0 0 20px ${p.color}44`:'none'}}>
              {isSkin&&<div style={{position:'absolute',top:5,right:5,fontSize:9,color:'#9b59b6',fontWeight:800,background:'rgba(155,89,182,.15)',padding:'2px 7px',borderRadius:20}}>💀 SKIN</div>}
              {isCP&&<div style={{position:'absolute',top:5,right:isSkin?60:5,fontSize:9,color:'#ffd700',fontWeight:800,background:'rgba(255,215,0,.1)',padding:'2px 7px',borderRadius:20}}>📍 CLOSEST</div>}
              {isLD&&<div style={{position:'absolute',top:5,right:5,fontSize:9,color:'#40c4ff',fontWeight:800,background:'rgba(64,196,255,.1)',padding:'2px 7px',borderRadius:20}}>💪 LONG DRIVE</div>}
              <div style={{display:'flex',alignItems:'center',justifyContent:'space-between'}}>
                <div style={{display:'flex',alignItems:'center',gap:10}}>
                  <div style={{width:38,height:38,borderRadius:'50%',background:p.color,display:'flex',alignItems:'center',justifyContent:'center',fontWeight:900,fontSize:17,color:'#000',flexShrink:0,animation:animated?'celebrate .6s ease':''}}>{p.emoji}</div>
                  <div>
                    <div style={{fontWeight:900,fontSize:14,color:p.color}}>{p.name}</div>
                    {sn&&<div style={{fontSize:11,color:sn.c,fontWeight:700,marginTop:1}}>{sn.l}</div>}
                    {sc&&strokesOnHole>0&&<div style={{fontSize:10,color:'rgba(255,255,255,.25)'}}>Net: {netSc} ({strokesOnHole} stroke{strokesOnHole>1?'s':''})</div>}
                  </div>
                </div>
                <div style={{display:'flex',alignItems:'center',gap:6}}>
                  <button onPointerDown={()=>handleScore(p.id,-1)} style={{background:'rgba(255,255,255,.06)',border:'none',color:'#fff',width:38,height:44,borderRadius:11,cursor:'pointer',fontSize:26,display:'flex',alignItems:'center',justifyContent:'center',userSelect:'none',WebkitUserSelect:'none'}}>−</button>
                  <input type="number" min={1} max={15} value={sc||''} placeholder={hole.par}
                    onChange={e=>handleInput(p.id,e.target.value)}
                    style={{background:'rgba(0,0,0,.7)',border:`2px solid ${sc?p.color:'rgba(255,255,255,.1)'}`,color:'#ffd700',width:54,height:50,textAlign:'center',fontSize:30,fontWeight:900,borderRadius:11,outline:'none',transition:'border-color .2s'}}/>
                  <button onPointerDown={()=>handleScore(p.id,1)} style={{background:'rgba(255,255,255,.06)',border:'none',color:'#fff',width:38,height:44,borderRadius:11,cursor:'pointer',fontSize:26,display:'flex',alignItems:'center',justifyContent:'center',userSelect:'none',WebkitUserSelect:'none'}}>+</button>
                </div>
              </div>
              {/* Mulligan & bonus buttons */}
              <div style={{display:'flex',gap:6,marginTop:8}}>
                {mulligansAllowed>0&&<button onClick={()=>useMulligan(p.id)} disabled={(mulligans[p.id]||0)>=mulligansAllowed} style={{background:'rgba(255,145,0,.1)',border:'1px solid rgba(255,145,0,.3)',color:'#ff9100',padding:'4px 10px',borderRadius:20,cursor:'pointer',fontSize:10,fontWeight:700,opacity:(mulligans[p.id]||0)>=mulligansAllowed?.4:1}}>🍀 MULLIGAN ({mulligansAllowed-(mulligans[p.id]||0)} left)</button>}
                {isPar3&&<button onClick={()=>updateExtras(round.id,'closestPin',{[holeIdx]:closestPin[holeIdx]===p.id?null:p.id})} style={{background:isCP?'rgba(255,215,0,.15)':'rgba(255,255,255,.04)',border:`1px solid ${isCP?'rgba(255,215,0,.4)':'rgba(255,255,255,.08)'}`,color:isCP?'#ffd700':'#555',padding:'4px 10px',borderRadius:20,cursor:'pointer',fontSize:10,fontWeight:700}}>📍 CLOSEST PIN</button>}
                {!isPar3&&<button onClick={()=>updateExtras(round.id,'longDrive',{[holeIdx]:longDrive[holeIdx]===p.id?null:p.id})} style={{background:isLD?'rgba(64,196,255,.12)':'rgba(255,255,255,.04)',border:`1px solid ${isLD?'rgba(64,196,255,.35)':'rgba(255,255,255,.08)'}`,color:isLD?'#40c4ff':'#555',padding:'4px 10px',borderRadius:20,cursor:'pointer',fontSize:10,fontWeight:700}}>💪 LONG DRIVE</button>}
              </div>
            </div>
          );
        })}
      </div>
 
      {/* Quick actions */}
      <div style={{display:'flex',gap:7}}>
        <button onClick={()=>PLAYERS.forEach(p=>{if(!((scores[p.id]||[])[holeIdx]>0))updateScore(round.id,p.id,holeIdx,hole.par);}) } style={{flex:1,background:'rgba(255,255,255,.04)',border:'1px solid rgba(255,255,255,.07)',color:'rgba(255,255,255,.4)',padding:'10px',borderRadius:11,cursor:'pointer',fontSize:11,fontWeight:700,letterSpacing:1}}>⚡ FILL PAR</button>
        <button onClick={()=>setShowSkins(!showSkins)} style={{flex:1,background:'rgba(155,89,182,.08)',border:'1px solid rgba(155,89,182,.25)',color:'#9b59b6',padding:'10px',borderRadius:11,cursor:'pointer',fontSize:11,fontWeight:700}}>💀 SKINS ({skinsList.filter(Boolean).length})</button>
        {round.bet_amount>0&&<button onClick={()=>setShowBets(!showBets)} style={{flex:1,background:'rgba(0,230,118,.06)',border:'1px solid rgba(0,230,118,.2)',color:'#00e676',padding:'10px',borderRadius:11,cursor:'pointer',fontSize:11,fontWeight:700}}>💰 BETS</button>}
      </div>
 
      {/* Skins panel */}
      {showSkins&&(
        <div style={{background:'rgba(155,89,182,.06)',border:'1px solid rgba(155,89,182,.2)',borderRadius:16,padding:'14px 16px',animation:'fadeIn .3s ease'}}>
          <div style={{fontFamily:'Bebas Neue',fontSize:18,letterSpacing:2,color:'#9b59b6',marginBottom:12}}>SKINS TRACKER · ${skinsVal}/SKIN</div>
          <div style={{display:'flex',gap:8,marginBottom:10}}>
            {PLAYERS.map(p=>{const sk=skinsCount(p.id);return(
              <div key={p.id} style={{flex:1,textAlign:'center',background:'rgba(0,0,0,.3)',borderRadius:12,padding:'10px 4px'}}>
                <div style={{fontSize:20,marginBottom:4}}>{p.avatar}</div>
                <div style={{fontFamily:'Bebas Neue',fontSize:26,color:sk>0?'#9b59b6':'#333'}}>{sk}</div>
                <div style={{fontSize:9,color:'rgba(255,255,255,.25)',letterSpacing:1,fontWeight:700}}>SKINS</div>
                <div style={{fontSize:12,color:'#00e676',fontWeight:900,marginTop:2}}>${sk*skinsVal}</div>
              </div>
            );})}
          </div>
          <div style={{fontSize:11,color:'rgba(255,255,255,.25)',textAlign:'center'}}>{skinsList.filter(Boolean).length} claimed · {holes.length-holesPlayed} holes left · Pot: ${PLAYERS.length*skinsVal*holesPlayed}</div>
        </div>
      )}
 
      {/* Bets panel */}
      {showBets&&round.bet_amount>0&&(
        <div style={{background:'rgba(0,230,118,.04)',border:'1px solid rgba(0,230,118,.12)',borderRadius:16,padding:'14px 16px',animation:'fadeIn .3s ease'}}>
          <div style={{fontFamily:'Bebas Neue',fontSize:18,letterSpacing:2,color:'#00e676',marginBottom:10}}>💰 RUNNING BETS · ${round.bet_amount}/HOLE</div>
          {getBetResults().map((p,i)=>(
            <div key={p.id} style={{display:'flex',alignItems:'center',gap:10,marginBottom:8}}>
              <div style={{width:28,height:28,borderRadius:'50%',background:p.color,display:'flex',alignItems:'center',justifyContent:'center',fontWeight:900,fontSize:12,color:'#000'}}>{p.emoji}</div>
              <div style={{fontWeight:700,flex:1,fontSize:13}}>{p.name}</div>
              <div style={{fontWeight:900,fontSize:16,color:p.net>0?'#00e676':p.net<0?'#ff5252':'#555'}}>{p.net>0?`+$${p.net}`:p.net<0?`-$${Math.abs(p.net)}`:'EVEN'}</div>
            </div>
          ))}
        </div>
      )}
 
      {/* Hole progress dots */}
      <div style={{display:'flex',gap:4,justifyContent:'center',flexWrap:'wrap',padding:'4px 0'}}>
        {holes.map((_,i)=>{const all=PLAYERS.every(p=>((scores[p.id]||[])[i]||0)>0);const skin=skinsList[i];return(
          <div key={i} onClick={()=>{setHoleIdx(i);Haptic.light();}} style={{width:15,height:15,borderRadius:'50%',background:i===holeIdx?'#ffd700':all?(skin?'#9b59b6':'#00e676'):'rgba(255,255,255,.08)',cursor:'pointer',transform:i===holeIdx?'scale(1.5)':'scale(1)',boxShadow:i===holeIdx?'0 0 8px #ffd700':skin&&all?'0 0 5px #9b59b6':'none',transition:'all .2s'}}/>
        );})}
      </div>
 
      <button onClick={()=>setShowAll(!showAll)} style={{background:'transparent',border:'1px solid rgba(255,255,255,.06)',color:'rgba(255,255,255,.25)',padding:'10px',borderRadius:11,cursor:'pointer',fontSize:11,fontWeight:700,letterSpacing:1}}>
        {showAll?'▲ HIDE SCORECARD':'▼ FULL SCORECARD'}
      </button>
      {showAll&&<FullScorecard scores={scores} holes={holes}/>}
 
      <button onClick={()=>{if(confirm('Finish and save this round?'))finishRound(round.id);}} style={{background:'linear-gradient(135deg,#7a1010,#c0392b)',color:'#fff',border:'none',borderRadius:16,padding:'18px 24px',fontSize:20,fontWeight:900,cursor:'pointer',letterSpacing:3,fontFamily:'Bebas Neue',marginTop:4}}>
        🏁 FINISH ROUND

// STATS VIEW
// ══════════════════════════════════════════════
function StatsView({rounds,scores,playerSettings}){
  const completed=rounds.filter(r=>r.completed);
  const[selectedPlayer,setSelectedPlayer]=useState('all');
 
  const getStats=pid=>{
    let birdies=0,eagles=0,pars=0,bogeys=0,doubles=0,aces=0,best=null,worst=null,rp=0,totalStrokes=0,holesPlayed=0;
    for(const r of completed){
      const s=scores[r.id]?.[pid];if(!s)continue;
      const course=COURSES[r.course_id]||COURSES.snee;
      let roundTotal=0,played=0;
      s.forEach((sc,i)=>{if(sc>0&&course.holes[i]){const d=sc-course.holes[i].par;if(sc===1)aces++;else if(d<=-2)eagles++;else if(d===-1)birdies++;else if(d===0)pars++;else if(d===1)bogeys++;else doubles++;roundTotal+=sc;played++;}});
      if(roundTotal>0){totalStrokes+=roundTotal;rp++;holesPlayed+=played;if(best===null||roundTotal<best)best=roundTotal;if(worst===null||roundTotal>worst)worst=roundTotal;}
    }
    const courseRecords={};
    completed.forEach(r=>{const s=scores[r.id]?.[pid];if(!s)return;const t=s.reduce((a,b)=>a+(b||0),0);if(t>0){if(!courseRecords[r.course_id]||t<courseRecords[r.course_id])courseRecords[r.course_id]=t;}});
    return{birdies,eagles,pars,bogeys,doubles,aces,best,worst,rp,avg:rp?Math.round(totalStrokes/rp):null,courseRecords};
  };
 
  // Head to head matrix
  const h2h=(p1,p2)=>{let w1=0,w2=0,ties=0;
    completed.forEach(r=>{const s1=scores[r.id]?.[p1];const s2=scores[r.id]?.[p2];if(!s1||!s2)return;const t1=s1.reduce((a,b)=>a+(b||0),0);const t2=s2.reduce((a,b)=>a+(b||0),0);if(!t1||!t2)return;if(t1<t2)w1++;else if(t2<t1)w2++;else ties++;});
    return{w1,w2,ties};
  };
 
  // Score trend (last 6 rounds)
  const getTrend=pid=>completed.slice(0,6).reverse().map(r=>{const s=scores[r.id]?.[pid];return s?s.reduce((a,b)=>a+(b||0),0):null;});
 
  // Most improved
  const getMostImproved=()=>{
    return PLAYERS.map(p=>{
      const rs=completed.map(r=>{const s=scores[r.id]?.[p.id];return s?s.reduce((a,b)=>a+(b||0),0):null;}).filter(Boolean);
      if(rs.length<2)return{...p,improvement:0};
      const improvement=rs[0]-rs[rs.length-1];
      return{...p,improvement};
    }).sort((a,b)=>b.improvement-a.improvement)[0];
  };
 
  const improved=getMostImproved();
 
  // Trash talk for worst round
  const getTrashTalk=()=>{
    let worst=null,worstPlayer=null;
    completed.slice(0,3).forEach(r=>{
      PLAYERS.forEach(p=>{const s=scores[r.id]?.[p.id];if(!s)return;const t=s.reduce((a,b)=>a+(b||0),0);if(t>0&&(worst===null||t>worst)){worst=t;worstPlayer={...p,score:t};}});
    });
    if(!worstPlayer)return null;
    const line=TRASH_TALK[Math.floor(Math.random()*TRASH_TALK.length)](worstPlayer.name,worstPlayer.score);
    return{player:worstPlayer,line};
  };
  const [trash]=useState(()=>getTrashTalk());
 
  if(completed.length===0)return(
    <div style={{display:'flex',flexDirection:'column',gap:16,animation:'fadeUp .4s ease'}}>
      <div style={{fontFamily:'Bebas Neue',fontSize:30,letterSpacing:3,color:'#00e676'}}>STATS & RECORDS</div>
      <div style={{textAlign:'center',color:'rgba(255,255,255,.2)',padding:60,fontSize:16}}>No completed rounds yet 🏌️<br/><span style={{fontSize:13,color:'rgba(255,255,255,.1)'}}>Finish a round to see your stats</span></div>
    </div>
  );
 
  return(
    <div style={{display:'flex',flexDirection:'column',gap:14,animation:'fadeUp .4s ease'}}>
      <div style={{fontFamily:'Bebas Neue',fontSize:30,letterSpacing:3,color:'#00e676'}}>STATS & RECORDS</div>
 
      {/* Player selector */}
      <div style={{display:'flex',gap:6,overflowX:'auto'}}>
        <button onClick={()=>setSelectedPlayer('all')} style={{background:selectedPlayer==='all'?'rgba(0,230,118,.12)':'transparent',border:`1px solid ${selectedPlayer==='all'?'rgba(0,230,118,.35)':'rgba(255,255,255,.06)'}`,color:selectedPlayer==='all'?'#00e676':'#444',padding:'7px 14px',borderRadius:20,cursor:'pointer',fontSize:11,fontWeight:700,whiteSpace:'nowrap',flexShrink:0}}>ALL PLAYERS</button>
        {PLAYERS.map(p=><button key={p.id} onClick={()=>setSelectedPlayer(p.id)} style={{background:selectedPlayer===p.id?`${p.color}20`:'transparent',border:`1px solid ${selectedPlayer===p.id?p.color+'55':'rgba(255,255,255,.06)'}`,color:selectedPlayer===p.id?p.color:'#444',padding:'7px 14px',borderRadius:20,cursor:'pointer',fontSize:11,fontWeight:700,whiteSpace:'nowrap',flexShrink:0}}>{p.name}</button>)}
      </div>
 
      {/* Player stat cards */}
      {PLAYERS.filter(p=>selectedPlayer==='all'||p.id===selectedPlayer).map(p=>{
        const st=getStats(p.id);const trend=getTrend(p.id);
        return(
          <div key={p.id} style={{background:'rgba(255,255,255,.03)',border:`1px solid ${p.color}18`,borderRadius:20,padding:'18px 16px',overflow:'hidden',position:'relative'}}>
            <div style={{position:'absolute',top:-10,right:-8,fontSize:70,opacity:.06}}>{p.avatar}</div>
            {/* Header */}
            <div style={{display:'flex',alignItems:'center',gap:12,marginBottom:16}}>
              <div style={{width:46,height:46,borderRadius:'50%',background:p.color,display:'flex',alignItems:'center',justifyContent:'center',fontWeight:900,fontSize:22,color:'#000'}}>{p.emoji}</div>
              <div style={{flex:1}}>
                <div style={{fontFamily:'Bebas Neue',fontSize:24,letterSpacing:1,color:p.color}}>{p.name}</div>
                <div style={{fontSize:11,color:'rgba(255,255,255,.25)'}}>HCP {playerSettings[p.id]??p.defaultHcp} · {st.rp} rounds</div>
              </div>
              {st.best&&<div style={{textAlign:'right'}}>
                <div style={{fontFamily:'Bebas Neue',fontSize:34,color:p.color,lineHeight:1}}>{st.best}</div>
                <div style={{fontSize:9,color:'rgba(255,255,255,.25)',letterSpacing:2}}>BEST ROUND</div>
              </div>}
            </div>
            {/* Score breakdown */}
            <div style={{display:'grid',gridTemplateColumns:'repeat(5,1fr)',gap:6,marginBottom:12}}>
              {[{n:st.aces,l:'ACE',c:'#ffd700'},{n:st.eagles,l:'EAGLE',c:'#00e676'},{n:st.birdies,l:'BIRDIE',c:'#69f0ae'},{n:st.pars,l:'PAR',c:'#555'},{n:st.bogeys,l:'BOG+',c:'#ff5252'}].map((s,i)=>(
                <div key={i} style={{background:'rgba(0,0,0,.3)',borderRadius:10,padding:'8px 4px',textAlign:'center'}}>
                  <div style={{fontFamily:'Bebas Neue',fontSize:22,color:s.n>0?s.c:'#222'}}>{s.n}</div>
                  <div style={{fontSize:8,color:'rgba(255,255,255,.25)',fontWeight:700,letterSpacing:1}}>{s.l}</div>
                </div>
              ))}
            </div>
            {/* Scoring bar */}
            {st.rp>0&&(()=>{const total=Math.max(1,st.eagles+st.birdies+st.pars+st.bogeys+st.doubles);return(
              <div style={{height:8,borderRadius:4,overflow:'hidden',display:'flex',gap:2,marginBottom:12}}>
                {[{v:st.eagles,c:'#00e676'},{v:st.birdies,c:'#69f0ae'},{v:st.pars,c:'#444'},{v:st.bogeys,c:'#ff9100'},{v:st.doubles,c:'#ff5252'}].map((b,i)=>b.v>0&&<div key={i} style={{flex:b.v/total,background:b.c,minWidth:3}}/>)}
              </div>
            );})()}
            {/* Trend sparkline */}
            {trend.filter(Boolean).length>1&&(
              <div style={{marginBottom:10}}>
                <div style={{fontSize:9,color:'rgba(255,255,255,.25)',letterSpacing:2,fontWeight:700,marginBottom:6}}>SCORE TREND (LAST {trend.filter(Boolean).length} ROUNDS)</div>
                <div style={{display:'flex',gap:4,alignItems:'flex-end',height:40}}>
                  {trend.filter(Boolean).map((t,i)=>{const min=Math.min(...trend.filter(Boolean));const max=Math.max(...trend.filter(Boolean));const h=max===min?20:Math.round(((max-t)/(max-min))*32)+8;return(
                    <div key={i} style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',gap:2}}>
                      <div style={{width:'100%',background:i===trend.filter(Boolean).length-1?p.color:'rgba(255,255,255,.15)',borderRadius:'3px 3px 0 0',height:h,minHeight:4,transition:'height .5s ease'}}/>
                      <div style={{fontSize:9,color:'rgba(255,255,255,.3)',fontWeight:700}}>{t}</div>
                    </div>
                  );})}
                </div>
              </div>
            )}
            {/* Course records */}
            {Object.keys(st.courseRecords).length>0&&(
              <div>
                <div style={{fontSize:9,color:'rgba(255,255,255,.25)',letterSpacing:2,fontWeight:700,marginBottom:6}}>COURSE RECORDS</div>
                <div style={{display:'flex',gap:6,flexWrap:'wrap'}}>
                  {Object.entries(st.courseRecords).map(([cid,score])=>(
                    <div key={cid} style={{background:'rgba(0,0,0,.3)',borderRadius:20,padding:'3px 10px',fontSize:10,fontWeight:700}}>
                      <span style={{color:'rgba(255,255,255,.4)'}}>{COURSES[cid]?.name?.split(' ')[0]}</span>
                      <span style={{color:p.color,marginLeft:4}}>{score}</span>

            )}
            {st.avg&&<div style={{marginTop:8,fontSize:11,color:'rgba(255,255,255,.25)'}}>Average: <span style={{color:p.color,fontWeight:700}}>{st.avg}</span>{st.worst&&<> · Worst: <span style={{color:'#ff5252',fontWeight:700}}>{st.worst}</span></>}</div>}
          </div>

      {/* Head to head */}

          <div style={{fontFamily:'Bebas Neue',fontSize:20,letterSpacing:2,color:'#ffd700',marginBottom:14}}>HEAD TO HEAD RECORD</div>
          {[['ben','luke'],['ben','max'],['ben','thomas'],['thomas','luke'],['thomas','max'],['max','luke']].map(([p1id,p2id])=>{

            const{w1,w2,ties}=h2h(p1id,p2id);const total=w1+w2+ties;if(total===0)return null;

                  <span style={{color:p2.color,fontWeight:800}}>({w2}) {p2.name}</span>

      {/* Most improved */}
      {improved&&improved.improvement>0&&(
        <div style={{background:'rgba(0,230,118,.04)',border:'1px solid rgba(0,230,118,.12)',borderRadius:16,padding:'14px 16px',display:'flex',gap:12,alignItems:'center'}}>

            <div style={{fontSize:16,fontWeight:900,color:'#00e676'}}>{improved.name}</div>
            <div style={{fontSize:11,color:'rgba(255,255,255,.3)'}}>Improved by {improved.improvement} strokes</div>
          </div>
        </div>
      )}
 
      {/* Trash talk */}
      {trash&&(
        <div style={{background:'rgba(255,145,0,.04)',border:'1px solid rgba(255,145,0,.15)',borderRadius:16,padding:'14px 16px'}}>
          <div style={{fontSize:10,color:'rgba(255,145,0,.5)',letterSpacing:2,fontWeight:700,marginBottom:6}}>🎤 ROAST OF THE WEEK</div>
          <div style={{fontSize:13,color:'rgba(255,255,255,.7)',lineHeight:1.6,fontStyle:'italic'}}>"{trash.line}"</div>
        </div>
      )}
    </div>
  );
}

// LEADERBOARD VIEW
// ══════════════════════════════════════════════
function LeaderboardView({round,scores,playerSettings,setView}){
  const fmt=FORMATS.find(f=>f.id===round.format);
  const course=COURSES[round.course_id]||COURSES.snee;
  const holes=course.holes;
  const[showShare,setShowShare]=useState(false);
 
  const getTotal=pid=>(scores[pid]||[]).reduce((a,b)=>a+(b||0),0);
  const getTP=pid=>{let tp=0;(scores[pid]||[]).forEach((s,i)=>{if(s>0&&holes[i])tp+=s-holes[i].par;});return tp;};
  const getSF=pid=>(scores[pid]||[]).reduce((a,s,i)=>a+(s>0&&holes[i]?sfPts(s,holes[i].par):0),0);
  const getSkins=pid=>{let sk=0;holes.forEach((_,i)=>{const all=PLAYERS.map(p=>(scores[p.id]||[])[i]).filter(x=>x>0);if(all.length===4){const min=Math.min(...all);const w=PLAYERS.filter(p=>((scores[p.id]||[])[i])===min);if(w.length===1&&w[0].id===pid)sk++;}});return sk;};
 
  const ranked=[...PLAYERS].map(p=>{
    if(round.format==='stableford')return{...p,val:getSF(p.id),disp:getSF(p.id)+' pts',higher:true};
    if(round.format==='skins')return{...p,val:getSkins(p.id),disp:getSkins(p.id)+' skins',higher:true};
    return{...p,val:getTotal(p.id),tp:getTP(p.id),disp:getTotal(p.id)+'',higher:false};
  }).sort((a,b)=>a.higher?b.val-a.val:a.val-b.val);
 
  const winner=ranked[0];
  const betAmt=round.bet_amount||0;
 
  // MVP awards
  const awards=[];
  const mostBirdies=PLAYERS.map(p=>({...p,b:(scores[p.id]||[]).reduce((a,s,i)=>a+(s>0&&holes[i]&&s-holes[i].par===-1?1:0),0)})).sort((a,b)=>b.b-a.b)[0];
  if(mostBirdies?.b>0)awards.push({icon:'🐦',label:'Most Birdies',player:mostBirdies,detail:`${mostBirdies.b} birdies`});
 
  const fewestPutts=PLAYERS.map(p=>({...p,tot:getTotal(p.id)})).filter(p=>p.tot>0).sort((a,b)=>a.tot-b.tot)[0];
  if(fewestPutts)awards.push({icon:'🎯',label:'Lowest Score',player:fewestPutts,detail:`${fewestPutts.tot} strokes`});
 
  const mostConsistent=PLAYERS.map(p=>{const s=scores[p.id]||[];const played=s.filter(x=>x>0);if(played.length<9)return{...p,std:99};const avg=played.reduce((a,b)=>a+b,0)/played.length;const std=Math.sqrt(played.reduce((a,b)=>a+(b-avg)**2,0)/played.length);return{...p,std};}).sort((a,b)=>a.std-b.std)[0];
  if(mostConsistent?.std<99)awards.push({icon:'📐',label:'Most Consistent',player:mostConsistent,detail:'Steadiest round'});
 
  // Share text
  const shareText=`⛳ Thursday Crew Golf\n${round.date} · ${course.name}\n\n${ranked.map((p,i)=>['🥇','🥈','🥉','4️⃣'][i]+' '+p.name+': '+p.disp).join('\n')}\n\nwinner: ${winner.name} 🏆`;
 
  const medals=['🥇','🥈','🥉','💀'];
 
  return(
    <div style={{display:'flex',flexDirection:'column',gap:14,animation:'fadeUp .4s ease'}}>
      {/* Trophy header */}
      <div style={{background:'linear-gradient(160deg,rgba(255,215,0,.08),rgba(255,215,0,.02))',border:'1px solid rgba(255,215,0,.2)',borderRadius:22,padding:'22px 18px',textAlign:'center',position:'relative',overflow:'hidden'}}>
        <div style={{position:'absolute',top:-20,left:-20,fontSize:120,opacity:.04}}>🏆</div>
        <div style={{position:'absolute',top:-20,right:-20,fontSize:120,opacity:.04}}>🏆</div>
        <div style={{fontSize:10,color:'rgba(255,215,0,.4)',letterSpacing:4,fontWeight:800,marginBottom:8}}>ROUND COMPLETE</div>
        <div style={{fontFamily:'Bebas Neue',fontSize:40,color:'#ffd700',lineHeight:1,marginBottom:4}}>{fmt?.icon} {fmt?.label}</div>
        <div style={{fontSize:12,color:'rgba(255,255,255,.25)'}}>{round.date} · {course.name} · {round.tees?.toUpperCase()}</div>
        <div style={{marginTop:14,display:'inline-flex',gap:8,background:'rgba(0,0,0,.4)',borderRadius:20,padding:'10px 20px',alignItems:'center'}}>
          <div style={{width:36,height:36,borderRadius:'50%',background:winner.color,display:'flex',alignItems:'center',justifyContent:'center',fontSize:18,color:'#000',fontWeight:900}}>{winner.emoji}</div>
          <div style={{textAlign:'left'}}>
            <div style={{fontFamily:'Bebas Neue',fontSize:18,color:winner.color,letterSpacing:1}}>{winner.name} WINS</div>
            <div style={{fontSize:11,color:'rgba(255,255,255,.3)'}}>{winner.disp}</div>
          </div>
        </div>
      </div>
 
      {/* Podium */}
      <div style={{display:'flex',flexDirection:'column',gap:8}}>
        {ranked.map((p,i)=>(
          <div key={p.id} style={{background:i===0?`linear-gradient(135deg,${p.color}18,${p.color}05)`:'rgba(255,255,255,.02)',border:`${i===0?2:1}px solid ${i===0?p.color+'55':'rgba(255,255,255,.05)'}`,borderRadius:18,padding:'16px 18px',display:'flex',alignItems:'center',gap:14,transform:i===0?'scale(1.02)':'scale(1)',transition:'transform .3s'}}>
            <span style={{fontSize:26,width:32,flexShrink:0}}>{medals[i]}</span>
            <div style={{width:44,height:44,borderRadius:'50%',background:p.color,display:'flex',alignItems:'center',justifyContent:'center',fontWeight:900,fontSize:20,color:'#000',flexShrink:0}}>{p.emoji}</div>
            <div style={{flex:1}}>
              <div style={{fontFamily:'Bebas Neue',fontSize:22,letterSpacing:1,color:i===0?p.color:'#fff'}}>{p.name}</div>
              {p.tp!==undefined&&<div style={{fontSize:11,color:'rgba(255,255,255,.25)'}}>{tpStr(p.tp)}</div>}
            </div>
            <div style={{fontFamily:'Bebas Neue',fontSize:34,color:i===0?p.color:'rgba(255,255,255,.5)',lineHeight:1}}>{p.disp}</div>
          </div>
        ))}
      </div>
 
      {/* Score bars */}
      <div style={{background:'rgba(255,255,255,.02)',border:'1px solid rgba(255,255,255,.05)',borderRadius:18,padding:'16px'}}>
        <div style={{fontSize:9,color:'rgba(255,255,255,.25)',letterSpacing:3,fontWeight:800,marginBottom:12}}>TOTAL STROKES</div>
        {[...PLAYERS].map(p=>{const total=getTotal(p.id);const max=Math.max(...PLAYERS.map(pp=>getTotal(pp.id)));return(
          <div key={p.id} style={{display:'flex',alignItems:'center',gap:10,marginBottom:10}}>
            <div style={{width:30,height:30,borderRadius:'50%',background:p.color,display:'flex',alignItems:'center',justifyContent:'center',fontWeight:900,fontSize:13,color:'#000',flexShrink:0}}>{p.emoji}</div>
            <span style={{color:p.color,fontWeight:800,width:52,fontSize:13}}>{p.name}</span>
            <div style={{flex:1,height:10,background:'rgba(255,255,255,.05)',borderRadius:5,overflow:'hidden'}}>
              <div style={{height:'100%',background:`linear-gradient(90deg,${p.color}88,${p.color})`,borderRadius:5,width:`${(total/max)*100}%`,transition:'width 1s ease'}}/>
            </div>
            <span style={{fontWeight:900,fontSize:17,color:p.color,minWidth:32,textAlign:'right'}}>{total||'—'}</span>
          </div>
        );})}
      </div>
 
      {/* Settle up */}
      {betAmt>0&&(
        <div style={{background:'rgba(0,230,118,.04)',border:'1px solid rgba(0,230,118,.12)',borderRadius:18,padding:'16px'}}>
          <div style={{fontFamily:'Bebas Neue',fontSize:20,letterSpacing:2,color:'#00e676',marginBottom:12}}>💰 SETTLE UP · ${betAmt}/HOLE</div>
          {ranked.slice(1).map(p=>(
            <div key={p.id} style={{display:'flex',alignItems:'center',gap:10,marginBottom:10,background:'rgba(0,0,0,.3)',borderRadius:12,padding:'12px 14px'}}>
              <div style={{width:30,height:30,borderRadius:'50%',background:p.color,display:'flex',alignItems:'center',justifyContent:'center',fontSize:15,color:'#000',fontWeight:900}}>{p.emoji}</div>
              <div style={{flex:1,fontSize:13}}>
                <span style={{color:p.color,fontWeight:800}}>{p.name}</span>
                <span style={{color:'rgba(255,255,255,.3)'}}> pays </span>
                <span style={{color:winner.color,fontWeight:800}}>{winner.name}</span>
              </div>
              <div style={{fontFamily:'Bebas Neue',fontSize:24,color:'#00e676'}}>${betAmt}</div>
            </div>
          ))}
        </div>
      )}
 
      {/* MVP Awards */}
      {awards.length>0&&(
        <div style={{background:'rgba(255,215,0,.03)',border:'1px solid rgba(255,215,0,.1)',borderRadius:18,padding:'16px'}}>
          <div style={{fontFamily:'Bebas Neue',fontSize:20,letterSpacing:2,color:'#ffd700',marginBottom:12}}>🏅 ROUND AWARDS</div>
          {awards.map((a,i)=>(
            <div key={i} style={{display:'flex',alignItems:'center',gap:12,marginBottom:10,background:'rgba(0,0,0,.3)',borderRadius:12,padding:'10px 14px'}}>
              <span style={{fontSize:26}}>{a.icon}</span>
              <div style={{flex:1}}>
                <div style={{fontSize:10,color:'rgba(255,215,0,.5)',letterSpacing:2,fontWeight:700}}>{a.label.toUpperCase()}</div>
                <div style={{fontSize:15,fontWeight:800,color:a.player.color}}>{a.player.name}</div>
              </div>
              <div style={{fontSize:11,color:'rgba(255,255,255,.3)',fontWeight:700}}>{a.detail}</div>
            </div>
          ))}
        </div>
      )}
 
      {/* Share card */}
      <button onClick={()=>{navigator.share?navigator.share({title:'Thursday Crew Golf',text:shareText}):setShowShare(true);}} style={{background:'rgba(64,196,255,.08)',border:'1px solid rgba(64,196,255,.2)',color:'#40c4ff',borderRadius:14,padding:'14px',fontSize:14,fontWeight:800,cursor:'pointer',letterSpacing:1}}>
        📤 SHARE RESULTS
      </button>
      {showShare&&(
        <div style={{background:'rgba(0,0,0,.8)',border:'1px solid rgba(64,196,255,.3)',borderRadius:14,padding:16}}>
          <div style={{fontSize:10,color:'rgba(64,196,255,.5)',letterSpacing:2,marginBottom:8,fontWeight:700}}>COPY & SHARE</div>
          <textarea readOnly value={shareText} style={{width:'100%',background:'transparent',border:'none',color:'#f0f0f0',fontSize:13,lineHeight:1.8,resize:'none',outline:'none',fontFamily:'monospace'}} rows={8}/>
          <button onClick={()=>{navigator.clipboard.writeText(shareText);setShowShare(false);}} style={{background:'#40c4ff',color:'#000',border:'none',borderRadius:10,padding:'10px 20px',fontSize:13,fontWeight:800,cursor:'pointer',marginTop:8,width:'100%'}}>📋 COPY TO CLIPBOARD</button>
        </div>
      )}
 
      {/* Full scorecard */}
      <div style={{fontFamily:'Bebas Neue',fontSize:18,letterSpacing:2,color:'#00e676'}}>FULL SCORECARD</div>
      <FullScorecard scores={scores} holes={holes}/>
 
      <button onClick={()=>setView('setup')} style={{background:'linear-gradient(135deg,#00c853,#00e676)',color:'#000',border:'none',borderRadius:16,padding:'18px 24px',fontSize:22,fontWeight:900,cursor:'pointer',letterSpacing:3,fontFamily:'Bebas Neue',boxShadow:'0 8px 40px rgba(0,230,118,.25)'}}>
        ⛳ PLAY AGAIN
      </button>
    </div>
  );
}
 
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
