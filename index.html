// HELPERS

function scoreName(s,p){
  if(!s||s<=0)return null;const d=s-p;
  if(s===1)return{l:'ACE! 🎉',c:'#ffd700'};
  if(d<=-3)return{l:'ALBATROSS 🦅🦅🦅',c:'#00e676'};
  if(d===-2)return{l:'EAGLE 🦅🦅',c:'#00e676'};
  if(d===-1)return{l:'BIRDIE 🐦',c:'#69f0ae'};
  if(d===0)return{l:'PAR',c:'#888'};
  if(d===1)return{l:'BOGEY',c:'#ff9100'};
  if(d===2)return{l:'DOUBLE 😬',c:'#ff5252'};
  if(d===3)return{l:'TRIPLE 😱',c:'#d32f2f'};
  return{l:`+${d} 💀`,c:'#b71c1c'};
}
function sfPts(s,p){if(!s||s<=0)return 0;const d=s-p;if(d>=2)return 0;if(d===1)return 1;if(d===0)return 2;if(d===-1)return 3;if(d===-2)return 4;return 5;}
function tpStr(tp){return tp===0?'E':tp>0?`+${tp}`:`${tp}`;}
function scColor(d){
  if(d<=-2)return{bg:'rgba(0,230,118,.15)',c:'#00e676',border:'rgba(0,230,118,.4)'};
  if(d===-1)return{bg:'rgba(105,240,174,.1)',c:'#69f0ae',border:'rgba(105,240,174,.3)'};
  if(d===0)return{bg:'transparent',c:'#555',border:'transparent'};
  if(d===1)return{bg:'rgba(255,145,0,.1)',c:'#ff9100',border:'rgba(255,145,0,.3)'};
  if(d===2)return{bg:'rgba(255,82,82,.1)',c:'#ff5252',border:'rgba(255,82,82,.3)'};
  return{bg:'rgba(183,28,28,.15)',c:'#ef5350',border:'rgba(183,28,28,.4)'};
}

// MAIN APP
// ═══════════════════════════════════════════════════════
function App(){
  const[view,setView]=useState('home');
  const[activeRoundId,setActiveRoundId]=useState(null);
  const[rounds,setRounds]=useState([]);
  const[scores,setScores]=useState({});
  const[playerSettings,setPlayerSettings]=useState({});
  const[loading,setLoading]=useState(true);
  const[toast,setToast]=useState(null);
 
  const showToast=(msg,type='success')=>{setToast({msg,type});setTimeout(()=>setToast(null),3000);};
 
  useEffect(()=>{loadAll();},[]);
 
  useEffect(()=>{
    const s1=sb.channel('sc').on('postgres_changes',{event:'*',schema:'public',table:'scores'},p=>{
      if(p.eventType==='INSERT'||p.eventType==='UPDATE'){const s=p.new;setScores(prev=>({...prev,[s.round_id]:{...(prev[s.round_id]||{}),[s.player_id]:s.holes}}));}
    }).subscribe();
    const s2=sb.channel('rc').on('postgres_changes',{event:'*',schema:'public',table:'rounds'},p=>{
      if(p.eventType==='INSERT')setRounds(prev=>[p.new,...prev]);
      else if(p.eventType==='UPDATE')setRounds(prev=>prev.map(r=>r.id===p.new.id?p.new:r));
      else if(p.eventType==='DELETE')setRounds(prev=>prev.filter(r=>r.id!==p.old.id));
    }).subscribe();
    return()=>{sb.removeChannel(s1);sb.removeChannel(s2);};
  },[]);
 
  const loadAll=async()=>{
    setLoading(true);
    try{
      const[{data:rd},{data:sd},{data:ps}]=await Promise.all([
        sb.from('rounds').select('*').order('created_at',{ascending:false}),
        sb.from('scores').select('*'),
        sb.from('player_settings').select('*'),
      ]);
      setRounds(rd||[]);
      const m={};for(const s of(sd||[])){if(!m[s.round_id])m[s.round_id]={};m[s.round_id][s.player_id]=s.holes;}
      setScores(m);
      const p={};for(const s of(ps||[]))p[s.player_id]=s.handicap;setPlayerSettings(p);
      const live=(rd||[]).find(r=>!r.completed);if(live)setActiveRoundId(live.id);
    }catch(e){console.error(e);}
    setLoading(false);
  };
 
  const startRound=async(setup)=>{
    try{
      const hdcp={};PLAYERS.forEach(p=>{hdcp[p.id]=playerSettings[p.id]??p.defaultHcp;});
      const{data:round,error}=await sb.from('rounds').insert({
        date:setup.date,format:setup.format,team_config:setup.teamConfig,
        tees:setup.tees,bet_amount:setup.betAmount,handicaps:hdcp,
        completed:false,course_id:setup.courseId,
        team_names:setup.teamNames||null,
      }).select().single();
      if(error)throw error;
      await sb.from('scores').insert(PLAYERS.map(p=>({round_id:round.id,player_id:p.id,holes:Array(18).fill(0)})));
      setActiveRoundId(round.id);setView('scorecard');
      showToast('Round started! Good luck 🏌️');
    }catch(e){showToast('Error starting round','error');console.error(e);}
  };
 
  const updateScore=async(roundId,playerId,holeIdx,value)=>{
    const cur=scores[roundId]?.[playerId]||Array(18).fill(0);
    const upd=[...cur];upd[holeIdx]=value===null?0:Math.max(1,parseInt(value)||0);
    setScores(prev=>({...prev,[roundId]:{...(prev[roundId]||{}),[playerId]:upd}}));
    await sb.from('scores').update({holes:upd,updated_at:new Date().toISOString()}).eq('round_id',roundId).eq('player_id',playerId);
  };
 
  const finishRound=async(roundId)=>{
    await sb.from('rounds').update({completed:true}).eq('id',roundId);
    setActiveRoundId(null);setView('leaderboard');showToast('Round complete! 🏆');
  };
 
  const deleteRound=async(roundId)=>{
    await sb.from('rounds').delete().eq('id',roundId);
    if(activeRoundId===roundId)setActiveRoundId(null);
    showToast('Round deleted');
  };
 
  const updateHandicap=async(pid,val)=>{
    const hcp=parseInt(val)||0;
    setPlayerSettings(prev=>({...prev,[pid]:hcp}));
    await sb.from('player_settings').upsert({player_id:pid,handicap:hcp,updated_at:new Date().toISOString()});
  };
 
  const activeRound=rounds.find(r=>r.id===activeRoundId);
  const activeScores=activeRoundId?(scores[activeRoundId]||{}):{};
  const latestCompleted=rounds.find(r=>r.completed);
 
  if(loading)return(
    <div style={{minHeight:'100vh',background:'#050a05',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',gap:16}}>
      <div style={{fontSize:48,animation:'bounce 1s infinite'}}>⛳</div>
      <div style={{color:'#00e676',fontSize:13,letterSpacing:3,fontWeight:600}}>LOADING...</div>
    </div>
  );
 
  return(
    <div style={{minHeight:'100vh',background:'#050a05',paddingBottom:80}}>
      {/* Toast */}
      {toast&&<div style={{position:'fixed',top:20,left:'50%',transform:'translateX(-50%)',zIndex:999,background:toast.type==='error'?'#b71c1c':'#00e676',color:toast.type==='error'?'#fff':'#000',padding:'10px 20px',borderRadius:30,fontSize:13,fontWeight:700,boxShadow:'0 4px 20px rgba(0,0,0,.5)',whiteSpace:'nowrap',animation:'fadeUp .3s ease'}}>{toast.msg}</div>}
 
      {/* Header */}
      <header style={{position:'sticky',top:0,zIndex:100,background:'rgba(5,10,5,.95)',backdropFilter:'blur(20px)',borderBottom:'1px solid rgba(0,230,118,.1)',padding:'12px 16px',display:'flex',alignItems:'center',justifyContent:'space-between'}}>
        <div style={{display:'flex',alignItems:'center',gap:10,cursor:'pointer'}} onClick={()=>setView('home')}>
          <span style={{fontSize:24}}>⛳</span>
          <div>
            <div style={{fontFamily:'Bebas Neue',fontSize:20,letterSpacing:3,color:'#00e676',lineHeight:1}}>THURSDAY CREW</div>
            <div style={{fontSize:9,color:'#2a5a2a',letterSpacing:2,fontWeight:600}}>SOUTH CAROLINA GOLF</div>
          </div>
        </div>
        <div style={{display:'flex',gap:4}}>
          {[{id:'home',icon:'🏠'},{id:'setup',icon:'🎯'},{id:'stats',icon:'📊'},{id:'history',icon:'📋'}].map(n=>(
            <button key={n.id} onClick={()=>setView(n.id)} style={{background:view===n.id?'rgba(0,230,118,.15)':'transparent',border:`1px solid ${view===n.id?'rgba(0,230,118,.5)':'rgba(255,255,255,.05)'}`,color:view===n.id?'#00e676':'#555',padding:'7px 10px',borderRadius:8,cursor:'pointer',fontSize:14,transition:'all .2s'}}>{n.icon}</button>
          ))}

// SCORECARD
// ═══════════════════════════════════════════════════════
function ScorecardView({round,scores,updateScore,finishRound}){
  const[holeIdx,setHoleIdx]=useState(0);
  const[showAll,setShowAll]=useState(false);
  const[showSkins,setShowSkins]=useState(false);
 
  const course=COURSES[round.course_id]||COURSES.snee;
  const holes=course.holes;
  const fmt=FORMATS.find(f=>f.id===round.format);
  const hole=holes[holeIdx];
  const isTeam=round.teamConfig!=='solo'&&round.team_config!=='solo';
  const teamCfg=TEAM_CONFIGS.find(t=>t.id===round.team_config);
  const teamNames=round.team_names||['Team 1','Team 2'];
 
  const holesPlayed=PLAYERS.reduce((max,p)=>{const pl=(scores[p.id]||[]).filter(s=>s>0).length;return Math.max(max,pl);},0);
 
  const getTP=pid=>{let tp=0;(scores[pid]||[]).forEach((s,i)=>{if(s>0&&holes[i])tp+=s-holes[i].par;});return tp;};
  const getSF=pid=>(scores[pid]||[]).reduce((a,s,i)=>a+(s>0&&holes[i]?sfPts(s,holes[i].par):0),0);
  const getSkins=()=>{
    const sk=Array(18).fill(null);
    holes.forEach((h,i)=>{const all=PLAYERS.map(p=>(scores[p.id]||[])[i]).filter(x=>x>0);if(all.length===4){const min=Math.min(...all);const w=PLAYERS.filter(p=>((scores[p.id]||[])[i])===min);if(w.length===1)sk[i]=w[0].id;}});
    return sk;
  };
  const skinsList=getSkins();
  const skinsCount=pid=>skinsList.filter(s=>s===pid).length;
  const skinsValue=round.bet_amount||5;
  const totalSkinsPot=PLAYERS.length*skinsValue*18;
 
  const getDS=pid=>{
    if(round.format==='stableford')return{d:getSF(pid)+'pts',c:'#ffd700'};
    if(round.format==='skins')return{d:skinsCount(pid)+'🩳',c:'#9b59b6'};
    const tp=getTP(pid);return{d:tpStr(tp),c:tp<0?'#00e676':tp>0?'#ff5252':'#555'};
  };
 
  // Bet calculator
  const getBetResults=()=>{
    if(round.format==='skins'){
      const earned={};PLAYERS.forEach(p=>{earned[p.id]=skinsCount(p.id)*skinsValue;});
      const avg=(PLAYERS.length*skinsValue*holesPlayed)/PLAYERS.length;
      return PLAYERS.map(p=>({...p,net:earned[p.id]-avg}));
    }
    const totals=PLAYERS.map(p=>({...p,tp:getTP(p.id)})).sort((a,b)=>a.tp-b.tp);
    return totals.map((p,i)=>({...p,net:i===0?(PLAYERS.length-1)*round.bet_amount:-round.bet_amount}));
  };
 
  return(
    <div style={{display:'flex',flexDirection:'column',gap:12,animation:'fadeUp .3s ease'}}>
      {/* Header */}
      <div style={{background:'linear-gradient(135deg,rgba(0,230,118,.1),rgba(0,200,83,.05))',border:'1px solid rgba(0,230,118,.2)',borderRadius:16,padding:'14px 16px',display:'flex',alignItems:'center',gap:12}}>
        <span style={{fontSize:28}}>{fmt?.icon}</span>
        <div style={{flex:1}}>
          <div style={{fontFamily:'Bebas Neue',fontSize:20,letterSpacing:2}}>{fmt?.label}</div>
          <div style={{fontSize:11,color:'rgba(255,255,255,.3)',marginTop:1}}>{round.date} · {course.name} · {round.tees?.toUpperCase()} TEES</div>
        </div>

                <button onPointerDown={()=>updateScore(round.id,p.id,holeIdx,(sc||hole.par)+1)} style={{background:'rgba(255,255,255,.07)',border:'none',color:'#fff',width:36,height:42,borderRadius:10,cursor:'pointer',fontSize:24,display:'flex',alignItems:'center',justifyContent:'center',userSelect:'none'}}>+</button>

      {/* Quick actions */}
      <div style={{display:'flex',gap:8}}>
        <button onClick={()=>PLAYERS.forEach(p=>{if(!((scores[p.id]||[])[holeIdx]>0))updateScore(round.id,p.id,holeIdx,hole.par);})} style={{flex:1,background:'rgba(255,255,255,.05)',border:'1px solid rgba(255,255,255,.08)',color:'rgba(255,255,255,.5)',padding:'10px',borderRadius:10,cursor:'pointer',fontSize:12,fontWeight:700}}>⚡ FILL PAR</button>
        <button onClick={()=>setShowSkins(!showSkins)} style={{flex:1,background:'rgba(155,89,182,.1)',border:'1px solid rgba(155,89,182,.3)',color:'#9b59b6',padding:'10px',borderRadius:10,cursor:'pointer',fontSize:12,fontWeight:700}}>💀 SKINS ({skinsList.filter(Boolean).length})</button>
      </div>
 
      {/* Skins tracker */}
      {showSkins&&(
        <div style={{background:'rgba(155,89,182,.08)',border:'1px solid rgba(155,89,182,.2)',borderRadius:14,padding:'14px 16px'}}>
          <div style={{fontFamily:'Bebas Neue',fontSize:18,letterSpacing:2,color:'#9b59b6',marginBottom:12}}>SKINS TRACKER · ${skinsValue}/SKIN</div>
          <div style={{display:'flex',gap:10,marginBottom:12}}>
            {PLAYERS.map(p=>{const sk=skinsCount(p.id);return(

            );})}
          </div>
          <div style={{fontSize:11,color:'rgba(255,255,255,.3)',textAlign:'center'}}>{skinsList.filter(Boolean).length} skins claimed · {18-holesPlayed} holes remaining</div>

      {/* Bet calculator */}
      {round.bet_amount>0&&holesPlayed>0&&(
        <div style={{background:'rgba(0,230,118,.05)',border:'1px solid rgba(0,230,118,.1)',borderRadius:14,padding:'14px 16px'}}>
          <div style={{fontFamily:'Bebas Neue',fontSize:18,letterSpacing:2,color:'#00e676',marginBottom:10}}>💰 RUNNING BETS · ${round.bet_amount}/HOLE</div>

            <div key={p.id} style={{display:'flex',alignItems:'center',gap:10,marginBottom:8}}>

              <div style={{fontWeight:700,flex:1}}>{p.name}</div>
              <div style={{fontWeight:900,fontSize:15,color:p.net>0?'#00e676':p.net<0?'#ff5252':'#555'}}>{p.net>0?`+$${p.net.toFixed(0)}`:`-$${Math.abs(p.net).toFixed(0)}`}</div>
            </div>
          ))}
        </div>
      )}
 
      {/* Hole dots */}
      <div style={{display:'flex',gap:4,justifyContent:'center',flexWrap:'wrap',padding:'4px 0'}}>
        {holes.map((_,i)=>{const all=PLAYERS.every(p=>((scores[p.id]||[])[i]||0)>0);return(
          <div key={i} onClick={()=>setHoleIdx(i)} style={{width:14,height:14,borderRadius:'50%',background:i===holeIdx?'#ffd700':all?'#00e676':'rgba(255,255,255,.1)',cursor:'pointer',transform:i===holeIdx?'scale(1.5)':'scale(1)',boxShadow:i===holeIdx?'0 0 8px #ffd700':'none',transition:'all .2s'}}/>
        );})}
      </div>
 
      {/* Full scorecard toggle */}
      <button onClick={()=>setShowAll(!showAll)} style={{background:'transparent',border:'1px solid rgba(255,255,255,.07)',color:'rgba(255,255,255,.3)',padding:'10px',borderRadius:10,cursor:'pointer',fontSize:12,fontWeight:700,letterSpacing:1}}>
        {showAll?'▲ HIDE SCORECARD':'▼ FULL SCORECARD'}
      </button>
      {showAll&&<FullScorecard scores={scores} holes={holes}/>}
 
      <button onClick={()=>{if(confirm('Finish and save this round?'))finishRound(round.id);}} style={{background:'linear-gradient(135deg,#7a1010,#c0392b)',color:'#fff',border:'none',borderRadius:14,padding:'16px 24px',fontSize:18,fontWeight:900,cursor:'pointer',letterSpacing:2,fontFamily:'Bebas Neue',marginTop:4}}>
        🏁 FINISH ROUND
      </button>
    </div>
  );
}

// FULL SCORECARD TABLE
// ═══════════════════════════════════════════════════════
function FullScorecard({scores,holes}){
  return(
    <div style={{background:'rgba(0,0,0,.4)',border:'1px solid rgba(255,255,255,.06)',borderRadius:14,padding:12,overflowX:'auto'}}>
      {[0,1].map(half=>{
        const hs=holes.slice(half*9,half*9+9);const pt=hs.reduce((a,h)=>a+h.par,0);
        return(
          <div key={half} style={{marginBottom:half===0?14:0}}>
            <div style={{fontSize:10,fontWeight:700,letterSpacing:3,color:'#00e676',marginBottom:8}}>{half===0?'FRONT 9':'BACK 9'}</div>
            <table style={{width:'100%',borderCollapse:'collapse',fontSize:11}}>
              <thead>
                <tr><th style={{padding:'4px 5px',textAlign:'left',color:'rgba(255,255,255,.3)',fontWeight:600,borderBottom:'1px solid rgba(255,255,255,.06)'}}>PLAYER</th>
                  {hs.map(h=><th key={h.hole} style={{padding:'4px 5px',textAlign:'center',color:'rgba(255,255,255,.3)',borderBottom:'1px solid rgba(255,255,255,.06)'}}>{h.hole}</th>)}
                  <th style={{padding:'4px 5px',textAlign:'center',color:'rgba(255,255,255,.3)',borderBottom:'1px solid rgba(255,255,255,.06)'}}>TOT</th>
                </tr>
                <tr><th style={{padding:'3px 5px',textAlign:'left',color:'#00e67666',fontWeight:600}}>PAR</th>
                  {hs.map(h=><th key={h.hole} style={{padding:'3px 5px',textAlign:'center',color:'#00e67666'}}>{h.par}</th>)}
                  <th style={{padding:'3px 5px',textAlign:'center',color:'#00e67666'}}>{pt}</th>
                </tr>
              </thead>
              <tbody>{PLAYERS.map(p=>{
                const ps=(scores[p.id]||[]).slice(half*9,half*9+9);const tot=ps.reduce((a,b)=>a+(b||0),0);
                return(<tr key={p.id}>
                  <td style={{padding:'4px 5px',color:p.color,fontWeight:700}}>{p.name}</td>
                  {hs.map((h,i)=>{const sc=ps[i];const d=sc>0?sc-h.par:null;const col=d!==null?scColor(d):{bg:'transparent',c:'rgba(255,255,255,.2)',border:'transparent'};
                    return<td key={h.hole} style={{padding:'4px 5px',textAlign:'center',background:col.bg,color:col.c,fontWeight:d!==null?700:400,borderRadius:4}}>{sc||'—'}</td>;})}
                  <td style={{padding:'4px 5px',textAlign:'center',fontWeight:900,color:'#fff'}}>{tot||'—'}</td>
                </tr>);
              })}</tbody>
            </table>
          </div>
        );
      })}
    </div>
  );
}

// STATS
// ═══════════════════════════════════════════════════════
function StatsView({rounds,scores,playerSettings}){
  const completed=rounds.filter(r=>r.completed);
 
  const getStats=pid=>{
    let birdies=0,pars=0,bogeys=0,doubles=0,best=null,worst=null,rounds_played=0,totalStrokes=0;
    for(const r of completed){
      const s=scores[r.id]?.[pid];if(!s)continue;
      const course=COURSES[r.course_id]||COURSES.snee;
      s.forEach((sc,i)=>{if(sc>0&&course.holes[i]){const d=sc-course.holes[i].par;if(d<=-1)birdies++;else if(d===0)pars++;else if(d===1)bogeys++;else doubles++;}});
      const tot=s.reduce((a,b)=>a+(b||0),0);if(tot>0){totalStrokes+=tot;rounds_played++;if(best===null||tot<best)best=tot;if(worst===null||tot>worst)worst=tot;}
    }
    return{birdies,pars,bogeys,doubles,best,worst,rounds_played,avg:rounds_played?Math.round(totalStrokes/rounds_played):null};
  };
 
  // Head to head
  const h2h=(p1,p2)=>{let w1=0,w2=0,ties=0;
    for(const r of completed){
      const s1=scores[r.id]?.[p1];const s2=scores[r.id]?.[p2];if(!s1||!s2)continue;
      const t1=s1.reduce((a,b)=>a+(b||0),0);const t2=s2.reduce((a,b)=>a+(b||0),0);
      if(t1<t2)w1++;else if(t2<t1)w2++;else ties++;
    }return{w1,w2,ties};
  };
 
  const mostCommonFmt=()=>{const c={};completed.forEach(r=>{c[r.format]=(c[r.format]||0)+1;});return Object.entries(c).sort((a,b)=>b[1]-a[1])[0];};
  const mcf=mostCommonFmt();
 
  return(
    <div style={{display:'flex',flexDirection:'column',gap:16,animation:'fadeUp .4s ease'}}>
      <div style={{fontFamily:'Bebas Neue',fontSize:28,letterSpacing:3,color:'#00e676'}}>STATS & RECORDS</div>
 
      {completed.length===0&&<div style={{textAlign:'center',color:'rgba(255,255,255,.2)',padding:40,fontSize:15}}>No completed rounds yet 🏌️</div>}
 
      {/* Player cards */}
      {PLAYERS.map(p=>{
        const st=getStats(p.id);
        return(
          <div key={p.id} style={{background:'rgba(255,255,255,.03)',border:`1px solid ${p.color}22`,borderRadius:18,padding:'18px 16px',overflow:'hidden',position:'relative'}}>
            <div style={{position:'absolute',top:-15,right:-10,fontFamily:'Bebas Neue',fontSize:80,color:p.color,opacity:.06}}>{p.avatar}</div>
            <div style={{display:'flex',alignItems:'center',gap:12,marginBottom:16}}>
              <div style={{width:44,height:44,borderRadius:'50%',background:p.color,display:'flex',alignItems:'center',justifyContent:'center',fontWeight:900,fontSize:20,color:'#000'}}>{p.avatar}</div>
              <div>
                <div style={{fontFamily:'Bebas Neue',fontSize:22,letterSpacing:1}}>{p.name}</div>
                <div style={{fontSize:11,color:'rgba(255,255,255,.3)'}}>HCP {playerSettings[p.id]??p.defaultHcp} · {st.rounds_played} rounds</div>
              </div>
              {st.best&&<div style={{marginLeft:'auto',textAlign:'right'}}>
                <div style={{fontFamily:'Bebas Neue',fontSize:32,color:p.color}}>{st.best}</div>
                <div style={{fontSize:9,color:'rgba(255,255,255,.3)',letterSpacing:2}}>BEST ROUND</div>
              </div>}
            </div>
            {/* Stats grid */}
            <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:8,marginBottom:12}}>
              {[{n:st.birdies,l:'BIRDIES',c:'#00e676'},{n:st.pars,l:'PARS',c:'#555'},{n:st.bogeys,l:'BOGEYS',c:'#ff9100'},{n:st.doubles,l:'DOUBLES+',c:'#ff5252'}].map((s,i)=>(
                <div key={i} style={{background:'rgba(0,0,0,.3)',borderRadius:10,padding:'10px 6px',textAlign:'center'}}>
                  <div style={{fontFamily:'Bebas Neue',fontSize:24,color:s.c}}>{s.n}</div>
                  <div style={{fontSize:8,color:'rgba(255,255,255,.3)',fontWeight:700,letterSpacing:1}}>{s.l}</div>
                </div>
              ))}
            </div>
            {/* Scoring bars */}
            {st.rounds_played>0&&(()=>{const total=st.birdies+st.pars+st.bogeys+st.doubles;return(
              <div>
                <div style={{display:'flex',height:6,borderRadius:3,overflow:'hidden',gap:2}}>
                  {[{v:st.birdies,c:'#00e676'},{v:st.pars,c:'#444'},{v:st.bogeys,c:'#ff9100'},{v:st.doubles,c:'#ff5252'}].map((b,i)=>(
                    <div key={i} style={{flex:b.v/total,background:b.c,minWidth:b.v>0?2:0}}/>
                  ))}
                </div>
              </div>
            );})()}
            {st.avg&&<div style={{marginTop:10,fontSize:11,color:'rgba(255,255,255,.3)'}}>Average: <span style={{color:p.color,fontWeight:700}}>{st.avg}</span> · Best: <span style={{color:'#00e676',fontWeight:700}}>{st.best}</span> · Worst: <span style={{color:'#ff5252',fontWeight:700}}>{st.worst}</span></div>}
          </div>
        );
      })}
 
      {/* Head to head */}
      {completed.length>0&&(
        <div style={{background:'rgba(255,255,255,.03)',border:'1px solid rgba(255,255,255,.06)',borderRadius:18,padding:'18px 16px'}}>
          <div style={{fontFamily:'Bebas Neue',fontSize:20,letterSpacing:2,color:'#ffd700',marginBottom:14}}>HEAD TO HEAD</div>
          {[['ben','luke'],['ben','max'],['ben','thomas'],['thomas','luke'],['thomas','max'],['max','luke']].map(([p1id,p2id])=>{
            const p1=PLAYERS.find(p=>p.id===p1id);const p2=PLAYERS.find(p=>p.id===p2id);
            const{w1,w2,ties}=h2h(p1id,p2id);const total=w1+w2+ties;if(total===0)return null;
            return(
              <div key={p1id+p2id} style={{marginBottom:12}}>
                <div style={{display:'flex',justifyContent:'space-between',marginBottom:4}}>
                  <span style={{color:p1.color,fontWeight:700,fontSize:13}}>{p1.name} ({w1})</span>
                  {ties>0&&<span style={{color:'#555',fontSize:11}}>{ties} ties</span>}
                  <span style={{color:p2.color,fontWeight:700,fontSize:13}}>({w2}) {p2.name}</span>
                </div>
                <div style={{display:'flex',height:8,borderRadius:4,overflow:'hidden',background:'rgba(255,255,255,.05)'}}>
                  <div style={{flex:w1,background:p1.color,minWidth:w1>0?4:0}}/>
                  <div style={{flex:ties,background:'rgba(255,255,255,.1)'}}/>
                  <div style={{flex:w2,background:p2.color,minWidth:w2>0?4:0}}/>
                </div>
              </div>
            );
          })}
        </div>
      )}
 
      {/* Favorite format */}
      {mcf&&(
        <div style={{background:'rgba(255,215,0,.05)',border:'1px solid rgba(255,215,0,.15)',borderRadius:14,padding:'14px 16px',display:'flex',gap:12,alignItems:'center'}}>
          <span style={{fontSize:32}}>{FORMATS.find(f=>f.id===mcf[0])?.icon}</span>
          <div>
            <div style={{fontSize:11,color:'rgba(255,215,0,.5)',letterSpacing:2,fontWeight:700}}>FAVORITE FORMAT</div>
            <div style={{fontSize:16,fontWeight:800,color:'#ffd700'}}>{FORMATS.find(f=>f.id===mcf[0])?.label}</div>
            <div style={{fontSize:11,color:'rgba(255,255,255,.3)'}}>Played {mcf[1]} times</div>
          </div>
        </div>
      )}
    </div>
  );
}

// HISTORY

function HistoryView({rounds,scores,deleteRound,setActiveRoundId,setView}){

  const unique=[...new Set(rounds.map(r=>r.format))];
  const filtered=rounds.filter(r=>filter==='all'||r.format===filter);
  return(
    <div style={{display:'flex',flexDirection:'column',gap:14,animation:'fadeUp .4s ease'}}>
      <div style={{fontFamily:'Bebas Neue',fontSize:28,letterSpacing:3,color:'#00e676'}}>ROUND HISTORY</div>
      <div style={{display:'flex',gap:6,overflowX:'auto',paddingBottom:4}}>
        <button onClick={()=>setFilter('all')} style={{background:filter==='all'?'rgba(0,230,118,.15)':'transparent',border:`1px solid ${filter==='all'?'rgba(0,230,118,.4)':'rgba(255,255,255,.07)'}`,color:filter==='all'?'#00e676':'#444',padding:'6px 14px',borderRadius:20,cursor:'pointer',fontSize:11,fontWeight:700,letterSpacing:1,whiteSpace:'nowrap',flexShrink:0}}>ALL</button>
        {unique.map(f=>{const fmt=FORMATS.find(x=>x.id===f);return(
          <button key={f} onClick={()=>setFilter(f)} style={{background:filter===f?'rgba(0,230,118,.15)':'transparent',border:`1px solid ${filter===f?'rgba(0,230,118,.4)':'rgba(255,255,255,.07)'}`,color:filter===f?'#00e676':'#444',padding:'6px 14px',borderRadius:20,cursor:'pointer',fontSize:11,fontWeight:700,whiteSpace:'nowrap',flexShrink:0}}>{fmt?.icon} {fmt?.label}</button>
        );})}
      </div>
      {filtered.length===0&&<div style={{textAlign:'center',color:'rgba(255,255,255,.2)',padding:40,fontSize:15}}>No rounds yet ⛳</div>}
      {filtered.map(r=>{
        const fmt=FORMATS.find(f=>f.id===r.format);const course=COURSES[r.course_id]||COURSES.snee;
        const rsc=scores[r.id]||{};
        const ranked=[...PLAYERS].map(p=>({...p,total:(rsc[p.id]||[]).reduce((a,b)=>a+(b||0),0)})).sort((a,b)=>a.total-b.total);
        return(
          <div key={r.id} style={{background:'rgba(255,255,255,.03)',border:'1px solid rgba(255,255,255,.06)',borderRadius:16,padding:'16px'}}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:10}}>
              <div style={{display:'flex',gap:10,alignItems:'center'}}>
                <span style={{fontSize:24}}>{fmt?.icon}</span>
                <div>
                  <div style={{fontWeight:800,fontSize:15}}>{fmt?.label}</div>
                  <div style={{fontSize:11,color:'rgba(255,255,255,.3)',marginTop:1}}>{r.date} · {course.name}</div>
                </div>
              </div>
              <div style={{color:r.completed?'#00e676':'#ff4444',fontSize:11,fontWeight:700}}>{r.completed?'✓ COMPLETE':'● LIVE'}</div>
            </div>
            <div style={{display:'flex',flexDirection:'column',gap:6,marginBottom:12}}>
              {ranked.map((p,i)=>(
                <div key={p.id} style={{display:'flex',alignItems:'center',gap:8,fontSize:13}}>
                  <span style={{color:'rgba(255,255,255,.2)',fontSize:11,width:16}}>#{i+1}</span>
                  <div style={{width:8,height:8,borderRadius:'50%',background:p.color,flexShrink:0}}/>
                  <span style={{color:p.color,fontWeight:700,flex:1}}>{p.name}</span>
                  <span style={{fontWeight:900,fontSize:16}}>{p.total||'—'}</span>
                </div>
              ))}
            </div>
            <div style={{display:'flex',gap:8,justifyContent:'flex-end'}}>
              {!r.completed&&<button onClick={()=>{setActiveRoundId(r.id);setView('scorecard');}} style={{background:'rgba(0,230,118,.1)',border:'1px solid rgba(0,230,118,.3)',color:'#00e676',padding:'7px 16px',borderRadius:8,cursor:'pointer',fontSize:12,fontWeight:700}}>▶ RESUME</button>}
              <button onClick={()=>{if(confirm('Delete this round?'))deleteRound(r.id);}} style={{background:'rgba(255,68,68,.1)',border:'1px solid rgba(255,68,68,.2)',color:'#ff4444',padding:'7px 10px',borderRadius:8,cursor:'pointer',fontSize:13}}>🗑️</button>
            </div>
          </div>
        );
      })}
    </div>
  );
}
 
// ═══════════════════════════════════════════════════════
// LEADERBOARD
// ═══════════════════════════════════════════════════════
function LeaderboardView({round,scores,setView}){
  const fmt=FORMATS.find(f=>f.id===round.format);
  const course=COURSES[round.course_id]||COURSES.snee;
  const holes=course.holes;
  const getTotal=pid=>(scores[pid]||[]).reduce((a,b)=>a+(b||0),0);
  const getTP=pid=>{let tp=0;(scores[pid]||[]).forEach((s,i)=>{if(s>0&&holes[i])tp+=s-holes[i].par;});return tp;};
  const getSF=pid=>(scores[pid]||[]).reduce((a,s,i)=>a+(s>0&&holes[i]?sfPts(s,holes[i].par):0),0);
  const getSkins=pid=>{let sk=0;holes.forEach((_,i)=>{const all=PLAYERS.map(p=>(scores[p.id]||[])[i]).filter(x=>x>0);if(all.length===4){const min=Math.min(...all);const w=PLAYERS.filter(p=>((scores[p.id]||[])[i])===min);if(w.length===1&&w[0].id===pid)sk++;}});return sk;};
 
  const ranked=[...PLAYERS].map(p=>{
    if(round.format==='stableford')return{...p,val:getSF(p.id),disp:getSF(p.id)+' pts',higher:true};
    if(round.format==='skins')return{...p,val:getSkins(p.id),disp:getSkins(p.id)+' skins',higher:true};
    return{...p,val:getTotal(p.id),tp:getTP(p.id),disp:getTotal(p.id)+'',higher:false};
  }).sort((a,b)=>a.higher?b.val-a.val:a.val-b.val);
 
  // Bet settlements
  const betAmt=round.bet_amount||0;
  const winner=ranked[0];
  const settlements=betAmt>0?ranked.slice(1).map(p=>({from:p,to:winner,amount:betAmt})):[];
 
  const medals=['🥇','🥈','🥉','💀'];
 
  return(
    <div style={{display:'flex',flexDirection:'column',gap:14,animation:'fadeUp .4s ease'}}>
      <div style={{background:'linear-gradient(135deg,rgba(255,215,0,.1),rgba(255,215,0,.03))',border:'1px solid rgba(255,215,0,.2)',borderRadius:20,padding:'20px 18px',textAlign:'center'}}>
        <div style={{fontSize:11,color:'rgba(255,215,0,.5)',letterSpacing:3,fontWeight:700,marginBottom:6}}>ROUND COMPLETE</div>
        <div style={{fontFamily:'Bebas Neue',fontSize:36,letterSpacing:2,color:'#ffd700',lineHeight:1,marginBottom:4}}>{fmt?.icon} {fmt?.label}</div>
        <div style={{fontSize:13,color:'rgba(255,255,255,.3)'}}>{round.date} · {course.name}</div>
      </div>
 
      {/* Podium */}
      <div style={{display:'flex',flexDirection:'column',gap:8}}>
        {ranked.map((p,i)=>(
          <div key={p.id} style={{background:i===0?`linear-gradient(135deg,${p.color}22,${p.color}08)`:'rgba(255,255,255,.03)',border:`2px solid ${i===0?p.color+'66':'rgba(255,255,255,.06)'}`,borderRadius:16,padding:'16px 18px',display:'flex',alignItems:'center',gap:14,transform:i===0?'scale(1.02)':'scale(1)',transition:'transform .3s'}}>
            <span style={{fontSize:28,width:36,flexShrink:0}}>{medals[i]}</span>
            <div style={{width:44,height:44,borderRadius:'50%',background:p.color,display:'flex',alignItems:'center',justifyContent:'center',fontWeight:900,fontSize:20,color:'#000',flexShrink:0}}>{p.avatar}</div>
            <div style={{flex:1}}>
              <div style={{fontFamily:'Bebas Neue',fontSize:20,letterSpacing:1,color:i===0?p.color:'#fff'}}>{p.name}</div>
              {p.tp!==undefined&&<div style={{fontSize:11,color:'rgba(255,255,255,.3)'}}>{tpStr(p.tp)}</div>}
            </div>
            <div style={{fontFamily:'Bebas Neue',fontSize:32,color:i===0?p.color:'rgba(255,255,255,.6)'}}>{p.disp}</div>
          </div>
        ))}
      </div>
 
      {/* Money owed */}
      {settlements.length>0&&(
        <div style={{background:'rgba(0,230,118,.06)',border:'1px solid rgba(0,230,118,.15)',borderRadius:16,padding:'16px'}}>
          <div style={{fontFamily:'Bebas Neue',fontSize:20,letterSpacing:2,color:'#00e676',marginBottom:12}}>💰 SETTLE UP</div>
          {settlements.map((s,i)=>(
            <div key={i} style={{display:'flex',alignItems:'center',gap:10,marginBottom:10,background:'rgba(0,0,0,.3)',borderRadius:10,padding:'10px 14px'}}>
              <div style={{width:28,height:28,borderRadius:'50%',background:s.from.color,display:'flex',alignItems:'center',justifyContent:'center',fontWeight:900,fontSize:12,color:'#000'}}>{s.from.avatar}</div>
              <div style={{flex:1,fontSize:13}}>
                <span style={{color:s.from.color,fontWeight:700}}>{s.from.name}</span>
                <span style={{color:'rgba(255,255,255,.3)'}}> owes </span>
                <span style={{color:s.to.color,fontWeight:700}}>{s.to.name}</span>
              </div>
              <div style={{fontFamily:'Bebas Neue',fontSize:22,color:'#00e676'}}>${s.amount}</div>
            </div>
          ))}
        </div>
      )}
 
      {/* Full scorecard */}
      <FullScorecard scores={scores} holes={COURSES[round.course_id]?.holes||COURSES.snee.holes}/>
 
      <button onClick={()=>setView('setup')} style={{background:'linear-gradient(135deg,#00c853,#00e676)',color:'#000',border:'none',borderRadius:14,padding:'16px',fontSize:18,fontWeight:900,cursor:'pointer',letterSpacing:2,fontFamily:'Bebas Neue'}}>
        ⛳ PLAY AGAIN
      </button>
    </div>
  );
}
 
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
