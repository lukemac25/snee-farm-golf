// HISTORY VIEW
// ══════════════════════════════════════════════
function HistoryView({rounds,scores,deleteRound,setActiveRoundId,setView}){
  const[filter,setFilter]=useState('all');
  const unique=[...new Set(rounds.map(r=>r.format))];
  const filtered=rounds.filter(r=>filter==='all'||r.format===filter);
  return(
    <div style={{display:'flex',flexDirection:'column',gap:12,animation:'fadeUp .4s ease'}}>
      <div style={{fontFamily:'Bebas Neue',fontSize:30,letterSpacing:3,color:'#00e676'}}>ROUND HISTORY</div>
      <div style={{display:'flex',gap:6,overflowX:'auto',paddingBottom:4}}>
        <button onClick={()=>setFilter('all')} style={{background:filter==='all'?'rgba(0,230,118,.12)':'transparent',border:`1px solid ${filter==='all'?'rgba(0,230,118,.35)':'rgba(255,255,255,.05)'}`,color:filter==='all'?'#00e676':'#333',padding:'6px 14px',borderRadius:20,cursor:'pointer',fontSize:10,fontWeight:800,letterSpacing:1,whiteSpace:'nowrap',flexShrink:0}}>ALL</button>
        {unique.map(f=>{const fmt=FORMATS.find(x=>x.id===f);return(
          <button key={f} onClick={()=>setFilter(f)} style={{background:filter===f?'rgba(0,230,118,.12)':'transparent',border:`1px solid ${filter===f?'rgba(0,230,118,.35)':'rgba(255,255,255,.05)'}`,color:filter===f?'#00e676':'#333',padding:'6px 14px',borderRadius:20,cursor:'pointer',fontSize:10,fontWeight:800,whiteSpace:'nowrap',flexShrink:0}}>{fmt?.icon} {fmt?.label}</button>
        );})}
      </div>
      {filtered.length===0&&<div style={{textAlign:'center',color:'rgba(255,255,255,.15)',padding:50,fontSize:15}}>No rounds yet ⛳</div>}
      {filtered.map(r=>{
        const fmt=FORMATS.find(f=>f.id===r.format);const course=COURSES[r.course_id]||COURSES.snee;
        const rsc=scores[r.id]||{};
        const ranked=[...PLAYERS].map(p=>({...p,total:(rsc[p.id]||[]).reduce((a,b)=>a+(b||0),0)})).sort((a,b)=>a.total-b.total);
        return(
          <div key={r.id} style={{background:'rgba(255,255,255,.02)',border:'1px solid rgba(255,255,255,.05)',borderRadius:18,padding:'16px'}}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:10}}>
              <div style={{display:'flex',gap:10,alignItems:'center'}}>
                <span style={{fontSize:22}}>{fmt?.icon}</span>
                <div>
                  <div style={{fontWeight:800,fontSize:14}}>{fmt?.label}</div>
                  <div style={{fontSize:10,color:'rgba(255,255,255,.25)',marginTop:2}}>{r.date} · {course.name}</div>
                </div>
              </div>
              <div style={{color:r.completed?'#00e676':'#ff4444',fontSize:10,fontWeight:800,letterSpacing:1}}>{r.completed?'✓ DONE':'● LIVE'}</div>
            </div>
            <div style={{display:'flex',flexDirection:'column',gap:5,marginBottom:12}}>
              {ranked.map((p,i)=>(
                <div key={p.id} style={{display:'flex',alignItems:'center',gap:8,fontSize:12}}>
                  <span style={{color:'rgba(255,255,255,.15)',fontSize:10,width:14}}>#{i+1}</span>
                  <div style={{width:8,height:8,borderRadius:'50%',background:p.color,flexShrink:0}}/>
                  <span style={{color:p.color,fontWeight:800,flex:1}}>{p.name}</span>
                  <span style={{fontWeight:900,fontSize:15}}>{p.total||'—'}</span>
                </div>
              ))}
            </div>
            <div style={{display:'flex',gap:7,justifyContent:'flex-end'}}>
              {!r.completed&&<button onClick={()=>{setActiveRoundId(r.id);setView('scorecard');Haptic.light();}} style={{background:'rgba(0,230,118,.08)',border:'1px solid rgba(0,230,118,.25)',color:'#00e676',padding:'7px 16px',borderRadius:10,cursor:'pointer',fontSize:11,fontWeight:800,letterSpacing:1}}>▶ RESUME</button>}
              <button onClick={()=>{if(confirm('Delete this round?'))deleteRound(r.id);}} style={{background:'rgba(255,68,68,.08)',border:'1px solid rgba(255,68,68,.2)',color:'#ff4444',padding:'7px 11px',borderRadius:10,cursor:'pointer',fontSize:13}}>🗑️</button>
            </div>
          </div>
        );
      })}
    </div>
  );
}

// ══════════════════════════════════════════════
// LEADERBOARD VIEW
// ══════════════════════════════════════════════
function LeaderboardView({round,scores,playerSettings,setView}){
  const fmt=FORMATS.find(f=>f.id===round.format);
  const course=COURSES[round.course_id]||COURSES.snee;
  const holes=course.holes;
  const[showShare,setShowShare]=useState(false);

  const getTotal=pid=>(scores[pid]||[]).reduce((a,b)=>a+(b||0),0);
  const getTP=pid=>{let tp=0;(scores[pid]||[]).forEach((s,i)=>{if(s>0&&holes[i])tp+=s-holes[i].par;});return tp;};
  const getSF=pid=>(scores[pid]||[]).reduce((a,s,i)=>a+(s>0&&holes[i]?sfPts(s,holes[i].par):0),0);
  const getSkins=pid=>{let sk=0;holes.forEach((_,i)=>{const all=PLAYERS.map(p=>(scores[p.id]||[])[i]).filter(x=>x>0);if(all.length===4){const min=Math.min(...all);const w=PLAYERS.filter(p=>((scores[p.id]||[])[i])===min);if(w.length===1&&w[0].id===pid)sk++;}});return sk;};

  const ranked=[...PLAYERS].map(p=>{
    if(round.format==='stableford')return{...p,val:getSF(p.id),disp:getSF(p.id)+' pts',higher:true};
    if(round.format==='skins')return{...p,val:getSkins(p.id),disp:getSkins(p.id)+' skins',higher:true};
    return{...p,val:getTotal(p.id),tp:getTP(p.id),disp:getTotal(p.id)+'',higher:false};
  }).sort((a,b)=>a.higher?b.val-a.val:a.val-b.val);

  const winner=ranked[0];
  const betAmt=round.bet_amount||0;

  // MVP awards
  const awards=[];
  const mostBirdies=PLAYERS.map(p=>({...p,b:(scores[p.id]||[]).reduce((a,s,i)=>a+(s>0&&holes[i]&&s-holes[i].par===-1?1:0),0)})).sort((a,b)=>b.b-a.b)[0];
  if(mostBirdies?.b>0)awards.push({icon:'🐦',label:'Most Birdies',player:mostBirdies,detail:`${mostBirdies.b} birdies`});

  const fewestPutts=PLAYERS.map(p=>({...p,tot:getTotal(p.id)})).filter(p=>p.tot>0).sort((a,b)=>a.tot-b.tot)[0];
  if(fewestPutts)awards.push({icon:'🎯',label:'Lowest Score',player:fewestPutts,detail:`${fewestPutts.tot} strokes`});

  const mostConsistent=PLAYERS.map(p=>{const s=scores[p.id]||[];const played=s.filter(x=>x>0);if(played.length<9)return{...p,std:99};const avg=played.reduce((a,b)=>a+b,0)/played.length;const std=Math.sqrt(played.reduce((a,b)=>a+(b-avg)**2,0)/played.length);return{...p,std};}).sort((a,b)=>a.std-b.std)[0];
  if(mostConsistent?.std<99)awards.push({icon:'📐',label:'Most Consistent',player:mostConsistent,detail:'Steadiest round'});

  // Share text
  const shareText=`⛳ Thursday Crew Golf\n${round.date} · ${course.name}\n\n${ranked.map((p,i)=>['🥇','🥈','🥉','4️⃣'][i]+' '+p.name+': '+p.disp).join('\n')}\n\nwinner: ${winner.name} 🏆`;

  const medals=['🥇','🥈','🥉','💀'];

  return(
    <div style={{display:'flex',flexDirection:'column',gap:14,animation:'fadeUp .4s ease'}}>
      {/* Trophy header */}
      <div style={{background:'linear-gradient(160deg,rgba(255,215,0,.08),rgba(255,215,0,.02))',border:'1px solid rgba(255,215,0,.2)',borderRadius:22,padding:'22px 18px',textAlign:'center',position:'relative',overflow:'hidden'}}>
        <div style={{position:'absolute',top:-20,left:-20,fontSize:120,opacity:.04}}>🏆</div>
        <div style={{position:'absolute',top:-20,right:-20,fontSize:120,opacity:.04}}>🏆</div>
        <div style={{fontSize:10,color:'rgba(255,215,0,.4)',letterSpacing:4,fontWeight:800,marginBottom:8}}>ROUND COMPLETE</div>
        <div style={{fontFamily:'Bebas Neue',fontSize:40,color:'#ffd700',lineHeight:1,marginBottom:4}}>{fmt?.icon} {fmt?.label}</div>
        <div style={{fontSize:12,color:'rgba(255,255,255,.25)'}}>{round.date} · {course.name} · {round.tees?.toUpperCase()}</div>
        <div style={{marginTop:14,display:'inline-flex',gap:8,background:'rgba(0,0,0,.4)',borderRadius:20,padding:'10px 20px',alignItems:'center'}}>
          <div style={{width:36,height:36,borderRadius:'50%',background:winner.color,display:'flex',alignItems:'center',justifyContent:'center',fontSize:18,color:'#000',fontWeight:900}}>{winner.emoji}</div>
          <div style={{textAlign:'left'}}>
            <div style={{fontFamily:'Bebas Neue',fontSize:18,color:winner.color,letterSpacing:1}}>{winner.name} WINS</div>
            <div style={{fontSize:11,color:'rgba(255,255,255,.3)'}}>{winner.disp}</div>
          </div>
        </div>
      </div>

      {/* Podium */}
      <div style={{display:'flex',flexDirection:'column',gap:8}}>
        {ranked.map((p,i)=>(
          <div key={p.id} style={{background:i===0?`linear-gradient(135deg,${p.color}18,${p.color}05)`:'rgba(255,255,255,.02)',border:`${i===0?2:1}px solid ${i===0?p.color+'55':'rgba(255,255,255,.05)'}`,borderRadius:18,padding:'16px 18px',display:'flex',alignItems:'center',gap:14,transform:i===0?'scale(1.02)':'scale(1)',transition:'transform .3s'}}>
            <span style={{fontSize:26,width:32,flexShrink:0}}>{medals[i]}</span>
            <div style={{width:44,height:44,borderRadius:'50%',background:p.color,display:'flex',alignItems:'center',justifyContent:'center',fontWeight:900,fontSize:20,color:'#000',flexShrink:0}}>{p.emoji}</div>
            <div style={{flex:1}}>
              <div style={{fontFamily:'Bebas Neue',fontSize:22,letterSpacing:1,color:i===0?p.color:'#fff'}}>{p.name}</div>
              {p.tp!==undefined&&<div style={{fontSize:11,color:'rgba(255,255,255,.25)'}}>{tpStr(p.tp)}</div>}
            </div>
            <div style={{fontFamily:'Bebas Neue',fontSize:34,color:i===0?p.color:'rgba(255,255,255,.5)',lineHeight:1}}>{p.disp}</div>
          </div>
        ))}
      </div>

      {/* Score bars */}
      <div style={{background:'rgba(255,255,255,.02)',border:'1px solid rgba(255,255,255,.05)',borderRadius:18,padding:'16px'}}>
        <div style={{fontSize:9,color:'rgba(255,255,255,.25)',letterSpacing:3,fontWeight:800,marginBottom:12}}>TOTAL STROKES</div>
        {[...PLAYERS].map(p=>{const total=getTotal(p.id);const max=Math.max(...PLAYERS.map(pp=>getTotal(pp.id)));return(
          <div key={p.id} style={{display:'flex',alignItems:'center',gap:10,marginBottom:10}}>
            <div style={{width:30,height:30,borderRadius:'50%',background:p.color,display:'flex',alignItems:'center',justifyContent:'center',fontWeight:900,fontSize:13,color:'#000',flexShrink:0}}>{p.emoji}</div>
            <span style={{color:p.color,fontWeight:800,width:52,fontSize:13}}>{p.name}</span>
            <div style={{flex:1,height:10,background:'rgba(255,255,255,.05)',borderRadius:5,overflow:'hidden'}}>
              <div style={{height:'100%',background:`linear-gradient(90deg,${p.color}88,${p.color})`,borderRadius:5,width:`${(total/max)*100}%`,transition:'width 1s ease'}}/>
            </div>
            <span style={{fontWeight:900,fontSize:17,color:p.color,minWidth:32,textAlign:'right'}}>{total||'—'}</span>
          </div>
        );})}
      </div>

      {/* Settle up */}
      {betAmt>0&&(
        <div style={{background:'rgba(0,230,118,.04)',border:'1px solid rgba(0,230,118,.12)',borderRadius:18,padding:'16px'}}>
          <div style={{fontFamily:'Bebas Neue',fontSize:20,letterSpacing:2,color:'#00e676',marginBottom:12}}>💰 SETTLE UP · ${betAmt}/HOLE</div>
          {ranked.slice(1).map(p=>(
            <div key={p.id} style={{display:'flex',alignItems:'center',gap:10,marginBottom:10,background:'rgba(0,0,0,.3)',borderRadius:12,padding:'12px 14px'}}>
              <div style={{width:30,height:30,borderRadius:'50%',background:p.color,display:'flex',alignItems:'center',justifyContent:'center',fontSize:15,color:'#000',fontWeight:900}}>{p.emoji}</div>
              <div style={{flex:1,fontSize:13}}>
                <span style={{color:p.color,fontWeight:800}}>{p.name}</span>
                <span style={{color:'rgba(255,255,255,.3)'}}> pays </span>
                <span style={{color:winner.color,fontWeight:800}}>{winner.name}</span>
              </div>
              <div style={{fontFamily:'Bebas Neue',fontSize:24,color:'#00e676'}}>${betAmt}</div>
            </div>
          ))}
        </div>
      )}

      {/* MVP Awards */}
      {awards.length>0&&(
        <div style={{background:'rgba(255,215,0,.03)',border:'1px solid rgba(255,215,0,.1)',borderRadius:18,padding:'16px'}}>
          <div style={{fontFamily:'Bebas Neue',fontSize:20,letterSpacing:2,color:'#ffd700',marginBottom:12}}>🏅 ROUND AWARDS</div>
          {awards.map((a,i)=>(
            <div key={i} style={{display:'flex',alignItems:'center',gap:12,marginBottom:10,background:'rgba(0,0,0,.3)',borderRadius:12,padding:'10px 14px'}}>
              <span style={{fontSize:26}}>{a.icon}</span>
              <div style={{flex:1}}>
                <div style={{fontSize:10,color:'rgba(255,215,0,.5)',letterSpacing:2,fontWeight:700}}>{a.label.toUpperCase()}</div>
                <div style={{fontSize:15,fontWeight:800,color:a.player.color}}>{a.player.name}</div>
              </div>
              <div style={{fontSize:11,color:'rgba(255,255,255,.3)',fontWeight:700}}>{a.detail}</div>
            </div>
          ))}
        </div>
      )}

      {/* Share card */}
      <button onClick={()=>{navigator.share?navigator.share({title:'Thursday Crew Golf',text:shareText}):setShowShare(true);}} style={{background:'rgba(64,196,255,.08)',border:'1px solid rgba(64,196,255,.2)',color:'#40c4ff',borderRadius:14,padding:'14px',fontSize:14,fontWeight:800,cursor:'pointer',letterSpacing:1}}>
        📤 SHARE RESULTS
      </button>
      {showShare&&(
        <div style={{background:'rgba(0,0,0,.8)',border:'1px solid rgba(64,196,255,.3)',borderRadius:14,padding:16}}>
          <div style={{fontSize:10,color:'rgba(64,196,255,.5)',letterSpacing:2,marginBottom:8,fontWeight:700}}>COPY & SHARE</div>
          <textarea readOnly value={shareText} style={{width:'100%',background:'transparent',border:'none',color:'#f0f0f0',fontSize:13,lineHeight:1.8,resize:'none',outline:'none',fontFamily:'monospace'}} rows={8}/>
          <button onClick={()=>{navigator.clipboard.writeText(shareText);setShowShare(false);}} style={{background:'#40c4ff',color:'#000',border:'none',borderRadius:10,padding:'10px 20px',fontSize:13,fontWeight:800,cursor:'pointer',marginTop:8,width:'100%'}}>📋 COPY TO CLIPBOARD</button>
        </div>
      )}

      {/* Full scorecard */}
      <div style={{fontFamily:'Bebas Neue',fontSize:18,letterSpacing:2,color:'#00e676'}}>FULL SCORECARD</div>
      <FullScorecard scores={scores} holes={holes}/>

      <button onClick={()=>setView('setup')} style={{background:'linear-gradient(135deg,#00c853,#00e676)',color:'#000',border:'none',borderRadius:16,padding:'18px 24px',fontSize:22,fontWeight:900,cursor:'pointer',letterSpacing:3,fontFamily:'Bebas Neue',boxShadow:'0 8px 40px rgba(0,230,118,.25)'}}>
        ⛳ PLAY AGAIN
      </button>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
