function scoreName(s,p){
  if(!s||s<=0)return null;
  const d=s-p;
  if(s===1)return{l:'ACE! 🎉',c:'#ffd700',type:'ace'};
  if(d<=-3)return{l:'ALBATROSS 🦅🦅🦅',c:'#00e676',type:'eagle'};
  if(d===-2)return{l:'EAGLE 🦅🦅',c:'#00e676',type:'eagle'};
  if(d===-1)return{l:'BIRDIE 🐦',c:'#69f0ae',type:'birdie'};
  if(d===0)return{l:'PAR',c:'#666',type:'par'};
  if(d===1)return{l:'BOGEY',c:'#ff9100',type:'bogey'};
  if(d===2)return{l:'DOUBLE 😬',c:'#ff5252',type:'bogey'};
  if(d===3)return{l:'TRIPLE 😱',c:'#d32f2f',type:'bogey'};
  return{l:`+${d} 💀`,c:'#b71c1c',type:'bogey'};
}
function sfPts(s,p){if(!s||s<=0)return 0;const d=s-p;if(d>=2)return 0;if(d===1)return 1;if(d===0)return 2;if(d===-1)return 3;if(d===-2)return 4;return 5;}
function tpStr(tp){return tp===0?'E':tp>0?`+${tp}`:`${tp}`;}
function scColor(d){
  if(d<=-2)return{bg:'rgba(0,230,118,.2)',c:'#00e676'};
  if(d===-1)return{bg:'rgba(105,240,174,.12)',c:'#69f0ae'};
  if(d===0)return{bg:'transparent',c:'#555'};
  if(d===1)return{bg:'rgba(255,145,0,.12)',c:'#ff9100'};
  if(d===2)return{bg:'rgba(255,82,82,.12)',c:'#ff5252'};
  return{bg:'rgba(183,28,28,.2)',c:'#ef5350'};
}
// Net score with handicap strokes
function getNetScore(gross,par,hcp,playerHdcp,courseRating=72){
  const strokes=Math.floor(playerHdcp/18)+(hcp<=playerHdcp%18?1:0);
  return gross-strokes;
}

function WeatherWidget({lat,lon,courseName}){
  const[weather,setWeather]=useState(null);
  useEffect(()=>{
    if(!lat||!lon)return;
    fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,wind_speed_10m,weather_code&temperature_unit=fahrenheit&wind_speed_unit=mph`)
      .then(r=>r.json()).then(d=>{
        const c=d.current;
        const code=c.weather_code;
        let icon='☀️';
        if(code>=61&&code<=67)icon='🌧️';
        else if(code>=71&&code<=77)icon='❄️';
        else if(code>=80&&code<=82)icon='🌦️';
        else if(code>=95)icon='⛈️';
        else if(code>=51&&code<=57)icon='🌦️';
        else if(code>=1&&code<=3)icon=code===1?'🌤️':code===2?'⛅':'☁️';
        else if(code===45||code===48)icon='🌫️';
        setWeather({temp:Math.round(c.temperature_2m),wind:Math.round(c.wind_speed_10m),icon});
      }).catch(()=>{});
  },[lat,lon]);
  if(!weather)return null;
  return(
    <div style={{display:'flex',alignItems:'center',gap:8,background:'rgba(255,255,255,.04)',border:'1px solid rgba(255,255,255,.07)',borderRadius:12,padding:'8px 12px'}}>
      <span style={{fontSize:20}}>{weather.icon}</span>
      <div>
        <div style={{fontSize:13,fontWeight:700}}>{weather.temp}°F · {weather.wind} mph winds</div>
        <div style={{fontSize:10,color:'rgba(255,255,255,.3)'}}>{courseName}</div>
      </div>
    </div>
  );
}

function PlayerProfile({player,rounds,scores,playerSettings,onClose}){
  const completed=rounds.filter(r=>r.completed);
  const hdcp=playerSettings[player.id]??player.defaultHcp;
  const st=useMemo(()=>{
    let b=0,e=0,p=0,bo=0,d=0,ac=0,best=null,worst=null,rp=0,tot=0,wins=0,streak=0,cur=0;
    [...completed].sort((a,x)=>a.date>x.date?1:-1).forEach(r=>{
      const s=scores[r.id]?.[player.id];if(!s)return;
      const course=COURSES[r.course_id]||COURSES.snee;
      let rt=0,pl=false;
      s.forEach((sc,i)=>{if(sc>0&&course.holes[i]){const dd=sc-course.holes[i].par;if(sc===1)ac++;else if(dd<=-2)e++;else if(dd===-1)b++;else if(dd===0)p++;else if(dd===1)bo++;else d++;rt+=sc;pl=true;}});
      if(pl&&rt>0){tot+=rt;rp++;if(best===null||rt<best)best=rt;if(worst===null||rt>worst)worst=rt;}
      const all=PLAYERS.map(pp=>({id:pp.id,t:(scores[r.id]?.[pp.id]||[]).reduce((a,x)=>a+(x||0),0)})).filter(x=>x.t>0).sort((a,x)=>a.t-x.t);
      if(all[0]&&all[0].id===player.id){wins++;cur++;}else{streak=Math.max(streak,cur);cur=0;}
    });
    streak=Math.max(streak,cur);
    const trend=completed.slice(0,6).reverse().map(r=>{const s=scores[r.id]?.[player.id];return s?s.reduce((a,x)=>a+(x||0),0):null;}).filter(Boolean);
    return{b,e,p,bo,d,ac,best,worst,rp,avg:rp?Math.round(tot/rp):null,wins,streak,trend};
  },[completed.length]);
  return(
    <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,.9)',zIndex:400,display:'flex',alignItems:'flex-end',justifyContent:'center'}} onClick={onClose}>
      <div style={{background:'#0a150a',border:'1px solid '+player.color+'33',borderRadius:'22px 22px 0 0',padding:'22px 18px',width:'100%',maxWidth:700,maxHeight:'85vh',overflowY:'auto',animation:'fadeUp .3s'}} onClick={e=>e.stopPropagation()}>
        <div style={{width:36,height:4,background:'rgba(255,255,255,.12)',borderRadius:2,margin:'0 auto 18px'}}/>
        <div style={{display:'flex',alignItems:'center',gap:14,marginBottom:20}}>
          <div style={{width:60,height:60,borderRadius:'50%',background:player.color,display:'flex',alignItems:'center',justifyContent:'center',fontSize:28,color:'#000',fontWeight:900}}>{player.emoji}</div>
          <div style={{flex:1}}><div style={{fontFamily:'Bebas Neue',fontSize:28,letterSpacing:2,color:player.color}}>{player.name}</div><div style={{fontSize:11,color:'rgba(255,255,255,.25)'}}>HCP {hdcp} · {st.rp} rounds</div></div>
          {st.best&&<div style={{textAlign:'right'}}><div style={{fontFamily:'Bebas Neue',fontSize:38,color:player.color,lineHeight:1}}>{st.best}</div><div style={{fontSize:8,color:'rgba(255,255,255,.2)',letterSpacing:2}}>BEST</div></div>}
        </div>
        <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:7,marginBottom:14}}>
          {[{n:st.wins,l:'WINS',c:'#ffd700'},{n:st.streak,l:'STREAK',c:'#ff9100'},{n:st.avg||'--',l:'AVG',c:player.color}].map((s,i)=>(
            <div key={i} style={{background:'rgba(0,0,0,.4)',borderRadius:12,padding:'12px 6px',textAlign:'center'}}>
              <div style={{fontFamily:'Bebas Neue',fontSize:28,color:s.c,lineHeight:1}}>{s.n}</div>
              <div style={{fontSize:8,color:'rgba(255,255,255,.2)',letterSpacing:2,fontWeight:700,marginTop:3}}>{s.l}</div>
            </div>
          ))}
        </div>
        <div style={{display:'grid',gridTemplateColumns:'repeat(5,1fr)',gap:5,marginBottom:12}}>
          {[{n:st.ac,l:'ACE',c:'#ffd700'},{n:st.e,l:'EAGLE',c:'#00e676'},{n:st.b,l:'BIRDIE',c:'#69f0ae'},{n:st.p,l:'PAR',c:'#555'},{n:st.bo+st.d,l:'BOG+',c:'#ff5252'}].map((s,i)=>(
            <div key={i} style={{background:'rgba(0,0,0,.3)',borderRadius:10,padding:'8px 3px',textAlign:'center'}}>
              <div style={{fontFamily:'Bebas Neue',fontSize:22,color:s.n>0?s.c:'#222'}}>{s.n}</div>
              <div style={{fontSize:7,color:'rgba(255,255,255,.18)',fontWeight:700,letterSpacing:1}}>{s.l}</div>
            </div>
          ))}
        </div>
        {st.trend.length>1&&(<div style={{marginBottom:10}}><div style={{fontSize:8,color:'rgba(255,255,255,.2)',letterSpacing:3,fontWeight:700,marginBottom:6}}>SCORE TREND</div><div style={{display:'flex',gap:3,alignItems:'flex-end',height:46}}>{st.trend.map((t,i)=>{const mn=Math.min(...st.trend),mx=Math.max(...st.trend);const h=mx===mn?22:Math.round(((mx-t)/(mx-mn))*36)+10;return(<div key={i} style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',gap:2}}><div style={{width:'100%',background:i===st.trend.length-1?player.color:'rgba(255,255,255,.12)',borderRadius:'3px 3px 0 0',height:h}}/><div style={{fontSize:8,color:'rgba(255,255,255,.25)',fontWeight:700}}>{t}</div></div>);})}</div></div>)}
        {st.worst&&<div style={{fontSize:10,color:'rgba(255,255,255,.18)',textAlign:'center'}}>Worst: {st.worst}</div>}
      </div>
    </div>
  );
}

function HamburgerMenu({onClose,rounds,scores,nextRound,setNextRound}){

    PLAYERS.forEach(p=>{let cur=0,mx=0;completed.forEach(r=>{const s=scores[r.id]?.[p.id];if(!s)return;const course=COURSES[r.course_id]||COURSES.snee;const tot=s.reduce((a,x)=>a+(x||0),0);if(tot>0&&tot<best.score)best={score:tot,player:p,date:r.date};const bd=s.filter((sc,i)=>sc>0&&course.holes[i]&&sc-course.holes[i].par===-1).length;if(bd>birds.count)birds={count:bd,player:p,date:r.date};const all=PLAYERS.map(pp=>({id:pp.id,t:(scores[r.id]?.[pp.id]||[]).reduce((a,x)=>a+(x||0),0)})).filter(x=>x.t>0).sort((a,x)=>a.t-x.t);if(all[0]&&all[0].id===p.id)cur++;else{mx=Math.max(mx,cur);cur=0;}mx=Math.max(mx,cur);if(mx>strk.n)strk={n:mx,player:p};});});
    return{best,birds,strk};
  },[completed.length]);
  const back=()=>setSec('main');
  const bk={background:'transparent',border:'none',color:'rgba(255,255,255,.25)',fontSize:12,cursor:'pointer',marginBottom:14,display:'flex',alignItems:'center',gap:5};
  const menu=[{id:'records',icon:'🏆',l:'All-Time Records'},{id:'formats',icon:'📖',l:'Format Rules'},{id:'schedule',icon:'📅',l:'Schedule Next Round'},{id:'settings',icon:'⚙️',l:'Settings'}];

      <div style={{background:'#091409',width:280,height:'100%',borderRight:'1px solid rgba(0,230,118,.08)',padding:'55px 0 20px',overflowY:'auto',animation:'slideLeft .3s',flexShrink:0}} onClick={e=>e.stopPropagation()}>
        <div style={{padding:'0 18px 16px',borderBottom:'1px solid rgba(255,255,255,.04)',marginBottom:6}}><div style={{fontFamily:'Bebas Neue',fontSize:22,letterSpacing:3,color:'#00e676'}}>THURSDAY CREW</div><div style={{fontSize:9,color:'rgba(255,255,255,.18)',letterSpacing:2}}>GOLF TRACKER</div></div>
        {sec==='main'&&menu.map(m=><button key={m.id} onClick={()=>setSec(m.id)} style={{width:'100%',background:'transparent',border:'none',color:'#e8e8e8',padding:'15px 18px',cursor:'pointer',fontSize:14,fontWeight:600,display:'flex',alignItems:'center',gap:12,textAlign:'left',borderBottom:'1px solid rgba(255,255,255,.03)'}}><span style={{fontSize:18}}>{m.icon}</span>{m.l}<span style={{marginLeft:'auto',color:'rgba(255,255,255,.15)',fontSize:16}}>›</span></button>)}
        {sec==='records'&&<div style={{padding:'0 18px'}}><button onClick={back} style={bk}>‹ Back</button><div style={{fontFamily:'Bebas Neue',fontSize:20,letterSpacing:2,color:'#ffd700',marginBottom:14}}>ALL-TIME RECORDS</div>{completed.length===0?<div style={{color:'rgba(255,255,255,.2)',fontSize:12}}>No completed rounds yet!</div>:[{icon:'🏌️',l:'BEST ROUND EVER',v:records.best.score!==999?records.best.score+' — '+records.best.player?.name:null,s:records.best.date},{icon:'🐦',l:'MOST BIRDIES IN A ROUND',v:records.birds.count>0?records.birds.count+' — '+records.birds.player?.name:null,s:records.birds.date},{icon:'🔥',l:'LONGEST WIN STREAK',v:records.strk.n>0?records.strk.n+' — '+records.strk.player?.name:null,s:null}].map((r,i)=><div key={i} style={{background:'rgba(0,0,0,.3)',borderRadius:14,padding:'13px',marginBottom:9}}><div style={{fontSize:20,marginBottom:5}}>{r.icon}</div><div style={{fontSize:9,color:'rgba(255,255,255,.25)',letterSpacing:2,fontWeight:700,marginBottom:3}}>{r.l}</div><div style={{fontSize:17,fontWeight:900,color:'#ffd700'}}>{r.v||'—'}</div>{r.s&&<div style={{fontSize:9,color:'rgba(255,255,255,.18)',marginTop:2}}>{r.s}</div>}</div>)}</div>}
        {sec==='formats'&&<div style={{padding:'0 18px'}}><button onClick={()=>{back();setFmtD(null);}} style={bk}>‹ Back</button><div style={{fontFamily:'Bebas Neue',fontSize:20,letterSpacing:2,color:'#00e676',marginBottom:14}}>FORMAT RULES</div>{fmtD?<div><button onClick={()=>setFmtD(null)} style={bk}>‹ All</button><div style={{fontSize:26,marginBottom:6}}>{fmtD.icon}</div><div style={{fontFamily:'Bebas Neue',fontSize:20,color:'#00e676',marginBottom:10}}>{fmtD.label}</div><div style={{fontSize:13,color:'rgba(255,255,255,.65)',lineHeight:1.8}}>{fmtD.desc}</div></div>:FORMATS.map(f=><button key={f.id} onClick={()=>setFmtD(f)} style={{width:'100%',background:'rgba(255,255,255,.02)',border:'1px solid rgba(255,255,255,.04)',borderRadius:11,padding:'11px 12px',cursor:'pointer',marginBottom:5,display:'flex',alignItems:'center',gap:9,textAlign:'left'}}><span style={{fontSize:18,flexShrink:0}}>{f.icon}</span><div style={{flex:1}}><div style={{fontSize:12,fontWeight:700,color:'#fff'}}>{f.label}</div><div style={{fontSize:9,color:'rgba(255,255,255,.22)',marginTop:1}}>{f.desc}</div></div><span style={{color:'rgba(255,255,255,.15)',fontSize:14}}>›</span></button>)}</div>}
        {sec==='schedule'&&<div style={{padding:'0 18px'}}><button onClick={back} style={bk}>‹ Back</button><div style={{fontFamily:'Bebas Neue',fontSize:20,letterSpacing:2,color:'#00e676',marginBottom:14}}>NEXT ROUND</div><div style={{marginBottom:12}}><div style={{fontSize:9,color:'rgba(255,255,255,.25)',letterSpacing:2,fontWeight:700,marginBottom:5}}>DATE</div><input type="date" value={nextRound.date||''} onChange={e=>setNextRound(n=>({...n,date:e.target.value}))} style={{width:'100%',background:'rgba(0,0,0,.4)',border:'1px solid rgba(255,255,255,.09)',color:'#fff',padding:'10px 12px',borderRadius:10,fontSize:14}}/></div><div style={{marginBottom:12}}><div style={{fontSize:9,color:'rgba(255,255,255,.25)',letterSpacing:2,fontWeight:700,marginBottom:5}}>TEE TIME</div><input type="time" value={nextRound.teeTime||''} onChange={e=>setNextRound(n=>({...n,teeTime:e.target.value}))} style={{width:'100%',background:'rgba(0,0,0,.4)',border:'1px solid rgba(255,255,255,.09)',color:'#fff',padding:'10px 12px',borderRadius:10,fontSize:14}}/></div><div style={{marginBottom:14}}><div style={{fontSize:9,color:'rgba(255,255,255,.25)',letterSpacing:2,fontWeight:700,marginBottom:5}}>COURSE</div><select value={nextRound.courseId||'snee'} onChange={e=>setNextRound(n=>({...n,courseId:e.target.value}))} style={{width:'100%',background:'rgba(0,0,0,.4)',border:'1px solid rgba(255,255,255,.09)',color:'#fff',padding:'10px 12px',borderRadius:10,fontSize:13}}>{Object.entries(COURSES).map(([id,c])=><option key={id} value={id}>{c.name}</option>)}</select></div><button onClick={()=>{back();onClose();}} style={{background:'linear-gradient(135deg,#00c853,#00e676)',color:'#000',border:'none',borderRadius:12,padding:'13px',fontSize:14,fontWeight:900,cursor:'pointer',letterSpacing:2,fontFamily:'Bebas Neue',width:'100%'}}>SAVE</button></div>}
        {sec==='settings'&&<div style={{padding:'0 18px'}}><button onClick={back} style={bk}>‹ Back</button><div style={{fontFamily:'Bebas Neue',fontSize:20,letterSpacing:2,color:'#00e676',marginBottom:14}}>SETTINGS</div><div style={{background:'rgba(255,255,255,.02)',borderRadius:12,padding:'14px'}}><div style={{fontSize:11,color:'rgba(255,255,255,.18)',lineHeight:2}}>Thursday Crew Golf<br/>Ben · Thomas · Max · Luke<br/>Mount Pleasant, SC ⛳</div></div></div>}
      </div>
      <div style={{flex:1,background:'rgba(0,0,0,.5)'}}/>
    </div>
  );
}

function App(){
  const[view,setView]=useState('home');
  const[activeRoundId,setActiveRoundId]=useState(null);
  const[rounds,setRounds]=useState([]);
  const[scores,setScores]=useState({});
  const[extras,setExtras]=useState({});// closestPin, longDrive, mulligans per round
  const[playerSettings,setPlayerSettings]=useState({});
  const[loading,setLoading]=useState(true);
  const[toast,setToast]=useState(null);
  const[menuOpen,setMenuOpen]=useState(false);
  const[profileModal,setProfileModal]=useState(null);
  const[trashPop,setTrashPop]=useState(null);
  const[nextRound,setNextRound]=useState({date:'',teeTime:'08:00',courseId:'snee'});
  const[teamScores,setTeamScores]=useState(()=>{try{return JSON.parse(localStorage.getItem('tcg_ts6')||'{}')}catch{return{}}});

  const showToast=(msg,type='success',duration=3000)=>{
    setToast({msg,type});
    setTimeout(()=>setToast(null),duration);
  };

  useEffect(()=>{loadAll();},[]);

  useEffect(()=>{
    const s1=sb.channel('sc-v2').on('postgres_changes',{event:'*',schema:'public',table:'scores'},p=>{
      if(p.eventType==='INSERT'||p.eventType==='UPDATE'){
        const s=p.new;
        setScores(prev=>({...prev,[s.round_id]:{...(prev[s.round_id]||{}),[s.player_id]:s.holes}}));
      }
    }).subscribe();
    const s2=sb.channel('rc-v2').on('postgres_changes',{event:'*',schema:'public',table:'rounds'},p=>{
      if(p.eventType==='INSERT')setRounds(prev=>[p.new,...prev]);
      else if(p.eventType==='UPDATE')setRounds(prev=>prev.map(r=>r.id===p.new.id?p.new:r));
      else if(p.eventType==='DELETE')setRounds(prev=>prev.filter(r=>r.id!==p.old.id));
    }).subscribe();
    return()=>{sb.removeChannel(s1);sb.removeChannel(s2);};
  },[]);

  const loadAll=async()=>{
    setLoading(true);
    try{
      const[{data:rd},{data:sd},{data:ps}]=await Promise.all([
        sb.from('rounds').select('*').order('created_at',{ascending:false}),
        sb.from('scores').select('*'),
        sb.from('player_settings').select('*'),
      ]);
      setRounds(rd||[]);
      const m={};
      for(const s of(sd||[])){if(!m[s.round_id])m[s.round_id]={};m[s.round_id][s.player_id]=s.holes;}
      setScores(m);
      const p={};
      for(const s of(ps||[]))p[s.player_id]=s.handicap;
      setPlayerSettings(p);
      const live=(rd||[]).find(r=>!r.completed);
      if(live)setActiveRoundId(live.id);
    }catch(e){console.error(e);}
    setLoading(false);
  };

  const startRound=async(setup)=>{
    try{
      const hdcp={};PLAYERS.forEach(p=>{hdcp[p.id]=playerSettings[p.id]??p.defaultHcp;});
      const{data:round,error}=await sb.from('rounds').insert({
        date:setup.date,format:setup.format,team_config:setup.teamConfig,
        tees:setup.tees,bet_amount:setup.betAmount,handicaps:hdcp,
        completed:false,course_id:setup.courseId,
        team_names:setup.teamNames||null,
        mulligans_allowed:setup.mulligansAllowed||0,
      }).select().single();
      if(error)throw error;
      await sb.from('scores').insert(PLAYERS.map(p=>({round_id:round.id,player_id:p.id,holes:Array(18).fill(0)})));
      // Init extras
      setExtras(prev=>({...prev,[round.id]:{mulligans:{ben:0,thomas:0,max:0,luke:0},closestPin:{},longDrive:{}}}));
      if(isTeamFmt(setup.format)&&setup.teamConfig!=='solo'){const tc=TEAM_CONFIGS.find(t=>t.id===setup.teamConfig);if(tc){const nts={...teamScores,[round.id]:tc.teams.map(()=>Array(18).fill(0))};setTeamScores(nts);localStorage.setItem('tcg_ts6',JSON.stringify(nts));}}
      setActiveRoundId(round.id);
      setView('scorecard');
      showToast('Round started! Good luck 🏌️');
      Haptic.medium();
    }catch(e){
      console.error(e);
      showToast('Error starting round. Try running the SQL update in Supabase.','error');
    }
  };

  const updateScore=async(roundId,playerId,holeIdx,value)=>{
    const cur=scores[roundId]?.[playerId]||Array(18).fill(0);
    const upd=[...cur];
    const newVal=value===null?0:Math.max(1,parseInt(value)||0);
    const oldVal=upd[holeIdx];
    upd[holeIdx]=newVal;
    setScores(prev=>({...prev,[roundId]:{...(prev[roundId]||{}),[playerId]:upd}}));
    await sb.from('scores').update({holes:upd,updated_at:new Date().toISOString()}).eq('round_id',roundId).eq('player_id',playerId);
    // Sound & haptic
    const round=rounds.find(r=>r.id===roundId);
    const course=COURSES[round?.course_id]||COURSES.snee;
    const hole=course.holes[holeIdx];
    if(hole&&newVal>0&&newVal!==oldVal){
      const d=newVal-hole.par;
      if(newVal===1){Sound.play('ace');Haptic.celebrate();showToast('HOLE IN ONE!!! 🎉🎉🎉','success',5000);}
      else if(d<=-2){Sound.play('eagle');Haptic.celebrate();showToast(`EAGLE! 🦅🦅`,'success');}
      else if(d===-1){Sound.play('birdie');Haptic.medium();}
      else if(d>=2){Sound.play('bogey');Haptic.light();const pl=PLAYERS.find(p=>p.id===playerId);if(pl){const TT=[(p,s)=>p+' shot '+s+'? My grandma plays better.',(p,s)=>p+' with a '+s+'. Bold. Terrible, but bold.',(p,s)=>s+' for '+p+'. The course wants its dignity back.',(p,s)=>p+' carded a '+s+'. Tiger is shaking his head.'];setTrashPop({line:TT[Math.floor(Math.random()*TT.length)](pl.name,newVal)});setTimeout(()=>setTrashPop(null),4000);}}
      else{Sound.play('click');Haptic.light();}
    }
  };

  const updateTeamScore=(roundId,ti,hi,val)=>{
    const cur=JSON.parse(JSON.stringify(teamScores[roundId]||[]));
    if(!cur[ti])return;cur[ti][hi]=Math.max(1,parseInt(val)||0);
    const nts={...teamScores,[roundId]:cur};setTeamScores(nts);localStorage.setItem('tcg_ts6',JSON.stringify(nts));
  };
  const finishRound=async(roundId)=>{
    await sb.from('rounds').update({completed:true}).eq('id',roundId);
    setActiveRoundId(null);
    setView('leaderboard');
    showToast('Round complete! 🏆');
    Haptic.celebrate();
  };

  const deleteRound=async(roundId)=>{
    await sb.from('rounds').delete().eq('id',roundId);
    if(activeRoundId===roundId)setActiveRoundId(null);
    showToast('Round deleted');
  };

  const updateHandicap=async(pid,val)=>{
    const hcp=parseInt(val)||0;
    setPlayerSettings(prev=>({...prev,[pid]:hcp}));
    await sb.from('player_settings').upsert({player_id:pid,handicap:hcp,updated_at:new Date().toISOString()});
  };

  const updateExtras=(roundId,type,data)=>{
    setExtras(prev=>({...prev,[roundId]:{...(prev[roundId]||{}),  [type]:{...((prev[roundId]||{})[type]||{}),...data}}}));
  };

  const activeRound=rounds.find(r=>r.id===activeRoundId);
  const activeScores=activeRoundId?(scores[activeRoundId]||{}):{};
  const activeExtras=activeRoundId?(extras[activeRoundId]||{}):{};
  const latestCompleted=rounds.find(r=>r.completed);

  if(loading)return(
    <div style={{minHeight:'100vh',background:'#030806',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',gap:16}}>
      <div style={{fontSize:56,animation:'bounce 1s infinite'}}>⛳</div>
      <div style={{color:'#00e676',fontSize:12,letterSpacing:4,fontWeight:700}}>LOADING...</div>
    </div>
  );

  return(
    <div style={{minHeight:'100vh',background:'#030806',paddingBottom:100}}>
      {profileModal&&<PlayerProfile player={profileModal} rounds={rounds} scores={scores} playerSettings={playerSettings} onClose={()=>setProfileModal(null)}/>}
      {menuOpen&&<HamburgerMenu onClose={()=>setMenuOpen(false)} rounds={rounds} scores={scores} nextRound={nextRound} setNextRound={setNextRound}/>}
      {trashPop&&<div style={{position:'fixed',bottom:100,left:14,right:14,zIndex:990,background:'rgba(20,10,0,.96)',border:'1px solid rgba(255,145,0,.4)',borderRadius:18,padding:'14px 16px',animation:'fadeUp .4s'}}><div style={{fontSize:9,color:'rgba(255,145,0,.5)',letterSpacing:2,fontWeight:700,marginBottom:4}}>🎤 ROAST</div><div style={{fontSize:13,color:'rgba(255,255,255,.75)',lineHeight:1.6,fontStyle:'italic'}}>'{trashPop.line}'</div></div>}
      {toast&&(
        <div style={{position:'fixed',top:16,left:'50%',transform:'translateX(-50%)',zIndex:9999,background:toast.type==='error'?'#c62828':'#00e676',color:toast.type==='error'?'#fff':'#000',padding:'11px 22px',borderRadius:30,fontSize:13,fontWeight:800,boxShadow:'0 8px 32px rgba(0,0,0,.6)',whiteSpace:'nowrap',animation:'slideDown .3s ease',letterSpacing:.5}}>{toast.msg}</div>
      )}

      <header style={{position:'sticky',top:0,zIndex:100,background:'rgba(3,8,6,.97)',backdropFilter:'blur(20px)',borderBottom:'1px solid rgba(0,230,118,.08)',padding:'11px 15px',display:'flex',alignItems:'center',justifyContent:'space-between'}}>
        <button onClick={()=>setMenuOpen(true)} style={{background:'transparent',border:'1px solid rgba(255,255,255,.08)',color:'rgba(255,255,255,.4)',width:36,height:36,borderRadius:10,cursor:'pointer',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',gap:4,flexShrink:0}}>
          <div style={{width:15,height:2,background:'currentColor',borderRadius:1}}/><div style={{width:15,height:2,background:'currentColor',borderRadius:1}}/><div style={{width:15,height:2,background:'currentColor',borderRadius:1}}/>
        </button>
        <div style={{display:'flex',alignItems:'center',gap:10,cursor:'pointer',flex:1}} onClick={()=>setView('home')}>
          <span style={{fontSize:22}}>⛳</span>
          <div>
            <div style={{fontFamily:'Bebas Neue',fontSize:19,letterSpacing:3,color:'#00e676',lineHeight:1}}>THURSDAY CREW</div>
            <div style={{fontSize:8,color:'#1a4a1a',letterSpacing:3,fontWeight:700}}>SOUTH CAROLINA GOLF</div>
          </div>
        </div>
        <div style={{display:'flex',gap:4}}>
          {[{id:'home',i:'🏠'},{id:'setup',i:'🎯'},{id:'stats',i:'📊'},{id:'history',i:'📋'}].map(n=>(
            <button key={n.id} onClick={()=>setView(n.id)} style={{background:view===n.id?'rgba(0,230,118,.12)':'transparent',border:`1px solid ${view===n.id?'rgba(0,230,118,.4)':'rgba(255,255,255,.04)'}`,color:view===n.id?'#00e676':'#444',padding:'7px 10px',borderRadius:8,cursor:'pointer',fontSize:14,transition:'all .2s'}}>{n.i}</button>
          ))}
          {activeRound&&<button onClick={()=>setView('scorecard')} style={{background:'rgba(255,68,68,.15)',border:'1px solid rgba(255,68,68,.5)',color:'#ff4444',padding:'7px 10px',borderRadius:8,cursor:'pointer',fontSize:13,fontWeight:700,animation:'pulse 2s infinite',letterSpacing:.5}}>🔴 LIVE</button>}
        </div>
      </header>

      <div style={{maxWidth:700,margin:'0 auto',padding:'16px 13px'}}>
        {view==='home'&&<HomeView rounds={rounds} scores={scores} playerSettings={playerSettings} activeRound={activeRound} updateHandicap={updateHandicap} setView={setView} setActiveRoundId={setActiveRoundId} nextRound={nextRound} onPlayerClick={p=>setProfileModal(p)}/>}
        {view==='setup'&&<SetupView startRound={startRound} playerSettings={playerSettings}/>}
        {view==='scorecard'&&activeRound&&<ScorecardView round={activeRound} scores={activeScores} teamScores={teamScores[activeRoundId]||[]} extras={activeExtras} updateScore={updateScore} updateTeamScore={updateTeamScore} finishRound={finishRound} updateExtras={updateExtras} playerSettings={playerSettings} rounds={rounds}/>}
        {view==='history'&&<HistoryView rounds={rounds} scores={scores} deleteRound={deleteRound} setActiveRoundId={setActiveRoundId} setView={setView}/>}
        {view==='stats'&&<StatsView rounds={rounds} scores={scores} playerSettings={playerSettings}/>}
        {view==='leaderboard'&&latestCompleted&&<LeaderboardView round={latestCompleted} scores={scores[latestCompleted.id]||{}} teamScores={teamScores[latestCompleted?.id]||[]} playerSettings={playerSettings} setView={setView}/>}
      </div>
    </div>
  );
}

// HOME VIEW
// ══════════════════════════════════════════════
function HomeView({rounds,scores,playerSettings,activeRound,updateHandicap,setView,setActiveRoundId,nextRound,onPlayerClick}){
  const[editHdcp,setEditHdcp]=useState(false);
  const completed=rounds.filter(r=>r.completed);
  const thisMonth=completed.filter(r=>r.date?.startsWith(new Date().toISOString().slice(0,7))).length;

  // Season standings
  const seasonStandings=PLAYERS.map(p=>{
    let wins=0,totalStrokes=0,rounds_played=0,best=null,streak=0,currentStreak=0;
    const sorted=[...completed].sort((a,b)=>a.date>b.date?1:-1);
    sorted.forEach(r=>{
      const s=scores[r.id]?.[p.id];if(!s)return;
      const tot=s.reduce((a,b)=>a+(b||0),0);if(!tot)return;
      totalStrokes+=tot;rounds_played++;
      if(best===null||tot<best)best=tot;
      const allTots=PLAYERS.map(pp=>({id:pp.id,t:(scores[r.id]?.[pp.id]||[]).reduce((a,b)=>a+(b||0),0)})).filter(x=>x.t>0).sort((a,b)=>a.t-b.t);
      if(allTots[0]?.id===p.id){wins++;currentStreak++;}else{streak=Math.max(streak,currentStreak);currentStreak=0;}
    });
    streak=Math.max(streak,currentStreak);
    return{...p,wins,rounds_played,best,streak,avg:rounds_played?Math.round(totalStrokes/rounds_played):null};
  }).sort((a,b)=>b.wins-a.wins);

  const getBest=pid=>seasonStandings.find(p=>p.id===pid)?.best;

  return(
    <div style={{display:'flex',flexDirection:'column',gap:16,animation:'fadeUp .4s ease'}}>
      {/* Hero */}
      <div style={{background:'linear-gradient(160deg,#071407,#0d2a0d,#071407)',border:'1px solid rgba(0,230,118,.15)',borderRadius:22,padding:'24px 20px',overflow:'hidden',position:'relative'}}>
        <div style={{position:'absolute',top:-30,right:-30,fontSize:160,opacity:.04,transform:'rotate(-15deg)'}}>⛳</div>
        <div style={{fontSize:10,color:'#00e676',letterSpacing:4,fontWeight:800,marginBottom:6}}>MOUNT PLEASANT · SC</div>
        <div style={{fontFamily:'Bebas Neue',fontSize:42,letterSpacing:3,color:'#fff',lineHeight:1,marginBottom:2}}>THURSDAY CREW</div>
        <div style={{fontSize:13,color:'rgba(255,255,255,.3)',marginBottom:20}}>Weekly Golf · Est. Every Thursday</div>
        <div style={{display:'flex',gap:10}}>
          {[{n:completed.length,l:'ROUNDS'},{n:thisMonth,l:'THIS MONTH'},{n:seasonStandings[0]?.wins||0,l:`${seasonStandings[0]?.name||''} LEADS`}].map((s,i)=>(
            <div key={i} style={{flex:1,background:'rgba(0,0,0,.4)',borderRadius:14,padding:'12px 8px',textAlign:'center'}}>
              <div style={{fontFamily:'Bebas Neue',fontSize:30,color:'#00e676',lineHeight:1}}>{s.n}</div>
              <div style={{fontSize:9,color:'rgba(255,255,255,.25)',letterSpacing:2,fontWeight:700,marginTop:2}}>{s.l}</div>
            </div>
          ))}
        </div>
      </div>

      {/* Live alert */}
      {activeRound&&(
        <div onClick={()=>{setActiveRoundId(activeRound.id);setView('scorecard');Haptic.light();}} style={{background:'rgba(255,68,68,.08)',border:'1px solid rgba(255,68,68,.3)',borderRadius:16,padding:'15px 16px',cursor:'pointer',display:'flex',alignItems:'center',gap:12}}>
          <div style={{width:10,height:10,borderRadius:'50%',background:'#ff4444',animation:'pulse 1s infinite',flexShrink:0}}/>
          <div style={{flex:1}}>
            <div style={{fontWeight:800,fontSize:14}}>{FORMATS.find(f=>f.id===activeRound.format)?.label} — IN PROGRESS</div>
            <div style={{fontSize:11,color:'rgba(255,255,255,.3)',marginTop:2}}>{activeRound.date} · {COURSES[activeRound.course_id]?.name||'Snee Farm'}</div>
          </div>
          <div style={{color:'#ff4444',fontSize:22,fontWeight:700}}>→</div>
        </div>
      )}

      {/* Season Standings */}

// ══════════════════════════════════════════════
function ScorecardView({round,scores,teamScores,extras,updateScore,updateTeamScore,finishRound,updateExtras,playerSettings,rounds}){
  const[holeIdx,setHoleIdx]=useState(0);
  const[showAll,setShowAll]=useState(false);
  const[holeNotes,setHoleNotes]=useState(()=>{try{return JSON.parse(localStorage.getItem('hn_'+round.id)||'{}')}catch{return{}}});
  const[showNote,setShowNote]=useState(false);
  const[noteText,setNoteText]=useState('');
  const[wolfPick,setWolfPick]=useState({});// {holeIdx: partnerId or 'solo'}
  const[bingo,setBingo]=useState(()=>{try{return JSON.parse(localStorage.getItem('bingo_'+round.id)||'{}')}catch{return{}}});// {holeIdx:{on:pid,closest:pid,in:pid}}
  const[chairman,setChairman]=useState(null);// player id holding chair
  const[chairWins,setChairWins]=useState({});// {pid: count}
  const[mulligans,setMulligans]=useState({ben:0,thomas:0,max:0,luke:0});

  const course=COURSES[round.course_id]||COURSES.snee;
  const holes=course.holes;
  const fmt=round.format;
  const hole=holes[holeIdx];
  const teamCfg=TEAM_CONFIGS.find(t=>t.id===round.team_config);
  const isTeam=['scramble','bestball','nassau','match','bloodsome','vegas','shamble'].includes(fmt)&&round.team_config!=='solo';
  const teamNames=round.team_names||['Team 1','Team 2'];
  const mulligansAllowed=round.mulligans_allowed||0;

  // ── Helpers ──────────────────────────────────
  const getScore=(pid,hi)=>(scores[pid]||[])[hi]||0;
  const getTScore=(ti,hi)=>(teamScores||[])[ti]?.[hi]||0;
  const holesPlayed=isTeam
    ?(teamScores||[]).reduce((mx,t)=>Math.max(mx,t.filter(s=>s>0).length),0)
    :PLAYERS.reduce((mx,p)=>Math.max(mx,(scores[p.id]||[]).filter(s=>s>0).length),0);

  // ── Format-specific running scores ───────────
  const getRunningScore=()=>{
    switch(fmt){
      case 'stroke':{
        return PLAYERS.map(p=>{
          const tp=holes.reduce((a,h,i)=>{const s=getScore(p.id,i);return s>0?a+(s-h.par):a;},0);
          return{...p,display:tpStr(tp),color:tp<0?'#00e676':tp>0?'#ff5252':'#888',sub:'to par'};
        }).sort((a,b)=>a.display==='E'?0:parseInt(a.display)-parseInt(b.display));
      }
      case 'stableford':{
        return PLAYERS.map(p=>{
          const pts=holes.reduce((a,h,i)=>{const s=getScore(p.id,i);return s>0?a+sfPts(s,h.par):a;},0);
          return{...p,display:pts+'pts',color:'#ffd700',sub:'stableford pts'};
        }).sort((a,b)=>parseInt(b.display)-parseInt(a.display));
      }
      case 'skins':{
        const skinOwners=holes.map((_,i)=>{
          const all=PLAYERS.map(p=>({id:p.id,s:getScore(p.id,i)})).filter(x=>x.s>0);
          if(all.length<4)return null;
          const min=Math.min(...all.map(x=>x.s));
          const winners=all.filter(x=>x.s===min);
          return winners.length===1?winners[0].id:null;
        });
        return PLAYERS.map(p=>{
          const sk=skinOwners.filter(x=>x===p.id).length;
          return{...p,display:sk+'🩳',color:sk>0?'#9b59b6':'#555',sub:`$${sk*(round.bet_amount||5)}`};
        }).sort((a,b)=>parseInt(b.display)-parseInt(a.display));
      }
      case 'match':{
        if(!isTeam||!teamCfg||teamCfg.teams.length<2)return PLAYERS.map(p=>({...p,display:'—',color:'#888',sub:''}));
        const t0=teamCfg.teams[0],t1=teamCfg.teams[1];
        let score0=0,score1=0;
        holes.forEach((_,i)=>{
          const s0=isTeam?getTScore(0,i):Math.min(...t0.map(id=>getScore(id,i)).filter(Boolean));
          const s1=isTeam?getTScore(1,i):Math.min(...t1.map(id=>getScore(id,i)).filter(Boolean));
          if(s0>0&&s1>0){if(s0<s1)score0++;else if(s1<s0)score1++;}
        });
        const diff=score0-score1;
        const holesLeft=holes.length-holesPlayed;
        return[
          {id:'team0',name:teamNames[0],color:PLAYERS.find(p=>p.id===t0[0])?.color||'#00e676',emoji:teamNames[0][0],
           display:diff>0?`${diff} UP`:diff<0?`${Math.abs(diff)} DN`:'AS',
           color2:diff>0?'#00e676':diff<0?'#ff5252':'#888',sub:`${holesLeft} holes left`},
          {id:'team1',name:teamNames[1],color:PLAYERS.find(p=>p.id===t1[0])?.color||'#ff9100',emoji:teamNames[1][0],
           display:diff<0?`${Math.abs(diff)} UP`:diff>0?`${diff} DN`:'AS',
           color2:diff<0?'#00e676':diff>0?'#ff5252':'#888',sub:`${holesLeft} holes left`},
        ];
      }
      case 'nassau':{
        if(!teamCfg||teamCfg.teams.length<2)return PLAYERS.map(p=>({...p,display:'—',color:'#888',sub:''}));
        const t0=teamCfg.teams[0],t1=teamCfg.teams[1];
        const getTeamScore=(team,start,end)=>holes.slice(start,end).reduce((a,_,ii)=>{
          const i=start+ii;
          const s=isTeam?getTScore(teamCfg.teams.indexOf(team),i):Math.min(...team.map(id=>getScore(id,i)).filter(x=>x>0)||[0]);
          return s>0?a+s:a;
        },0);
        const f0=getTeamScore(t0,0,9),f1=getTeamScore(t1,0,9);
        const b0=getTeamScore(t0,9,18),b1=getTeamScore(t1,9,18);
        const tot0=f0+b0,tot1=f1+b1;
        const bet=round.bet_amount||5;
        const frontWin=f0<f1?teamNames[0]:f1<f0?teamNames[1]:'TIE';
        const backWin=b0<b1?teamNames[0]:b1<b0?teamNames[1]:'TIE';
        const totWin=tot0<tot1?teamNames[0]:tot1<tot0?teamNames[1]:'TIE';
        return[
          {id:'nassau',name:'Nassau',color:'#ffd700',emoji:'💰',display:`$${bet*3}`,color2:'#ffd700',
           sub:`F:${frontWin} B:${backWin} T:${totWin}`},
        ];
      }
      case 'wolf':{
        const wolfOrder=['ben','thomas','max','luke'];
        const wolfId=wolfOrder[holeIdx%4];
        const wolfPlayer=PLAYERS.find(p=>p.id===wolfId);
        return PLAYERS.map(p=>{
          const tp=holes.reduce((a,h,i)=>{const s=getScore(p.id,i);return s>0?a+(s-h.par):a;},0);
          const isWolf=p.id===wolfId;
          return{...p,display:tpStr(tp),color:isWolf?'#ffd700':tp<0?'#00e676':tp>0?'#ff5252':'#888',sub:isWolf?'🐺 WOLF':''};
        });
      }
      case 'bingo':{
        const pts={};PLAYERS.forEach(p=>{pts[p.id]=0;});
        Object.values(bingo).forEach(h=>{
          if(h.on)pts[h.on]=(pts[h.on]||0)+1;
          if(h.closest)pts[h.closest]=(pts[h.closest]||0)+1;
          if(h.in)pts[h.in]=(pts[h.in]||0)+1;
        });
        return PLAYERS.map(p=>({...p,display:(pts[p.id]||0)+'pts',color:'#ffd700',sub:'bingo pts'})).sort((a,b)=>parseInt(b.display)-parseInt(a.display));
      }
      case 'chairman':{
        return PLAYERS.map(p=>({
          ...p,
          display:(chairWins[p.id]||0)+'',
          color:chairman===p.id?'#ffd700':'#888',
          sub:chairman===p.id?'👑 CHAIRMAN':'holes as chair'
        })).sort((a,b)=>parseInt(b.display)-parseInt(a.display));
      }
      case 'quota':{
        return PLAYERS.map(p=>{
          const hdcp=playerSettings[p.id]??p.defaultHcp;
          const quota=36-Math.min(hdcp,36);
          const pts=holes.reduce((a,h,i)=>{const s=getScore(p.id,i);return s>0?a+sfPts(s,h.par):a;},0);
          const diff=pts-quota;
          return{...p,display:pts+'pts',color:diff>=0?'#00e676':'#ff5252',sub:`quota ${quota} (${diff>=0?'+':''}${diff})`};
        });
      }
      case 'scramble':
      case 'bestball':
      case 'bloodsome':
      case 'shamble':{
        if(!teamCfg)return PLAYERS.map(p=>({...p,display:'—',color:'#888',sub:''}));
        return teamCfg.teams.map((team,ti)=>{
          const tColor=PLAYERS.find(p=>p.id===team[0])?.color||'#00e676';
          const tScores=(teamScores||[])[ti]||[];
          const tp=holes.reduce((a,h,i)=>{const s=tScores[i]||0;return s>0?a+(s-h.par):a;},0);
          return{id:'team'+ti,name:teamNames[ti]||'Team '+(ti+1),color:tColor,emoji:(ti+1)+'',display:tpStr(tp),color2:tp<0?'#00e676':tp>0?'#ff5252':'#888',sub:'to par'};
        }).sort((a,b)=>parseInt(a.display)-parseInt(b.display));
      }
      case 'vegas':{
        if(!teamCfg||teamCfg.teams.length<2)return PLAYERS.map(p=>({...p,display:'—',color:'#888',sub:''}));
        const getVegas=(team,i)=>{
          const ss=team.map(id=>getScore(id,i)).filter(x=>x>0).sort((a,b)=>a-b);
          return ss.length>=2?parseInt(''+ss[0]+ss[1]):0;
        };
        let pts0=0,pts1=0;
        holes.forEach((_,i)=>{
          const v0=getVegas(teamCfg.teams[0],i),v1=getVegas(teamCfg.teams[1],i);
          if(v0>0&&v1>0){if(v0<v1)pts0+=v1-v0;else if(v1<v0)pts1+=v0-v1;}
        });
        return[
          {id:'t0',name:teamNames[0],color:PLAYERS.find(p=>p.id===teamCfg.teams[0][0])?.color||'#00e676',emoji:'1',display:'$'+pts0,color2:pts0>pts1?'#00e676':'#555',sub:'vegas pts'},
          {id:'t1',name:teamNames[1],color:PLAYERS.find(p=>p.id===teamCfg.teams[1][0])?.color||'#ff9100',emoji:'2',display:'$'+pts1,color2:pts1>pts0?'#00e676':'#555',sub:'vegas pts'},
        ];
      }
      default:
        return PLAYERS.map(p=>({...p,display:'—',color:'#888',sub:''}));
    }
  };

  const standings=getRunningScore();
  const wolfOrder=['ben','thomas','max','luke'];
  const currentWolf=fmt==='wolf'?PLAYERS.find(p=>p.id===wolfOrder[holeIdx%4]):null;
  const currentWolfPick=wolfPick[holeIdx];

  const saveBingo=(hi,key,pid)=>{
    const n={...bingo,[hi]:{...(bingo[hi]||{}),[key]:bingo[hi]?.[key]===pid?null:pid}};
    setBingo(n);localStorage.setItem('bingo_'+round.id,JSON.stringify(n));
  };

  const saveNote=()=>{
    const n={...holeNotes,[holeIdx]:noteText};
    setHoleNotes(n);localStorage.setItem('hn_'+round.id,JSON.stringify(n));
    setShowNote(false);setNoteText('');
  };

  const handleChairman=(winner)=>{
    if(!chairman){setChairman(winner);return;}
    if(winner!==chairman){
      setChairWins(w=>({...w,[chairman]:(w[chairman]||0)+1}));
      setChairman(winner);
    } else {
      setChairWins(w=>({...w,[chairman]:(w[chairman]||0)+1}));
    }
  };

  // ── Format descriptions shown in header ──────
  const FMT_TIPS={
    stroke:'Lowest total strokes wins.',
    scramble:'Pick the best team shot each time. Enter ONE team score per hole.',
    bestball:'Each player plays own ball. Best score on your team counts.',
    stableford:'Eagle=4pts, Birdie=3, Par=2, Bogey=1, Double+=0. Most points wins.',
    nassau:'Three bets: Front 9, Back 9, Total 18. Lower score wins each.',
    skins:'Lowest score wins the hole outright — tied holes carry over.',
    match:'Win holes not strokes. Most holes won wins the match.',
    wolf:'🐺 Rotating wolf picks a partner after seeing drives — or goes solo for double.',
    bingo:'3 pts per hole: 🅱 First on green · 🅱 Closest to pin · 🅱 First in hole.',
    chairman:'Low score on hole 1 is Chairman. Beat them to take the throne.',
    bloodsome:'Like scramble but you MUST use the worst drive. Tough format.',
    vegas:'Partners combine scores into a 2-digit number. Lower number wins.',
    quota:'Your quota = 36 minus handicap. Beat it with Stableford points.',
    shamble:'All tee off, pick best drive, then each plays own ball in.',
  };

  return(
    <div style={{display:'flex',flexDirection:'column',gap:11,animation:'fadeUp .3s ease'}}>

      {/* Format header */}
      <div style={{background:'linear-gradient(135deg,rgba(0,230,118,.08),rgba(0,200,83,.02))',border:'1px solid rgba(0,230,118,.15)',borderRadius:18,padding:'13px 15px'}}>
        <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:6}}>
          <span style={{fontSize:24}}>{FORMATS.find(f=>f.id===fmt)?.icon}</span>
          <div style={{flex:1}}>
            <div style={{fontFamily:'Bebas Neue',fontSize:19,letterSpacing:2}}>{FORMATS.find(f=>f.id===fmt)?.label}</div>
            <div style={{fontSize:9,color:'rgba(255,255,255,.2)',marginTop:1}}>{round.date} · {course.name} · {round.tees?.toUpperCase()}</div>
          </div>
          <div style={{background:'#00e676',color:'#000',borderRadius:20,padding:'3px 11px',fontSize:12,fontWeight:900}}>{holesPlayed}/18</div>
        </div>
        <div style={{fontSize:10,color:'rgba(0,230,118,.6)',lineHeight:1.5,background:'rgba(0,230,118,.06)',borderRadius:8,padding:'6px 10px'}}>
          {FMT_TIPS[fmt]||''}
        </div>
      </div>

      {/* Weather */}
      <WeatherWidget lat={course.lat} lon={course.lon} courseName={course.name}/>

      {/* Wolf indicator */}
      {fmt==='wolf'&&currentWolf&&(
        <div style={{background:'rgba(255,215,0,.08)',border:'1px solid rgba(255,215,0,.3)',borderRadius:14,padding:'12px 14px'}}>
          <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:currentWolfPick?0:10}}>
            <span style={{fontSize:22}}>🐺</span>
            <div style={{flex:1}}><span style={{fontWeight:800,color:currentWolf.color}}>{currentWolf.name}</span><span style={{color:'rgba(255,255,255,.4)',fontSize:13}}> is the Wolf on hole {hole.hole}</span></div>
          </div>
          {!currentWolfPick&&(
            <div>
              <div style={{fontSize:10,color:'rgba(255,215,0,.5)',letterSpacing:2,fontWeight:700,marginBottom:7}}>WOLF — PICK A PARTNER OR GO SOLO:</div>
              <div style={{display:'flex',gap:6,flexWrap:'wrap'}}>
                {PLAYERS.filter(p=>p.id!==currentWolf.id).map(p=>(
                  <button key={p.id} onClick={()=>setWolfPick(w=>({...w,[holeIdx]:p.id}))} style={{background:`${p.color}22`,border:`1px solid ${p.color}55`,color:p.color,padding:'7px 14px',borderRadius:20,cursor:'pointer',fontSize:12,fontWeight:700}}>{p.name}</button>
                ))}
                <button onClick={()=>setWolfPick(w=>({...w,[holeIdx]:'solo'}))} style={{background:'rgba(255,215,0,.15)',border:'1px solid rgba(255,215,0,.4)',color:'#ffd700',padding:'7px 14px',borderRadius:20,cursor:'pointer',fontSize:12,fontWeight:700}}>🐺 GO SOLO (2x)</button>
              </div>
            </div>
          )}
          {currentWolfPick&&<div style={{fontSize:12,color:'#ffd700',fontWeight:700}}>{currentWolfPick==='solo'?'🐺 Wolf going SOLO — double points!':'Wolf partnered with '+PLAYERS.find(p=>p.id===currentWolfPick)?.name}</div>}
        </div>
      )}

      {/* Live standings */}
      <div style={{display:'flex',gap:6,overflowX:'auto',paddingBottom:2}}>
        {standings.map((p,i)=>(
          <div key={p.id||i} style={{flex:'0 0 auto',display:'flex',flexDirection:'column',alignItems:'center',gap:3,background:'rgba(255,255,255,.04)',border:`1px solid ${i===0?p.color+'44':'rgba(255,255,255,.06)'}`,borderRadius:12,padding:'9px 11px',minWidth:72}}>
            <div style={{width:28,height:28,borderRadius:'50%',background:p.color,display:'flex',alignItems:'center',justifyContent:'center',fontWeight:900,fontSize:12,color:'#000'}}>{p.emoji||p.name?.[0]}</div>
            <div style={{fontWeight:900,fontSize:14,color:p.color2||p.color}}>{p.display}</div>
            {p.sub&&<div style={{fontSize:8,color:'rgba(255,255,255,.25)',textAlign:'center',letterSpacing:.5}}>{p.sub}</div>}
          </div>
        ))}
      </div>

      {/* Hole navigation */}
      <div style={{background:'rgba(255,255,255,.04)',border:'1px solid rgba(255,255,255,.06)',borderRadius:15,padding:'12px 14px',display:'flex',alignItems:'center',justifyContent:'space-between'}}>
        <button onClick={()=>{setHoleIdx(Math.max(0,holeIdx-1));Haptic.light();}} disabled={holeIdx===0} style={{background:'rgba(255,255,255,.06)',border:'none',color:'#fff',width:40,height:40,borderRadius:11,cursor:'pointer',fontSize:22,opacity:holeIdx===0?.3:1}}>‹</button>
        <div style={{textAlign:'center'}}>
          <div style={{display:'flex',gap:8,alignItems:'baseline',justifyContent:'center'}}>
            <span style={{fontFamily:'Bebas Neue',fontSize:34,color:'#ffd700',lineHeight:1}}>#{hole.hole}</span>
            <span style={{fontSize:18,color:'#00e676',fontWeight:800}}>Par {hole.par}</span>
          </div>
          <div style={{fontSize:10,color:'rgba(255,255,255,.2)',marginTop:1}}>{hole.yards} yds · HCP Stroke {hole.hcp}</div>
          {holeNotes[holeIdx]&&<div style={{fontSize:9,color:'#ffd700',marginTop:2,fontStyle:'italic'}}>📝 {holeNotes[holeIdx]}</div>}
        </div>
        <button onClick={()=>{setHoleIdx(Math.min(holes.length-1,holeIdx+1));Haptic.light();}} disabled={holeIdx===holes.length-1} style={{background:'rgba(255,255,255,.06)',border:'none',color:'#fff',width:40,height:40,borderRadius:11,cursor:'pointer',fontSize:22,opacity:holeIdx===holes.length-1?.3:1}}>›</button>
      </div>

      {/* ── BINGO BANGO BONGO ── */}
      {fmt==='bingo'&&(
        <div style={{background:'rgba(255,215,0,.06)',border:'1px solid rgba(255,215,0,.2)',borderRadius:16,padding:'14px 15px'}}>
          <div style={{fontFamily:'Bebas Neue',fontSize:17,letterSpacing:2,color:'#ffd700',marginBottom:10}}>HOLE {hole.hole} — CLAIM POINTS</div>
          {[{key:'on',label:'🅱 BINGO — First ball on green',icon:'🟢'},{key:'closest',label:'🅱 BANGO — Closest to pin',icon:'📍'},{key:'in',label:'🅱 BONGO — First to hole out',icon:'🏁'}].map(({key,label,icon})=>(
            <div key={key} style={{marginBottom:10}}>
              <div style={{fontSize:10,color:'rgba(255,255,255,.4)',letterSpacing:1,fontWeight:700,marginBottom:6}}>{label}</div>
              <div style={{display:'flex',gap:6}}>
                {PLAYERS.map(p=>(
                  <button key={p.id} onClick={()=>saveBingo(holeIdx,key,p.id)} style={{flex:1,background:bingo[holeIdx]?.[key]===p.id?`${p.color}33`:'rgba(255,255,255,.04)',border:`1px solid ${bingo[holeIdx]?.[key]===p.id?p.color:'rgba(255,255,255,.08)'}`,color:bingo[holeIdx]?.[key]===p.id?p.color:'#555',borderRadius:10,padding:'8px 4px',cursor:'pointer',fontSize:11,fontWeight:700,transition:'all .15s'}}>
                    {bingo[holeIdx]?.[key]===p.id?'✓ ':''}{p.name}
                  </button>
                ))}
              </div>
            </div>
          ))}
        </div>
      )}

      {/* ── CHAIRMAN ── */}
      {fmt==='chairman'&&(
        <div style={{background:'rgba(255,215,0,.06)',border:'1px solid rgba(255,215,0,.2)',borderRadius:16,padding:'14px 15px'}}>
          <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:10}}>
            <span style={{fontSize:22}}>👑</span>
            <div>
              <div style={{fontFamily:'Bebas Neue',fontSize:17,letterSpacing:2,color:'#ffd700'}}>
                {chairman?'CHAIRMAN: '+PLAYERS.find(p=>p.id===chairman)?.name:'NO CHAIRMAN YET'}
              </div>
              <div style={{fontSize:10,color:'rgba(255,255,255,.3)'}}>Lowest score takes/defends the throne</div>
            </div>
          </div>
          <div style={{fontSize:10,color:'rgba(255,255,255,.4)',letterSpacing:1,fontWeight:700,marginBottom:6}}>TAP WINNER OF HOLE {hole.hole}:</div>
          <div style={{display:'flex',gap:6}}>
            {PLAYERS.map(p=>(
              <button key={p.id} onClick={()=>handleChairman(p.id)} style={{flex:1,background:`${p.color}22`,border:`1px solid ${p.color}55`,color:p.color,borderRadius:10,padding:'10px 4px',cursor:'pointer',fontSize:11,fontWeight:700}}>
                {chairman===p.id?'👑 ':''}{p.name}
                {chairWins[p.id]?<div style={{fontSize:9,opacity:.7}}>{chairWins[p.id]} holes</div>:null}
              </button>
            ))}
          </div>
        </div>
      )}

      {/* ── TEAM SCORE INPUTS (Scramble, Bestball team total, Bloodsome, Shamble) ── */}
      {(fmt==='scramble'||fmt==='bloodsome')&&isTeam&&teamCfg&&(
        <div style={{display:'flex',flexDirection:'column',gap:8}}>
          {teamCfg.teams.map((team,ti)=>{
            const tClr=PLAYERS.find(p=>p.id===team[0])?.color||'#00e676';
            const tSc=(teamScores||[])[ti]?.[holeIdx]||null;
            const sn=tSc?scoreName(tSc,hole.par):null;
            return(
              <div key={ti} style={{background:'rgba(255,255,255,.04)',borderRadius:14,padding:'14px 15px',borderLeft:'3px solid '+tClr}}>
                <div style={{display:'flex',alignItems:'center',justifyContent:'space-between'}}>
                  <div>
                    <div style={{fontWeight:900,fontSize:16,color:tClr,marginBottom:3}}>{teamNames[ti]||'Team '+(ti+1)}</div>
                    <div style={{fontSize:10,color:'rgba(255,255,255,.3)',marginBottom:4}}>{team.map(id=>PLAYERS.find(p=>p.id===id)?.name).join(', ')}</div>
                    {sn&&<div style={{fontSize:12,color:sn.c,fontWeight:700}}>{sn.l}</div>}
                  </div>
                  <div style={{display:'flex',alignItems:'center',gap:6}}>
                    <button onPointerDown={()=>updateTeamScore&&updateTeamScore(round.id,ti,holeIdx,(tSc||hole.par)-1)} style={{background:'rgba(255,255,255,.06)',border:'none',color:'#fff',width:38,height:44,borderRadius:10,cursor:'pointer',fontSize:24,display:'flex',alignItems:'center',justifyContent:'center',userSelect:'none'}}>−</button>
                    <input type="number" min={1} max={15} value={tSc||''} placeholder={hole.par} onChange={e=>updateTeamScore&&updateTeamScore(round.id,ti,holeIdx,e.target.value)} style={{background:'rgba(0,0,0,.7)',border:'2px solid '+tClr,color:'#ffd700',width:54,height:50,textAlign:'center',fontSize:30,fontWeight:900,borderRadius:10,outline:'none'}}/>
                    <button onPointerDown={()=>updateTeamScore&&updateTeamScore(round.id,ti,holeIdx,(tSc||hole.par)+1)} style={{background:'rgba(255,255,255,.06)',border:'none',color:'#fff',width:38,height:44,borderRadius:10,cursor:'pointer',fontSize:24,display:'flex',alignItems:'center',justifyContent:'center',userSelect:'none'}}>+</button>
                  </div>
                </div>
              </div>
            );
          })}
        </div>
      )}

      {/* ── INDIVIDUAL SCORE INPUTS (all other formats) ── */}
      {fmt!=='bingo'&&fmt!=='chairman'&&fmt!=='scramble'&&fmt!=='bloodsome'&&(
        <div style={{display:'flex',flexDirection:'column',gap:8}}>
          {PLAYERS.map(p=>{
            const sc=(scores[p.id]||[])[holeIdx]||null;
            const sn=sc?scoreName(sc,hole.par):null;
            const hdcp=playerSettings[p.id]??p.defaultHcp;
            const strokes=Math.floor(hdcp/18)+(hole.hcp<=hdcp%18?1:0);
            const netSc=sc?sc-strokes:null;
            // For bestball/shamble/vegas show individual scores but highlight best per team
            let isBest=false;
            if((fmt==='bestball'||fmt==='shamble')&&isTeam&&teamCfg){
              const myTeamIdx=teamCfg.teams.findIndex(t=>t.includes(p.id));
              if(myTeamIdx>=0){
                const teamMembers=teamCfg.teams[myTeamIdx];
                const teamBest=Math.min(...teamMembers.map(id=>(scores[id]||[])[holeIdx]).filter(x=>x>0));
                isBest=sc===teamBest&&sc>0;
              }
            }
            // Vegas: show combined number
            let vegasNum='';
            if(fmt==='vegas'&&isTeam&&teamCfg){
              const myTeamIdx=teamCfg.teams.findIndex(t=>t.includes(p.id));
              const partner=teamCfg.teams[myTeamIdx]?.find(id=>id!==p.id);
              const partnerSc=(scores[partner]||[])[holeIdx]||0;
              if(sc&&partnerSc){
                const combined=[sc,partnerSc].sort((a,b)=>a-b);
                vegasNum='→ '+combined[0]+''+combined[1];
              }
            }
            return(
              <div key={p.id} style={{background:'rgba(255,255,255,.04)',borderRadius:14,padding:'12px 14px',borderLeft:`3px solid ${isBest?'#ffd700':p.color}`,position:'relative',boxShadow:isBest?'0 0 12px rgba(255,215,0,.2)':'none'}}>
                {isBest&&<div style={{position:'absolute',top:5,right:8,fontSize:9,color:'#ffd700',fontWeight:800}}>⭐ BEST</div>}
                <div style={{display:'flex',alignItems:'center',justifyContent:'space-between'}}>
                  <div style={{display:'flex',alignItems:'center',gap:10}}>
                    <div style={{width:36,height:36,borderRadius:'50%',background:p.color,display:'flex',alignItems:'center',justifyContent:'center',fontWeight:900,fontSize:15,color:'#000',flexShrink:0}}>{p.emoji}</div>
                    <div>
                      <div style={{fontWeight:900,fontSize:14,color:p.color}}>{p.name}</div>
                      {sn&&<div style={{fontSize:11,color:sn.c,fontWeight:700,marginTop:1}}>{sn.l}</div>}
                      {sc&&strokes>0&&<div style={{fontSize:9,color:'rgba(255,255,255,.2)'}}>Net {netSc} ({strokes} stroke{strokes>1?'s':''})</div>}
                      {vegasNum&&<div style={{fontSize:10,color:'#ffd700',fontWeight:700}}>{vegasNum}</div>}
                    </div>
                  </div>
                  <div style={{display:'flex',alignItems:'center',gap:6}}>
                    <button onPointerDown={()=>updateScore(round.id,p.id,holeIdx,(sc||hole.par)-1)} style={{background:'rgba(255,255,255,.06)',border:'none',color:'#fff',width:36,height:42,borderRadius:10,cursor:'pointer',fontSize:22,display:'flex',alignItems:'center',justifyContent:'center',userSelect:'none'}}>−</button>
                    <input type="number" min={1} max={15} value={sc||''} placeholder={hole.par}
                      onChange={e=>updateScore(round.id,p.id,holeIdx,e.target.value)}
                      style={{background:'rgba(0,0,0,.7)',border:`2px solid ${sc?p.color:'rgba(255,255,255,.1)'}`,color:'#ffd700',width:52,height:48,textAlign:'center',fontSize:28,fontWeight:900,borderRadius:10,outline:'none'}}/>
                    <button onPointerDown={()=>updateScore(round.id,p.id,holeIdx,(sc||hole.par)+1)} style={{background:'rgba(255,255,255,.06)',border:'none',color:'#fff',width:36,height:42,borderRadius:10,cursor:'pointer',fontSize:22,display:'flex',alignItems:'center',justifyContent:'center',userSelect:'none'}}>+</button>
                  </div>
                </div>
                {/* Mulligan button */}
                {mulligansAllowed>0&&(
                  <button onClick={()=>{if(mulligans[p.id]<mulligansAllowed){setMulligans(m=>({...m,[p.id]:(m[p.id]||0)+1}));Haptic.medium();}}} disabled={mulligans[p.id]>=mulligansAllowed}
                    style={{marginTop:7,background:'rgba(255,145,0,.08)',border:'1px solid rgba(255,145,0,.22)',color:'#ff9100',padding:'4px 10px',borderRadius:20,cursor:'pointer',fontSize:10,fontWeight:700,opacity:mulligans[p.id]>=mulligansAllowed?.4:1}}>
                    🍀 MULLIGAN ({mulligansAllowed-(mulligans[p.id]||0)} left)
                  </button>
                )}
              </div>
            );
          })}
        </div>
      )}

      {/* Nassau running breakdown */}
      {fmt==='nassau'&&isTeam&&teamCfg&&teamCfg.teams.length>=2&&(
        <div style={{background:'rgba(255,215,0,.06)',border:'1px solid rgba(255,215,0,.2)',borderRadius:14,padding:'13px 15px'}}>
          <div style={{fontFamily:'Bebas Neue',fontSize:16,letterSpacing:2,color:'#ffd700',marginBottom:10}}>💰 NASSAU RUNNING · ${round.bet_amount||5} EACH</div>
          {[{label:'FRONT 9',start:0,end:9},{label:'BACK 9',start:9,end:18},{label:'TOTAL 18',start:0,end:18}].map(({label,start,end})=>{
            const t0scores=(teamScores||[])[0]?.slice(start,end)||[];
            const t1scores=(teamScores||[])[1]?.slice(start,end)||[];
            const s0=t0scores.reduce((a,x)=>a+(x||0),0);
            const s1=t1scores.reduce((a,x)=>a+(x||0),0);
            const winner=s0>0&&s1>0?(s0<s1?teamNames[0]:s0>s1?teamNames[1]:'TIE'):'—';
            const clr=winner===teamNames[0]?(PLAYERS.find(p=>p.id===teamCfg.teams[0][0])?.color||'#00e676'):winner===teamNames[1]?(PLAYERS.find(p=>p.id===teamCfg.teams[1][0])?.color||'#ff9100'):'#888';
            return(
              <div key={label} style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:7,padding:'7px 10px',background:'rgba(0,0,0,.3)',borderRadius:10}}>
                <div style={{fontSize:10,color:'rgba(255,255,255,.4)',fontWeight:700,letterSpacing:1}}>{label}</div>
                <div style={{fontSize:12,fontWeight:800,color:clr}}>{winner}</div>
                <div style={{fontSize:10,color:'rgba(255,255,255,.3)'}}>{s0>0?s0:'—'} vs {s1>0?s1:'—'}</div>
              </div>
            );
          })}
        </div>
      )}

      {/* Skins tracker */}
      {fmt==='skins'&&(
        <div style={{background:'rgba(155,89,182,.06)',border:'1px solid rgba(155,89,182,.2)',borderRadius:14,padding:'13px 15px'}}>
          <div style={{fontFamily:'Bebas Neue',fontSize:16,letterSpacing:2,color:'#9b59b6',marginBottom:10}}>💀 SKINS · ${round.bet_amount||5}/SKIN</div>
          <div style={{display:'flex',gap:8}}>
            {PLAYERS.map(p=>{
              const sk=holes.filter((_,i)=>{const all=PLAYERS.map(pp=>getScore(pp.id,i)).filter(x=>x>0);if(all.length<4)return false;const min=Math.min(...all);return getScore(p.id,i)===min&&all.filter(x=>x===min).length===1;}).length;
              return(
                <div key={p.id} style={{flex:1,textAlign:'center',background:'rgba(0,0,0,.3)',borderRadius:10,padding:'10px 4px'}}>
                  <div style={{fontSize:18,marginBottom:3}}>{p.avatar}</div>
                  <div style={{fontFamily:'Bebas Neue',fontSize:22,color:sk>0?'#9b59b6':'#333'}}>{sk}</div>
                  <div style={{fontSize:9,color:'rgba(255,255,255,.2)',letterSpacing:1,fontWeight:700}}>SKINS</div>
                  <div style={{fontSize:11,color:'#00e676',fontWeight:900}}>${sk*(round.bet_amount||5)}</div>
                </div>
              );
            })}
          </div>
        </div>
      )}

      {/* Quick actions */}
      <div style={{display:'flex',gap:7}}>
        {fmt!=='bingo'&&fmt!=='chairman'&&fmt!=='scramble'&&fmt!=='bloodsome'&&(
          <button style={{flex:1,background:'rgba(255,255,255,.04)',border:'1px solid rgba(255,255,255,.07)',color:'rgba(255,255,255,.4)',padding:'10px',borderRadius:11,cursor:'pointer',fontSize:11,fontWeight:700,letterSpacing:1}} onClick={()=>PLAYERS.forEach(p=>{if(!getScore(p.id,holeIdx))updateScore(round.id,p.id,holeIdx,hole.par);})}>⚡ FILL PAR</button>
        )}
        <button onClick={()=>setShowNote(!showNote)} style={{background:holeNotes[holeIdx]?'rgba(255,215,0,.1)':'rgba(255,255,255,.04)',border:'1px solid '+(holeNotes[holeIdx]?'rgba(255,215,0,.3)':'rgba(255,255,255,.06)'),color:holeNotes[holeIdx]?'#ffd700':'rgba(255,255,255,.3)',padding:'10px 14px',borderRadius:11,cursor:'pointer',fontSize:13}}>📝</button>
      </div>

      {/* Note input */}
      {showNote&&(
        <div style={{background:'rgba(255,215,0,.05)',border:'1px solid rgba(255,215,0,.18)',borderRadius:14,padding:'12px 14px'}}>
          <div style={{fontSize:9,color:'rgba(255,215,0,.5)',letterSpacing:2,fontWeight:700,marginBottom:6}}>HOLE {hole.hole} NOTE</div>
          <input value={noteText||holeNotes[holeIdx]||''} onChange={e=>setNoteText(e.target.value)} placeholder='e.g. Luke almost aced this...' style={{width:'100%',background:'rgba(0,0,0,.4)',border:'1px solid rgba(255,215,0,.2)',color:'#fff',padding:'9px 12px',borderRadius:9,fontSize:13,marginBottom:7}}/>
          <div style={{display:'flex',gap:7}}>
            <button onClick={saveNote} style={{flex:1,background:'rgba(255,215,0,.1)',border:'1px solid rgba(255,215,0,.22)',color:'#ffd700',borderRadius:9,padding:'8px',cursor:'pointer',fontSize:11,fontWeight:700}}>💾 Save</button>
            {holeNotes[holeIdx]&&<button onClick={()=>{const n={...holeNotes};delete n[holeIdx];setHoleNotes(n);localStorage.setItem('hn_'+round.id,JSON.stringify(n));setShowNote(false);}} style={{background:'rgba(255,68,68,.08)',border:'1px solid rgba(255,68,68,.18)',color:'#ff5252',borderRadius:9,padding:'8px 12px',cursor:'pointer',fontSize:12}}>🗑️</button>}
          </div>
        </div>
      )}

      {/* Hole progress dots */}
      <div style={{display:'flex',gap:4,justifyContent:'center',flexWrap:'wrap',padding:'4px 0'}}>
        {holes.map((_,i)=>{
          const allDone=PLAYERS.every(p=>getScore(p.id,i)>0)||(isTeam&&(teamScores||[]).every(t=>(t[i]||0)>0));
          return(
            <div key={i} onClick={()=>{setHoleIdx(i);Haptic.light();}} style={{width:14,height:14,borderRadius:'50%',background:i===holeIdx?'#ffd700':allDone?'#00e676':holeNotes[i]?'rgba(255,215,0,.4)':'rgba(255,255,255,.08)',cursor:'pointer',transform:i===holeIdx?'scale(1.5)':'scale(1)',boxShadow:i===holeIdx?'0 0 8px #ffd700':'none',transition:'all .2s'}}/>
          );
        })}
      </div>

      <button onClick={()=>setShowAll(!showAll)} style={{background:'transparent',border:'1px solid rgba(255,255,255,.06)',color:'rgba(255,255,255,.25)',padding:'10px',borderRadius:11,cursor:'pointer',fontSize:11,fontWeight:700,letterSpacing:1}}>
        {showAll?'▲ HIDE SCORECARD':'▼ FULL SCORECARD'}
      </button>
      {showAll&&<FullScorecard scores={scores} holes={holes}/>}

      <button onClick={()=>{if(confirm('Finish and save this round?'))finishRound(round.id);}} style={{background:'linear-gradient(135deg,#7a1010,#c0392b)',color:'#fff',border:'none',borderRadius:16,padding:'18px 24px',fontSize:20,fontWeight:900,cursor:'pointer',letterSpacing:3,fontFamily:'Bebas Neue',marginTop:4}}>
        🏁 FINISH ROUND
      </button>
    </div>
  );
}
function FullScorecard({scores,holes}){
  return(
    <div style={{background:'rgba(0,0,0,.5)',border:'1px solid rgba(255,255,255,.05)',borderRadius:16,padding:12,overflowX:'auto'}}>
      {[0,1].map(half=>{
        const hs=holes.slice(half*9,half*9+9);const pt=hs.reduce((a,h)=>a+h.par,0);
        return(
          <div key={half} style={{marginBottom:half===0?14:0}}>
            <div style={{fontSize:9,fontWeight:800,letterSpacing:3,color:'#00e676',marginBottom:8}}>{half===0?'FRONT 9':'BACK 9'}</div>
            <table style={{width:'100%',borderCollapse:'collapse',fontSize:11}}>
              <thead>
                <tr>
                  <th style={{padding:'4px 5px',textAlign:'left',color:'rgba(255,255,255,.25)',borderBottom:'1px solid rgba(255,255,255,.05)'}}>PLR</th>
                  {hs.map(h=><th key={h.hole} style={{padding:'4px 4px',textAlign:'center',color:'rgba(255,255,255,.25)',borderBottom:'1px solid rgba(255,255,255,.05)',fontSize:10}}>{h.hole}</th>)}
                  <th style={{padding:'4px 4px',textAlign:'center',color:'rgba(255,255,255,.25)',borderBottom:'1px solid rgba(255,255,255,.05)'}}>T</th>
                </tr>
                <tr>
                  <th style={{padding:'2px 5px',textAlign:'left',color:'#00e67655',fontSize:10}}>PAR</th>
                  {hs.map(h=><th key={h.hole} style={{padding:'2px 4px',textAlign:'center',color:'#00e67655',fontSize:10}}>{h.par}</th>)}
                  <th style={{padding:'2px 4px',textAlign:'center',color:'#00e67655',fontSize:10}}>{pt}</th>
                </tr>
              </thead>
              <tbody>{PLAYERS.map(p=>{
                const ps=(scores[p.id]||[]).slice(half*9,half*9+9);const tot=ps.reduce((a,b)=>a+(b||0),0);
                return(<tr key={p.id}>
                  <td style={{padding:'4px 5px',color:p.color,fontWeight:800,fontSize:11}}>{p.name}</td>
                  {hs.map((h,i)=>{const sc=ps[i];const d=sc>0?sc-h.par:null;const col=d!==null?scColor(d):{bg:'transparent',c:'rgba(255,255,255,.15)'};
                    return<td key={h.hole} style={{padding:'3px 3px',textAlign:'center',background:col.bg,color:col.c,fontWeight:d!==null?800:400,borderRadius:4,fontSize:11}}>{sc||'—'}</td>;})}
                  <td style={{padding:'4px 4px',textAlign:'center',fontWeight:900,color:'#fff',fontSize:12}}>{tot||'—'}</td>
                </tr>);})}
              </tbody>
            </table>
          </div>
        );
      })}
    </div>
  );
}

// STATS VIEW
// ══════════════════════════════════════════════
function StatsView({rounds,scores,playerSettings}){
  const completed=rounds.filter(r=>r.completed);
  const[selectedPlayer,setSelectedPlayer]=useState('all');

  const getStats=pid=>{
    let birdies=0,eagles=0,pars=0,bogeys=0,doubles=0,aces=0,best=null,worst=null,rp=0,totalStrokes=0,holesPlayed=0;
    for(const r of completed){
      const s=scores[r.id]?.[pid];if(!s)continue;
      const course=COURSES[r.course_id]||COURSES.snee;
      let roundTotal=0,played=0;
      s.forEach((sc,i)=>{if(sc>0&&course.holes[i]){const d=sc-course.holes[i].par;if(sc===1)aces++;else if(d<=-2)eagles++;else if(d===-1)birdies++;else if(d===0)pars++;else if(d===1)bogeys++;else doubles++;roundTotal+=sc;played++;}});
      if(roundTotal>0){totalStrokes+=roundTotal;rp++;holesPlayed+=played;if(best===null||roundTotal<best)best=roundTotal;if(worst===null||roundTotal>worst)worst=roundTotal;}
    }
    const courseRecords={};
    completed.forEach(r=>{const s=scores[r.id]?.[pid];if(!s)return;const t=s.reduce((a,b)=>a+(b||0),0);if(t>0){if(!courseRecords[r.course_id]||t<courseRecords[r.course_id])courseRecords[r.course_id]=t;}});
    return{birdies,eagles,pars,bogeys,doubles,aces,best,worst,rp,avg:rp?Math.round(totalStrokes/rp):null,courseRecords};
  };

  // Head to head matrix
  const h2h=(p1,p2)=>{let w1=0,w2=0,ties=0;
    completed.forEach(r=>{const s1=scores[r.id]?.[p1];const s2=scores[r.id]?.[p2];if(!s1||!s2)return;const t1=s1.reduce((a,b)=>a+(b||0),0);const t2=s2.reduce((a,b)=>a+(b||0),0);if(!t1||!t2)return;if(t1<t2)w1++;else if(t2<t1)w2++;else ties++;});
    return{w1,w2,ties};
  };

  // Score trend (last 6 rounds)
  const getTrend=pid=>completed.slice(0,6).reverse().map(r=>{const s=scores[r.id]?.[pid];return s?s.reduce((a,b)=>a+(b||0),0):null;});

  // Most improved
  const getMostImproved=()=>{
    return PLAYERS.map(p=>{
      const rs=completed.map(r=>{const s=scores[r.id]?.[p.id];return s?s.reduce((a,b)=>a+(b||0),0):null;}).filter(Boolean);
      if(rs.length<2)return{...p,improvement:0};
      const improvement=rs[0]-rs[rs.length-1];
      return{...p,improvement};
    }).sort((a,b)=>b.improvement-a.improvement)[0];
  };

  const improved=getMostImproved();

  // Trash talk for worst round
  const getTrashTalk=()=>{
    let worst=null,worstPlayer=null;
    completed.slice(0,3).forEach(r=>{
      PLAYERS.forEach(p=>{const s=scores[r.id]?.[p.id];if(!s)return;const t=s.reduce((a,b)=>a+(b||0),0);if(t>0&&(worst===null||t>worst)){worst=t;worstPlayer={...p,score:t};}});
    });
    if(!worstPlayer)return null;
    const line=TRASH_TALK[Math.floor(Math.random()*TRASH_TALK.length)](worstPlayer.name,worstPlayer.score);
    return{player:worstPlayer,line};
  };
  const [trash]=useState(()=>getTrashTalk());

  if(completed.length===0)return(
    <div style={{display:'flex',flexDirection:'column',gap:16,animation:'fadeUp .4s ease'}}>
      <div style={{fontFamily:'Bebas Neue',fontSize:30,letterSpacing:3,color:'#00e676'}}>STATS & RECORDS</div>
      <div style={{textAlign:'center',color:'rgba(255,255,255,.2)',padding:60,fontSize:16}}>No completed rounds yet 🏌️<br/><span style={{fontSize:13,color:'rgba(255,255,255,.1)'}}>Finish a round to see your stats</span></div>
    </div>
  );

  return(
    <div style={{display:'flex',flexDirection:'column',gap:14,animation:'fadeUp .4s ease'}}>
      <div style={{fontFamily:'Bebas Neue',fontSize:30,letterSpacing:3,color:'#00e676'}}>STATS & RECORDS</div>

      {/* Player selector */}
      <div style={{display:'flex',gap:6,overflowX:'auto'}}>
        <button onClick={()=>setSelectedPlayer('all')} style={{background:selectedPlayer==='all'?'rgba(0,230,118,.12)':'transparent',border:`1px solid ${selectedPlayer==='all'?'rgba(0,230,118,.35)':'rgba(255,255,255,.06)'}`,color:selectedPlayer==='all'?'#00e676':'#444',padding:'7px 14px',borderRadius:20,cursor:'pointer',fontSize:11,fontWeight:700,whiteSpace:'nowrap',flexShrink:0}}>ALL PLAYERS</button>
        {PLAYERS.map(p=><button key={p.id} onClick={()=>setSelectedPlayer(p.id)} style={{background:selectedPlayer===p.id?`${p.color}20`:'transparent',border:`1px solid ${selectedPlayer===p.id?p.color+'55':'rgba(255,255,255,.06)'}`,color:selectedPlayer===p.id?p.color:'#444',padding:'7px 14px',borderRadius:20,cursor:'pointer',fontSize:11,fontWeight:700,whiteSpace:'nowrap',flexShrink:0}}>{p.name}</button>)}
      </div>

      {/* Player stat cards */}
      {PLAYERS.filter(p=>selectedPlayer==='all'||p.id===selectedPlayer).map(p=>{
        const st=getStats(p.id);const trend=getTrend(p.id);
        return(
          <div key={p.id} style={{background:'rgba(255,255,255,.03)',border:`1px solid ${p.color}18`,borderRadius:20,padding:'18px 16px',overflow:'hidden',position:'relative'}}>
            <div style={{position:'absolute',top:-10,right:-8,fontSize:70,opacity:.06}}>{p.avatar}</div>
            {/* Header */}
            <div style={{display:'flex',alignItems:'center',gap:12,marginBottom:16}}>
              <div style={{width:46,height:46,borderRadius:'50%',background:p.color,display:'flex',alignItems:'center',justifyContent:'center',fontWeight:900,fontSize:22,color:'#000'}}>{p.emoji}</div>
              <div style={{flex:1}}>
                <div style={{fontFamily:'Bebas Neue',fontSize:24,letterSpacing:1,color:p.color}}>{p.name}</div>
                <div style={{fontSize:11,color:'rgba(255,255,255,.25)'}}>HCP {playerSettings[p.id]??p.defaultHcp} · {st.rp} rounds</div>
              </div>
              {st.best&&<div style={{textAlign:'right'}}>
                <div style={{fontFamily:'Bebas Neue',fontSize:34,color:p.color,lineHeight:1}}>{st.best}</div>
                <div style={{fontSize:9,color:'rgba(255,255,255,.25)',letterSpacing:2}}>BEST ROUND</div>
              </div>}
            </div>
            {/* Score breakdown */}
            <div style={{display:'grid',gridTemplateColumns:'repeat(5,1fr)',gap:6,marginBottom:12}}>
              {[{n:st.aces,l:'ACE',c:'#ffd700'},{n:st.eagles,l:'EAGLE',c:'#00e676'},{n:st.birdies,l:'BIRDIE',c:'#69f0ae'},{n:st.pars,l:'PAR',c:'#555'},{n:st.bogeys,l:'BOG+',c:'#ff5252'}].map((s,i)=>(
                <div key={i} style={{background:'rgba(0,0,0,.3)',borderRadius:10,padding:'8px 4px',textAlign:'center'}}>
                  <div style={{fontFamily:'Bebas Neue',fontSize:22,color:s.n>0?s.c:'#222'}}>{s.n}</div>
                  <div style={{fontSize:8,color:'rgba(255,255,255,.25)',fontWeight:700,letterSpacing:1}}>{s.l}</div>
                </div>
              ))}
            </div>
            {/* Scoring bar */}
            {st.rp>0&&(()=>{const total=Math.max(1,st.eagles+st.birdies+st.pars+st.bogeys+st.doubles);return(
              <div style={{height:8,borderRadius:4,overflow:'hidden',display:'flex',gap:2,marginBottom:12}}>
                {[{v:st.eagles,c:'#00e676'},{v:st.birdies,c:'#69f0ae'},{v:st.pars,c:'#444'},{v:st.bogeys,c:'#ff9100'},{v:st.doubles,c:'#ff5252'}].map((b,i)=>b.v>0&&<div key={i} style={{flex:b.v/total,background:b.c,minWidth:3}}/>)}
              </div>
            );})()}
            {/* Trend sparkline */}
            {trend.filter(Boolean).length>1&&(
              <div style={{marginBottom:10}}>
                <div style={{fontSize:9,color:'rgba(255,255,255,.25)',letterSpacing:2,fontWeight:700,marginBottom:6}}>SCORE TREND (LAST {trend.filter(Boolean).length} ROUNDS)</div>
                <div style={{display:'flex',gap:4,alignItems:'flex-end',height:40}}>
                  {trend.filter(Boolean).map((t,i)=>{const min=Math.min(...trend.filter(Boolean));const max=Math.max(...trend.filter(Boolean));const h=max===min?20:Math.round(((max-t)/(max-min))*32)+8;return(
                    <div key={i} style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',gap:2}}>
                      <div style={{width:'100%',background:i===trend.filter(Boolean).length-1?p.color:'rgba(255,255,255,.15)',borderRadius:'3px 3px 0 0',height:h,minHeight:4,transition:'height .5s ease'}}/>
                      <div style={{fontSize:9,color:'rgba(255,255,255,.3)',fontWeight:700}}>{t}</div>
                    </div>
                  );})}
                </div>
              </div>
            )}
            {/* Course records */}
            {Object.keys(st.courseRecords).length>0&&(
              <div>
                <div style={{fontSize:9,color:'rgba(255,255,255,.25)',letterSpacing:2,fontWeight:700,marginBottom:6}}>COURSE RECORDS</div>
                <div style={{display:'flex',gap:6,flexWrap:'wrap'}}>
                  {Object.entries(st.courseRecords).map(([cid,score])=>(
                    <div key={cid} style={{background:'rgba(0,0,0,.3)',borderRadius:20,padding:'3px 10px',fontSize:10,fontWeight:700}}>
                      <span style={{color:'rgba(255,255,255,.4)'}}>{COURSES[cid]?.name?.split(' ')[0]}</span>
                      <span style={{color:p.color,marginLeft:4}}>{score}</span>
                    </div>
                  ))}
                </div>
              </div>
            )}
            {st.avg&&<div style={{marginTop:8,fontSize:11,color:'rgba(255,255,255,.25)'}}>Average: <span style={{color:p.color,fontWeight:700}}>{st.avg}</span>{st.worst&&<> · Worst: <span style={{color:'#ff5252',fontWeight:700}}>{st.worst}</span></>}</div>}
          </div>
        );
      })}

      {/* Head to head */}
      {selectedPlayer==='all'&&(
        <div style={{background:'rgba(255,255,255,.02)',border:'1px solid rgba(255,255,255,.05)',borderRadius:20,padding:'18px 16px'}}>
          <div style={{fontFamily:'Bebas Neue',fontSize:20,letterSpacing:2,color:'#ffd700',marginBottom:14}}>HEAD TO HEAD RECORD</div>
          {[['ben','luke'],['ben','max'],['ben','thomas'],['thomas','luke'],['thomas','max'],['max','luke']].map(([p1id,p2id])=>{
            const p1=PLAYERS.find(p=>p.id===p1id);const p2=PLAYERS.find(p=>p.id===p2id);
            const{w1,w2,ties}=h2h(p1id,p2id);const total=w1+w2+ties;if(total===0)return null;
            return(
              <div key={p1id+p2id} style={{marginBottom:12}}>
                <div style={{display:'flex',justifyContent:'space-between',marginBottom:4,fontSize:13}}>
                  <span style={{color:p1.color,fontWeight:800}}>{p1.name} ({w1})</span>
                  {ties>0&&<span style={{color:'#555',fontSize:11}}>{ties} tie{ties>1?'s':''}</span>}
                  <span style={{color:p2.color,fontWeight:800}}>({w2}) {p2.name}</span>
                </div>
                <div style={{display:'flex',height:10,borderRadius:5,overflow:'hidden',background:'rgba(255,255,255,.04)'}}>
                  <div style={{flex:Math.max(w1,.1),background:p1.color,transition:'flex .5s ease'}}/>
                  <div style={{flex:Math.max(ties,.1),background:'rgba(255,255,255,.1)'}}/>
                  <div style={{flex:Math.max(w2,.1),background:p2.color,transition:'flex .5s ease'}}/>
                </div>
              </div>
            );
          })}
        </div>
      )}

      {/* Most improved */}
      {improved&&improved.improvement>0&&(
        <div style={{background:'rgba(0,230,118,.04)',border:'1px solid rgba(0,230,118,.12)',borderRadius:16,padding:'14px 16px',display:'flex',gap:12,alignItems:'center'}}>
          <span style={{fontSize:30}}>📈</span>
          <div>
            <div style={{fontSize:10,color:'rgba(0,230,118,.5)',letterSpacing:2,fontWeight:700}}>MOST IMPROVED</div>
            <div style={{fontSize:16,fontWeight:900,color:'#00e676'}}>{improved.name}</div>
            <div style={{fontSize:11,color:'rgba(255,255,255,.3)'}}>Improved by {improved.improvement} strokes</div>
          </div>
        </div>
      )}

      {/* Trash talk */}
      {trash&&(
        <div style={{background:'rgba(255,145,0,.04)',border:'1px solid rgba(255,145,0,.15)',borderRadius:16,padding:'14px 16px'}}>
          <div style={{fontSize:10,color:'rgba(255,145,0,.5)',letterSpacing:2,fontWeight:700,marginBottom:6}}>🎤 ROAST OF THE WEEK</div>
          <div style={{fontSize:13,color:'rgba(255,255,255,.7)',lineHeight:1.6,fontStyle:'italic'}}>"{trash.line}"</div>
        </div>
      )}
    </div>
  );
}
